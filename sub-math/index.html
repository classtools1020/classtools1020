<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代課老師專區 | 芎林國中 · 8A 數學</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #E8F1F8 0%, #C7DFEE 100%);
    min-height: 100vh;
    padding: 20px;
    color: #0D3A5C;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    background: #1B5E8F;
    color: #FFF;
    padding: 30px 20px;
    border-radius: 20px;
    margin-bottom: 25px;
    box-shadow: 0 4px 12px rgba(27,94,143,0.3);
  }
  h1 {
    font-size: 2.2rem;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 1.1rem;
    color: #B5D9EC;
    opacity: 0.95;
  }
  .teacher-info {
    background: #FFF;
    border: 3px solid #B5D9EC;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    font-size: 1.1rem;
    line-height: 1.8;
  }
  .teacher-info strong { color: #1B5E8F; }
  .day-buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .day-btn {
    display: block;
    background: #FFF;
    border: 4px solid #1B5E8F;
    border-radius: 20px;
    padding: 30px 25px;
    text-decoration: none;
    color: #0D3A5C;
    box-shadow: 0 6px 16px rgba(27,94,143,0.25);
    transition: all 0.2s;
    min-height: 48px;
  }
  .day-btn:hover, .day-btn:active {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(27,94,143,0.35);
    background: #B5D9EC;
  }
  .day-btn .date {
    font-size: 1.8rem;
    font-weight: bold;
    color: #1B5E8F;
    margin-bottom: 10px;
  }
  .day-btn .title {
    font-size: 1.5rem;
    color: #0D3A5C;
    line-height: 1.4;
  }
  .day-btn .icon {
    font-size: 2.5rem;
    margin-right: 10px;
    vertical-align: middle;
  }
  .footer {
    text-align: center;
    margin-top: 30px;
    color: #1B5E8F;
    font-size: 0.95rem;
    opacity: 0.8;
  }
  @media (max-width: 480px) {
    h1 { font-size: 1.7rem; }
    .day-btn .date { font-size: 1.5rem; }
    .day-btn .title { font-size: 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📐 代課老師專區</h1>
    <div class="subtitle">芎林國中 · 8A 數學</div>
  </div>

  <div class="teacher-info">
    <strong>🙏 課程麻煩您了。</strong><br>
    點選當天的日期，有上課流程和教材連結。
  </div>

  <div class="day-buttons">
    <a href="congruence-thu.html" class="day-btn">
      <div class="date"><span class="icon">📅</span>禮拜四（4/23）</div>
      <div class="title">🔺 全等三角形 · SSS<br><span style="font-size:1rem;color:#1B5E8F;">（三邊相同就全等）</span></div>
    </a>

    <a href="congruence-fri.html" class="day-btn">
      <div class="date"><span class="icon">📅</span>禮拜五（4/24）</div>
      <div class="title">🔷 全等三角形 · SAS + ASA<br><span style="font-size:1rem;color:#1B5E8F;">（新招式登場）</span></div>
    </a>
  </div>

  <div class="footer">
    芎林國中 · 8A 數學
  </div>
</div>
</body>
</html>
