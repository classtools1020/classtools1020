<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>全等 SSS｜哆啦A夢陪你過一天的三角形</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#FAFAFA;color:#2C3E50;
  font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;
  font-size:20px;user-select:none;touch-action:manipulation}
body{display:flex;flex-direction:column}
:root{
  --bg:#FAFAFA; --text:#2C3E50; --text-sub:#5D6D7E;
  --sss:#E74C3C; --sss-lt:#FADBD8;
  --sas1:#3498DB; --sas1-lt:#D6EAF8;
  --cong:#9B59B6; --cong-lt:#E8DAEF;
  --ok:#27AE60;
  --warn:#E67E22;
  --shadow:0 4px 12px rgba(0,0,0,.12);
}

/* 老師提示卡 */
#teacher-tip{background:#FFF8E1;border-bottom:4px solid var(--warn);
  padding:14px 24px;min-height:80px;display:flex;align-items:center;gap:14px}
#teacher-tip .badge{background:var(--warn);color:#fff;padding:6px 14px;
  border-radius:20px;font-weight:800;font-size:16px;white-space:nowrap}
#teacher-tip .content{flex:1;font-size:20px;line-height:1.5;color:var(--text);
  font-weight:600}
#teacher-tip .scene-tag{background:var(--cong);color:#fff;padding:4px 10px;
  border-radius:10px;font-size:14px;font-weight:700;white-space:nowrap}

/* 主舞台 */
#stage{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#canvas{width:100%;height:100%;display:block}
#narration{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  max-width:80%;background:#fff;border:4px solid var(--cong);
  border-radius:18px;padding:16px 26px;font-size:28px;font-weight:700;
  box-shadow:var(--shadow);z-index:20;line-height:1.4;text-align:center;
  color:var(--text);pointer-events:none;display:none}
#narration.visible{display:block;animation:nFadeIn .4s ease}
@keyframes nFadeIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}

/* 時間標籤 (左上) */
#time-stamp{position:absolute;top:14px;left:14px;z-index:15;
  background:linear-gradient(135deg,#F1C40F,#F39C12);
  color:#fff;padding:8px 18px;border-radius:30px;font-weight:800;
  font-size:22px;box-shadow:var(--shadow);display:none}
#time-stamp.visible{display:block;animation:tsIn .5s ease}
@keyframes tsIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}

/* 下方控制列 */
#control-bar{background:#fff;padding:12px 20px;box-shadow:0 -4px 12px rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:15}
#progress-info{font-size:18px;color:var(--text-sub);font-weight:600;min-width:140px}
#main-actions{display:flex;gap:10px;flex:1;justify-content:center;flex-wrap:wrap}
#side-controls{display:flex;gap:6px}

.btn{background:#fff;border:3px solid #D5DBDB;border-radius:14px;
  padding:12px 22px;font-size:22px;cursor:pointer;min-height:60px;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--text);transition:all .15s ease;
  font-family:inherit;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(1px)}
.btn-next{background:var(--cong);color:#fff;border-color:var(--cong);
  min-width:200px;font-size:26px;animation:glow 2s infinite}
.btn-next:hover{background:#7D3C98}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(155,89,182,.5)}
  50%{box-shadow:0 0 20px 6px rgba(155,89,182,.3)}}
.btn-scene-next{background:var(--ok);color:#fff;border-color:var(--ok);min-width:200px;font-size:24px}
.btn-scene-next:hover{background:#1E8449}
.btn-small{min-height:48px;padding:6px 14px;font-size:18px;min-width:auto}
.btn-answer{min-width:220px;font-size:26px;padding:16px 24px}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-warn{background:var(--warn);color:#fff;border-color:var(--warn)}

/* 進度條 */
#progress{height:10px;background:#ECF0F1;display:flex;position:relative;z-index:5}
.prog-seg{flex:1;background:transparent;border-right:2px solid #fff;transition:background .3s;
  position:relative}
.prog-seg:last-child{border-right:none}
.prog-seg.done{background:var(--cong)}
.prog-seg.current{background:#F4D03F;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}

/* 彩帶 */
.confetti{position:fixed;width:12px;height:16px;z-index:50;
  animation:fall 2.8s linear;pointer-events:none}
@keyframes fall{0%{transform:translateY(-20vh) rotate(0)}100%{transform:translateY(110vh) rotate(540deg)}}

/* 閃現 */
.flash{position:absolute;inset:0;pointer-events:none;z-index:18;
  display:flex;align-items:center;justify-content:center;font-size:160px;
  animation:flashIn .6s ease}
@keyframes flashIn{0%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.3)}
  100%{opacity:0;transform:scale(1)}}

/* SVG 動畫效果 */
.pulsate{animation:svgPulse 1.4s ease-in-out infinite}
@keyframes svgPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.shake{animation:svgShake .4s ease}
@keyframes svgShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}}

@media (max-width:720px){
  #teacher-tip{padding:8px 12px;min-height:auto;flex-wrap:wrap}
  #teacher-tip .content{font-size:16px}
  #narration{font-size:20px;padding:10px 16px;max-width:92%}
  .btn{font-size:18px;padding:8px 14px;min-height:48px}
  .btn-next,.btn-scene-next{min-width:140px;font-size:20px}
  #time-stamp{font-size:16px;padding:6px 12px}
}
</style>
</head>
<body>

<div id="teacher-tip">
  <div class="badge">👩‍🏫 老師</div>
  <div class="content" id="tip-content">準備好！按「▶ 下一步」和哆啦A夢去看生活中的三角形。</div>
  <div class="scene-tag" id="scene-tag">1/6</div>
</div>

<div id="progress">
  <div class="prog-seg current"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
</div>

<div id="stage">
  <svg id="canvas" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- 漸層 -->
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FEF9E7"/>
        <stop offset="100%" stop-color="#FDEBD0"/>
      </linearGradient>
      <linearGradient id="bread" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F5DEB3"/>
        <stop offset="100%" stop-color="#DEB887"/>
      </linearGradient>
      <linearGradient id="rice" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFEF5"/>
        <stop offset="100%" stop-color="#F5F5DC"/>
      </linearGradient>
      <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#D7A871"/>
        <stop offset="100%" stop-color="#B8864A"/>
      </linearGradient>
      <pattern id="sesame" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="5" cy="5" r="1" fill="#5D4037"/>
        <circle cx="15" cy="12" r="1" fill="#5D4037"/>
        <circle cx="8" cy="16" r="1" fill="#5D4037"/>
      </pattern>
    </defs>
    <g id="scene-root"></g>
  </svg>
  <div id="time-stamp"></div>
  <div id="narration"></div>
</div>

<div id="control-bar">
  <div id="progress-info">📍 <span id="s-name">早上</span> · <span id="s-n">1</span>/6</div>
  <div id="main-actions">
    <button class="btn btn-next" id="btn-next">▶ 下一步</button>
  </div>
  <div id="side-controls">
    <button class="btn btn-small" id="btn-prev" title="上一幕">◀</button>
    <button class="btn btn-small" id="btn-restart" title="從頭">🔁</button>
    <button class="btn btn-small" id="btn-mute" title="靜音">🔊</button>
  </div>
</div>

<script>
const state = { sceneIdx: 0, stepIdx: -1, audioOn: true };

// 音效
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state==="suspended") audioCtx.resume();
}
function beep(f,d=0.15,t="sine",g=0.2){
  if(!state.audioOn||!audioCtx) return;
  const o=audioCtx.createOscillator(), gn=audioCtx.createGain();
  o.type=t; o.frequency.value=f;
  gn.gain.setValueAtTime(g, audioCtx.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+d);
}
const SFX = {
  click(){ beep(600,0.05,"square",0.1); },
  reveal(){ beep(440,0.12,"sine",0.15); },
  pop(){ beep(880,0.08,"triangle",0.15); },
  ding(){ beep(1047,0.15,"sine",0.18); setTimeout(()=>beep(1319,0.2,"sine",0.18),140); },
  success(){ beep(523,0.15,"sine",0.18);
    setTimeout(()=>beep(659,0.15,"sine",0.18),140);
    setTimeout(()=>beep(784,0.25,"sine",0.2),280); },
  gentle(){ beep(330,0.2,"sine",0.14); setTimeout(()=>beep(262,0.25,"sine",0.14),180); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"sine",0.22),i*130)); }
};

// 幾何
function triFromSSS(a,b,c){
  if(a+b<=c||b+c<=a||a+c<=b) return null;
  const x=(c*c+a*a-b*b)/(2*a);
  const y=Math.sqrt(Math.max(c*c-x*x,0));
  return [{x,y:-y,label:"A"},{x:0,y:0,label:"B"},{x:a,y:0,label:"C"}];
}
function tform(pts,cx,cy,scale=20){
  const mx=pts.reduce((s,p)=>s+p.x,0)/3, my=pts.reduce((s,p)=>s+p.y,0)/3;
  return pts.map(p=>({x:cx+(p.x-mx)*scale, y:cy+(p.y-my)*scale, label:p.label}));
}
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpPts(p1,p2,t){
  return p1.map((p,i)=>({x:lerp(p.x,p2[i].x,t), y:lerp(p.y,p2[i].y,t), label:p.label}));
}

// SVG
const NS = "http://www.w3.org/2000/svg";
function el(tag,attrs={},parent=null){
  const e = document.createElementNS(NS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function clearScene(){
  const r = document.getElementById("scene-root");
  r.innerHTML = "";
  return r;
}
function triPath(pts){ return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y} L${pts[2].x},${pts[2].y} Z`; }
function drawTri(parent,pts,opts={}){
  const {fill="#E8DAEF",stroke="#9B59B6",sw=4,id="",showLen=null,labels=false} = opts;
  const g = el("g", id?{id}:{}, parent);
  el("path", {d:triPath(pts), fill, stroke, "stroke-width":sw,
    "stroke-linejoin":"round","stroke-linecap":"round"}, g);
  if(labels){
    pts.forEach(p=>{
      const dx = p.label==="A"?0:(p.label==="B"?-20:20);
      const dy = p.label==="A"?-18:24;
      el("text",{x:p.x+dx,y:p.y+dy,"font-size":22,"font-weight":800,
        fill:stroke,"text-anchor":"middle"},g).textContent = p.label;
    });
  }
  if(showLen){
    const m = (a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
    const mAB=m(pts[0],pts[1]), mBC=m(pts[1],pts[2]), mCA=m(pts[2],pts[0]);
    el("text",{x:mAB.x-32,y:mAB.y+8,"font-size":24,"font-weight":800,fill:stroke},g).textContent=showLen.AB;
    el("text",{x:mBC.x,y:mBC.y+30,"font-size":24,"font-weight":800,fill:stroke,"text-anchor":"middle"},g).textContent=showLen.BC;
    el("text",{x:mCA.x+22,y:mCA.y+8,"font-size":24,"font-weight":800,fill:stroke},g).textContent=showLen.CA;
  }
  return g;
}

// ===========================================================
// 生活物件 SVG
// ===========================================================

// 三明治 (三角形, 吐司紋理 + 芝麻)
function drawSandwich(parent, pts, opts={}){
  const {id="", highlight=false} = opts;
  const g = el("g", id?{id}:{}, parent);
  // 主體吐司
  el("path", {d:triPath(pts), fill:"url(#bread)",
    stroke: highlight ? "#9B59B6" : "#8B6F47",
    "stroke-width": highlight ? 6 : 4,
    "stroke-linejoin":"round"}, g);
  // 芝麻點 (在三角形內部)
  const cx = pts.reduce((s,p)=>s+p.x,0)/3;
  const cy = pts.reduce((s,p)=>s+p.y,0)/3;
  for(let i=0;i<8;i++){
    const ang = Math.random()*Math.PI*2;
    const r = Math.random()*25;
    el("circle", {cx:cx+Math.cos(ang)*r, cy:cy+Math.sin(ang)*r,
      r:1.8, fill:"#3E2723"}, g);
  }
  // 起司條 (黃色橫線)
  const midAB = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
  const midAC = {x:(pts[0].x+pts[2].x)/2, y:(pts[0].y+pts[2].y)/2};
  el("line", {x1:midAB.x, y1:midAB.y, x2:midAC.x, y2:midAC.y,
    stroke:"#F1C40F", "stroke-width":5, "stroke-linecap":"round", opacity:.85}, g);
  // 生菜 (綠色波浪)
  el("path", {
    d:`M${midAB.x+10},${midAB.y+6} Q${cx},${cy-8} ${midAC.x-10},${midAC.y+6}`,
    fill:"none", stroke:"#2ECC71", "stroke-width":4, "stroke-linecap":"round"
  }, g);
  return g;
}

// 三角板 (黃色塑膠/木頭, 有刻度)
function drawRuler(parent, pts, opts={}){
  const {id="", color="url(#wood)", showLen=null} = opts;
  const g = el("g", id?{id}:{}, parent);
  el("path", {d:triPath(pts), fill:color,
    stroke:"#8B5A2B", "stroke-width":4, "stroke-linejoin":"round"}, g);
  // 刻度 (三邊各畫幾個小刻度線)
  const tick = (p1, p2, n=5) => {
    for(let i=1;i<n;i++){
      const t = i/n;
      const mx = p1.x+(p2.x-p1.x)*t, my = p1.y+(p2.y-p1.y)*t;
      const dx = -(p2.y-p1.y), dy = p2.x-p1.x;
      const len = Math.sqrt(dx*dx+dy*dy);
      const ux = dx/len*6, uy = dy/len*6;
      el("line", {x1:mx-ux, y1:my-uy, x2:mx+ux, y2:my+uy,
        stroke:"#3E2723", "stroke-width":2}, g);
    }
  };
  tick(pts[0], pts[1]); tick(pts[1], pts[2]); tick(pts[2], pts[0]);
  // 數字 "30" 樣
  const cx = pts.reduce((s,p)=>s+p.x,0)/3;
  const cy = pts.reduce((s,p)=>s+p.y,0)/3;
  el("text", {x:cx, y:cy+6, "font-size":20, "font-weight":800,
    fill:"#3E2723", "text-anchor":"middle"}, g).textContent = "三角板";
  if(showLen){
    const m = (a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
    const mAB=m(pts[0],pts[1]), mBC=m(pts[1],pts[2]), mCA=m(pts[2],pts[0]);
    el("text",{x:mAB.x-28,y:mAB.y+6,"font-size":22,"font-weight":800,fill:"#E74C3C"},g).textContent=showLen.AB;
    el("text",{x:mBC.x,y:mBC.y+28,"font-size":22,"font-weight":800,fill:"#3498DB","text-anchor":"middle"},g).textContent=showLen.BC;
    el("text",{x:mCA.x+20,y:mCA.y+6,"font-size":22,"font-weight":800,fill:"#27AE60"},g).textContent=showLen.CA;
  }
  return g;
}

// 房子 (屋頂三角 + 矩形身體)
function drawHouse(parent, cx, cy, roofPts, scale=1, opts={}){
  const {id="", highlight=false} = opts;
  const g = el("g", id?{id}:{}, parent);
  // 身體 (矩形)
  const bodyW = 180, bodyH = 140;
  el("rect", {x:cx-bodyW/2, y:cy, width:bodyW, height:bodyH,
    fill:"#FADBD8", stroke:"#7B241C", "stroke-width":3, rx:4}, g);
  // 門
  el("rect", {x:cx-25, y:cy+60, width:50, height:80,
    fill:"#6E2C00", stroke:"#3E2723", "stroke-width":2, rx:4}, g);
  el("circle", {cx:cx+15, cy:cy+100, r:3, fill:"#F1C40F"}, g);
  // 窗
  el("rect", {x:cx-70, y:cy+25, width:30, height:30,
    fill:"#AED6F1", stroke:"#3E2723", "stroke-width":2}, g);
  el("rect", {x:cx+40, y:cy+25, width:30, height:30,
    fill:"#AED6F1", stroke:"#3E2723", "stroke-width":2}, g);
  // 屋頂
  el("path", {d:triPath(roofPts), fill:"#C0392B",
    stroke: highlight?"#9B59B6":"#7B241C", "stroke-width": highlight?6:4,
    "stroke-linejoin":"round"}, g);
  return g;
}

// 三角飯糰 (白米 + 海苔黑帶)
function drawOnigiri(parent, pts, opts={}){
  const g = el("g", {}, parent);
  // 米飯本體
  el("path", {d:triPath(pts), fill:"url(#rice)",
    stroke:"#BEBE8C", "stroke-width":2, "stroke-linejoin":"round"}, g);
  // 海苔 (底部黑色矩形帶, 跟三角形底邊貼合)
  const b = pts[1], c = pts[2];
  const bandH = 16;
  const dx = c.x - b.x, dy = c.y - b.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  const nx = -dy/len, ny = dx/len;
  const noriPts = [
    {x: b.x + nx*3, y: b.y + ny*3},
    {x: c.x + nx*3, y: c.y + ny*3},
    {x: c.x - nx*bandH, y: c.y - ny*bandH},
    {x: b.x - nx*bandH, y: b.y - ny*bandH}
  ];
  el("path", {d:`M${noriPts[0].x},${noriPts[0].y} L${noriPts[1].x},${noriPts[1].y} L${noriPts[2].x},${noriPts[2].y} L${noriPts[3].x},${noriPts[3].y} Z`,
    fill:"#2C3E50"}, g);
  // 海苔高光
  el("line", {x1:(noriPts[0].x+noriPts[3].x)/2, y1:(noriPts[0].y+noriPts[3].y)/2,
    x2:(noriPts[1].x+noriPts[2].x)/2, y2:(noriPts[1].y+noriPts[2].y)/2,
    stroke:"#5D6D7E", "stroke-width":1}, g);
  // 紅色梅干 (中心點)
  const cx = pts.reduce((s,p)=>s+p.x,0)/3;
  const cy = pts.reduce((s,p)=>s+p.y,0)/3;
  el("circle", {cx:cx, cy:cy-3, r:3, fill:"#C0392B"}, g);
  return g;
}

// 哆啦A夢
function drawDoraemon(parent, cx, cy, scale=1){
  const g = el("g", {transform:`translate(${cx},${cy}) scale(${scale})`}, parent);
  el("ellipse", {cx:0,cy:0,rx:65,ry:60,fill:"#3498DB",stroke:"#1B4F72","stroke-width":3}, g);
  el("ellipse", {cx:0,cy:15,rx:50,ry:40,fill:"#fff",stroke:"#1B4F72","stroke-width":2}, g);
  el("ellipse", {cx:-15,cy:-10,rx:12,ry:16,fill:"#fff",stroke:"#1B4F72","stroke-width":2}, g);
  el("ellipse", {cx:15,cy:-10,rx:12,ry:16,fill:"#fff",stroke:"#1B4F72","stroke-width":2}, g);
  el("circle", {cx:-12,cy:-6,r:4,fill:"#1B2631"}, g);
  el("circle", {cx:12,cy:-6,r:4,fill:"#1B2631"}, g);
  el("circle", {cx:0,cy:5,r:10,fill:"#C0392B",stroke:"#7B241C","stroke-width":2}, g);
  for(const [x1,y1,x2,y2] of [[-10,15,-35,10],[-10,20,-35,22],[-10,25,-35,34],
                               [10,15,35,10],[10,20,35,22],[10,25,35,34]]){
    el("line",{x1,y1,x2,y2,stroke:"#1B2631","stroke-width":2},g);
  }
  el("path",{d:"M-10,32 Q0,40 10,32",fill:"none",stroke:"#1B2631","stroke-width":2},g);
  el("rect",{x:-30,y:55,width:60,height:8,fill:"#C0392B"},g);

// 對話氣泡
function addBubble(parent,x,y,w,h,text,tail="left"){
  const g = el("g",{},parent);
  el("rect",{x,y,width:w,height:h,rx:18,ry:18,fill:"#fff",stroke:"#34495E","stroke-width":3},g);
  const tx = tail==="left" ? x-12 : x+w+12;
  const ty = y + h*0.65;
  el("path",{
    d: tail==="left" ? `M${x+20},${ty} L${tx},${ty+5} L${x+25},${ty+20} Z`
                     : `M${x+w-20},${ty} L${tx},${ty+5} L${x+w-25},${ty+20} Z`,
    fill:"#fff", stroke:"#34495E", "stroke-width":3
  },g);
  const lines = text.split("\n");
  const lh = Math.min(30, h/(lines.length+1));
  lines.forEach((ln,i)=>{
    el("text",{x:x+w/2, y:y+h/2-(lines.length-1)*lh/2+i*lh,
      "text-anchor":"middle","dominant-baseline":"middle",
      "font-size":Math.min(22,lh*0.75),"font-weight":700,
      fill:"#2C3E50","font-family":"Microsoft JhengHei,sans-serif"},g)
      .textContent = ln;
  });
  return g;
}

function sceneBanner(parent, text, color="#9B59B6"){
  el("text", {x:800, y:80, "text-anchor":"middle", "font-size":36,
    "font-weight":900, fill:color}, parent).textContent = text;
}

// 太陽/月亮裝飾
function drawSun(parent, cx, cy, r=40){
  const g = el("g",{},parent);
  el("circle",{cx,cy,r,fill:"#F1C40F",stroke:"#F39C12","stroke-width":3},g);
  for(let i=0;i<8;i++){
    const a = i*Math.PI/4;
    el("line", {x1:cx+Math.cos(a)*(r+6), y1:cy+Math.sin(a)*(r+6),
      x2:cx+Math.cos(a)*(r+20), y2:cy+Math.sin(a)*(r+20),
      stroke:"#F39C12", "stroke-width":4, "stroke-linecap":"round"}, g);
  }
  return g;
}

function confetti(n=20){
  const colors = ["#E74C3C","#3498DB","#F39C12","#9B59B6","#27AE60","#F4D03F"];
  for(let i=0;i<n;i++){
    const d = document.createElement("div");
    d.className="confetti";
    d.style.left = Math.random()*100+"vw";
    d.style.background = colors[i%colors.length];
    d.style.animationDelay = (Math.random()*0.6)+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3200);
  }
}

let animId = 0;
function animateTri(elemId, from, to, frames, onDone){
  cancelAnimationFrame(animId);
  let f = 0;
  const tick = () => {
    f++;
    const t = f/frames;
    const cur = lerpPts(from, to, t);
    const pth = document.querySelector(`#${elemId} path`);
    if(pth) pth.setAttribute("d", triPath(cur));
    if(f < frames) animId = requestAnimationFrame(tick);
    else if(onDone) onDone();
  };
  tick();
}

    else if(cur.icon==="🍙"){ drawOnigiri(root,p1); drawOnigiri(root,p2); }
    // 標邊長 (所有題目都顯示)
    if(cur.icon!=="📐"){
      const showL = (pts, L) => {
        const m=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
        const m1=m(pts[0],pts[1]), m2=m(pts[1],pts[2]), m3=m(pts[2],pts[0]);
        el("text",{x:m1.x-22,y:m1.y+4,"font-size":24,"font-weight":800,fill:"#E74C3C"},root).textContent = L.AB;
        el("text",{x:m2.x,y:m2.y+30,"font-size":24,"font-weight":800,fill:"#E74C3C","text-anchor":"middle"},root).textContent = L.BC;
        el("text",{x:m3.x+16,y:m3.y+4,"font-size":24,"font-weight":800,fill:"#E74C3C"},root).textContent = L.CA;
      };
      showL(p1, {AB:cur.c, BC:cur.a, CA:cur.b});
      showL(p2, {AB:cur.c2, BC:cur.a2, CA:cur.b2});
    }
    el("text", {x:800, y:150, "text-anchor":"middle", "font-size":32,
      "font-weight":900, fill:"#9B59B6"}, root).textContent = `第 ${this._q+1} / 4 題`;
    el("text", {x:800, y:230, "text-anchor":"middle", "font-size":28,
      "font-weight":700, fill:"#2C3E50"}, root).textContent = "兩個全等嗎？";
  },
  steps: [
    {
      tip:"說：『晚上回家，我們來驗收一下！我念題目，你們<b>舉手喊是或不是</b>，我幫你們按。』",
      narrate:"看看今天學會了嗎～",
      run(){}
    }
  ],
  afterSteps: {
    tip:"測驗進行中：答對 ✅、答錯 💛（不會紅叉叉，給學生安全感）",
    narrate:""
  },
  onFinalStep(){
    const actions = document.getElementById("main-actions");
    actions.innerHTML = "";
    const yes = document.createElement("button");
    yes.className = "btn btn-answer btn-ok";
    yes.textContent = "✅ 是，全等";
    yes.onclick = () => this.answer(true);
    const no = document.createElement("button");
    no.className = "btn btn-answer btn-warn";
    no.textContent = "❌ 不全等";
    no.onclick = () => this.answer(false);
    actions.appendChild(yes); actions.appendChild(no);
  },
  answer(ans){
    SFX.click();
    const cur = this._quizzes[this._q];
    if(ans === cur.correct){ flashCorrect(); setNarration(cur.why); this._score++; }
    else { flashRetry(); setNarration("💛 " + cur.why); }
    setTimeout(() => {
      this._q++;
      this._render();
      if(this._q >= this._quizzes.length){
        const actions = document.getElementById("main-actions");
        actions.innerHTML = "";
        const nx = document.createElement("button");
        nx.className = "btn btn-scene-next";
        nx.textContent = "🎉 進入通關彩蛋 ▶";
        nx.onclick = () => nextScene();
        actions.appendChild(nx);
      } else {
        scenes[4].onFinalStep();
      }
    }, 1800);
  }
},

// ===========================================================
// 控制
// ===========================================================
function renderScene(){
  const scene = scenes[state.sceneIdx];
  state.stepIdx = -1;
  scene.init && scene.init();
  setNarration("");
  setTimeStamp(scene.time || "");
  setTeacherTip(`<b>🎬 第 ${state.sceneIdx+1} 幕：${scene.name}</b><br>按「▶ 下一步」開始`);
  document.getElementById("s-n").textContent = state.sceneIdx + 1;
  document.getElementById("s-name").textContent = scene.name;
  document.getElementById("scene-tag").textContent = `${state.sceneIdx+1}/6`;
  document.querySelectorAll(".prog-seg").forEach((s,i)=>{
    s.classList.remove("done","current");
    if(i < state.sceneIdx) s.classList.add("done");
    else if(i === state.sceneIdx) s.classList.add("current");
  });
  const actions = document.getElementById("main-actions");
  actions.innerHTML = "";
  const b = document.createElement("button");
  b.className = "btn btn-next";
  b.textContent = "▶ 下一步";
  b.onclick = advanceStep;
  actions.appendChild(b);
}
function advanceStep(){
  SFX.click(); ensureAudio();
  const scene = scenes[state.sceneIdx];
  state.stepIdx++;
  if(state.stepIdx < scene.steps.length){
    const step = scene.steps[state.stepIdx];
    setTeacherTip(`<b>🎬 第 ${state.sceneIdx+1}.${state.stepIdx+1} 步</b><br>${step.tip}`);
    setNarration(step.narrate);
    step.run && step.run.call(scene);
    if(scene.onFinalStep && state.stepIdx === scene.steps.length - 1){
      setTimeout(()=>scene.onFinalStep(), 600);
    }
  } else {
    if(scene.afterSteps){
      setTeacherTip(`<b>✅ 本幕完成</b><br>${scene.afterSteps.tip}`);
      if(scene.afterSteps.narrate) setNarration(scene.afterSteps.narrate);
    }
    const actions = document.getElementById("main-actions");
    actions.innerHTML = "";
    if(state.sceneIdx < scenes.length - 1){
      const nx = document.createElement("button");
      nx.className = "btn btn-scene-next";
      nx.textContent = "▶ 進入下一幕";
      nx.onclick = nextScene;
      actions.appendChild(nx);
    } else {
      const rst = document.createElement("button");
      rst.className = "btn btn-scene-next";
      rst.textContent = "🔁 再來一次";
      rst.onclick = () => { state.sceneIdx=0; renderScene(); };
      actions.appendChild(rst);
    }
  }
}
function nextScene(){ SFX.click(); if(state.sceneIdx<scenes.length-1){state.sceneIdx++; renderScene();} }
function prevScene(){ SFX.click(); if(state.sceneIdx>0){state.sceneIdx--; renderScene();} }

document.addEventListener("click", ensureAudio, {once:true});
document.addEventListener("touchstart", ensureAudio, {once:true});
document.getElementById("btn-prev").onclick = prevScene;
document.getElementById("btn-restart").onclick = () => { SFX.click(); state.sceneIdx=0; renderScene(); };
document.getElementById("btn-mute").onclick = (e) => {
  state.audioOn = !state.audioOn;
  e.currentTarget.textContent = state.audioOn ? "🔊" : "🔇";
  if(state.audioOn) SFX.click();
};
document.addEventListener("keydown", e => {
  if(e.key==="ArrowRight" || e.key===" "){ e.preventDefault(); advanceStep(); }
  if(e.key==="ArrowLeft") prevScene();
});

renderScene();
</script>
