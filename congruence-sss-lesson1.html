<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>蠟筆小新的玩具工廠｜全等 SSS ｜老師帶領版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#FAFAFA;color:#2C3E50;
  font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;
  font-size:20px;user-select:none;touch-action:manipulation}
body{display:flex;flex-direction:column}
:root{
  --bg:#FAFAFA; --text:#2C3E50; --text-sub:#5D6D7E;
  --sss:#E74C3C; --sss-lt:#FADBD8;
  --sas1:#3498DB; --sas1-lt:#D6EAF8;
  --sas2:#F39C12;
  --cong:#9B59B6; --cong-lt:#E8DAEF;
  --ok:#27AE60; --ok-lt:#D5F5E3;
  --warn:#E67E22;
  --shadow:0 4px 12px rgba(0,0,0,.12);
}

/* ============ 頂部：老師提示卡（永遠顯示）============ */
#teacher-tip{background:#FFF8E1;border-bottom:4px solid var(--warn);
  padding:14px 24px;min-height:80px;display:flex;align-items:center;gap:14px}
#teacher-tip .badge{background:var(--warn);color:#fff;padding:6px 14px;
  border-radius:20px;font-weight:800;font-size:16px;white-space:nowrap}
#teacher-tip .content{flex:1;font-size:20px;line-height:1.5;color:var(--text);
  font-weight:600}
#teacher-tip .scene-tag{background:var(--cong);color:#fff;padding:4px 10px;
  border-radius:10px;font-size:14px;font-weight:700;white-space:nowrap}

/* ============ 主舞台 ============ */
#stage{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#canvas{width:100%;height:100%;display:block}

/* 學生看的大字旁白 */
#narration{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  max-width:80%;background:#fff;border:4px solid var(--cong);
  border-radius:18px;padding:16px 26px;font-size:28px;font-weight:700;
  box-shadow:var(--shadow);z-index:20;line-height:1.4;text-align:center;
  color:var(--text);pointer-events:none;display:none}
#narration.visible{display:block}

/* 下方控制列 */
#control-bar{background:#fff;padding:12px 20px;box-shadow:0 -4px 12px rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:15}
#progress-info{font-size:18px;color:var(--text-sub);font-weight:600;min-width:140px}
#main-actions{display:flex;gap:10px;flex:1;justify-content:center;flex-wrap:wrap}
#side-controls{display:flex;gap:6px}

.btn{background:#fff;border:3px solid #D5DBDB;border-radius:14px;
  padding:12px 22px;font-size:22px;cursor:pointer;min-height:60px;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--text);transition:all .15s ease;
  font-family:inherit;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-next{background:var(--cong);color:#fff;border-color:var(--cong);
  min-width:200px;font-size:26px;animation:glow 2s infinite}
.btn-next:hover{background:#7D3C98}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(155,89,182,.5)}
  50%{box-shadow:0 0 20px 6px rgba(155,89,182,.3)}}
.btn-scene-next{background:var(--ok);color:#fff;border-color:var(--ok);min-width:200px;font-size:24px}
.btn-scene-next:hover{background:#1E8449}
.btn-small{min-height:48px;padding:6px 14px;font-size:18px;min-width:auto}
.btn-answer{min-width:220px;font-size:26px;padding:16px 24px}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-warn{background:var(--warn);color:#fff;border-color:var(--warn)}

/* 進度條 */
#progress{height:10px;background:#ECF0F1;display:flex;position:relative;z-index:5}
.prog-seg{flex:1;background:transparent;border-right:2px solid #fff;transition:background .3s;
  position:relative}
.prog-seg:last-child{border-right:none}
.prog-seg.done{background:var(--cong)}
.prog-seg.current{background:#F4D03F;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
.prog-label{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--text-sub);padding:2px 4px;white-space:nowrap}

/* 慶祝彩帶 */
.confetti{position:fixed;width:12px;height:16px;z-index:50;
  animation:fall 2.8s linear;pointer-events:none}
@keyframes fall{0%{transform:translateY(-20vh) rotate(0)}100%{transform:translateY(110vh) rotate(540deg)}}

/* 答對/答錯 閃現 */
.flash{position:absolute;inset:0;pointer-events:none;z-index:18;
  display:flex;align-items:center;justify-content:center;font-size:160px;
  animation:flashIn .6s ease}
@keyframes flashIn{0%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.3)}
  100%{opacity:0;transform:scale(1)}}

/* 手機排版 */
@media (max-width:720px){
  #teacher-tip{padding:8px 12px;min-height:auto;flex-wrap:wrap}
  #teacher-tip .content{font-size:16px}
  #narration{font-size:20px;padding:10px 16px;max-width:92%}
  .btn{font-size:18px;padding:8px 14px;min-height:48px}
  .btn-next,.btn-scene-next{min-width:140px;font-size:20px}
}
</style>
</head>
<body>

<!-- 老師提示區 (永遠顯示, 提醒老師現在要說什麼) -->
<div id="teacher-tip">
  <div class="badge">👩‍🏫 老師</div>
  <div class="content" id="tip-content">準備好開始！按右下角「▶ 下一步」開始第一幕。</div>
  <div class="scene-tag" id="scene-tag">1/6</div>
</div>

<!-- 進度條 -->
<div id="progress">
  <div class="prog-seg current"><span class="prog-label">疊合</span></div>
  <div class="prog-seg"><span class="prog-label">對應邊</span></div>
  <div class="prog-seg"><span class="prog-label">SSS</span></div>
  <div class="prog-seg"><span class="prog-label">卡比派對</span></div>
  <div class="prog-seg"><span class="prog-label">測驗</span></div>
  <div class="prog-seg"><span class="prog-label">通關</span></div>
</div>

<!-- 主舞台 -->
<div id="stage">
  <svg id="canvas" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
    <g id="scene-root"></g>
  </svg>
  <div id="narration"></div>
</div>

<!-- 下方控制列 -->
<div id="control-bar">
  <div id="progress-info">📍 場景 <span id="s-n">1</span> / 6</div>
  <div id="main-actions">
    <button class="btn btn-next" id="btn-next">▶ 下一步</button>
  </div>
  <div id="side-controls">
    <button class="btn btn-small" id="btn-prev" title="上一幕">◀</button>
    <button class="btn btn-small" id="btn-restart" title="從頭">🔁</button>
    <button class="btn btn-small" id="btn-mute" title="靜音">🔊</button>
  </div>
</div>

<script>
// ============================================================
// 狀態
// ============================================================
const state = {
  sceneIdx: 0,
  stepIdx: -1,     // 目前在哪一小步 (-1 = 還沒開始)
  audioOn: true,
};

// ============================================================
// 音效
// ============================================================
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){}
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function beep(freq, dur=0.15, type="sine", gain=0.2){
  if(!state.audioOn || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
const SFX = {
  click(){ beep(600, 0.05, "square", 0.1); },
  reveal(){ beep(440, 0.12, "sine", 0.15); },
  pop(){ beep(880, 0.08, "triangle", 0.15); },
  success(){
    beep(523, 0.15, "sine", 0.18);
    setTimeout(()=>beep(659, 0.15, "sine", 0.18), 140);
    setTimeout(()=>beep(784, 0.25, "sine", 0.2), 280);
  },
  gentle(){ beep(330, 0.2, "sine", 0.14);
    setTimeout(()=>beep(262, 0.25, "sine", 0.14), 180); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"sine",0.22),i*130)); }
};

// ============================================================
// 幾何 (跟前版相同)
// ============================================================
function triangleFromSSS(a,b,c){
  if(a+b<=c || b+c<=a || a+c<=b) return null;
  const x = (c*c + a*a - b*b) / (2*a);
  const y = Math.sqrt(Math.max(c*c - x*x, 0));
  return [
    {x:x,y:-y,label:"A"},
    {x:0,y:0,label:"B"},
    {x:a,y:0,label:"C"},
  ];
}
function transform(pts, cx, cy, scale=20){
  const mx = pts.reduce((s,p)=>s+p.x,0)/3;
  const my = pts.reduce((s,p)=>s+p.y,0)/3;
  return pts.map(p => ({x:cx+(p.x-mx)*scale, y:cy+(p.y-my)*scale, label:p.label}));
}
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpPts(p1,p2,t){
  return p1.map((p,i)=>({x:lerp(p.x,p2[i].x,t), y:lerp(p.y,p2[i].y,t), label:p.label}));
}

// ============================================================
// SVG helpers
// ============================================================
const SVGNS = "http://www.w3.org/2000/svg";
function el(tag, attrs={}, parent=null){
  const e = document.createElementNS(SVGNS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function clearScene(){
  const r = document.getElementById("scene-root");
  r.innerHTML = "";
  return r;
}
function triPath(pts){
  return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y} L${pts[2].x},${pts[2].y} Z`;
}
function drawTri(parent, pts, opts={}){
  const {fill="#E8DAEF", stroke="#9B59B6", sw=4, id="", labels=true, showLen=null} = opts;
  const g = el("g", id?{id}:{}, parent);
  el("path", {d:triPath(pts), fill, stroke, "stroke-width":sw,
    "stroke-linejoin":"round", "stroke-linecap":"round"}, g);
  if(labels){
    pts.forEach(p => {
      const dx = p.label==="A"?0:(p.label==="B"?-20:20);
      const dy = p.label==="A"?-18:24;
      el("text", {x:p.x+dx, y:p.y+dy, "font-size":24, "font-weight":800,
        fill:stroke, "text-anchor":"middle"}, g).textContent = p.label;
    });
  }
  if(showLen){
    // showLen = {AB:5, BC:7, CA:8}
    const midAB = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    const midBC = {x:(pts[1].x+pts[2].x)/2, y:(pts[1].y+pts[2].y)/2};
    const midCA = {x:(pts[2].x+pts[0].x)/2, y:(pts[2].y+pts[0].y)/2};
    el("text", {x:midAB.x-32, y:midAB.y+8, "font-size":26, "font-weight":800,
      fill:stroke}, g).textContent = showLen.AB;
    el("text", {x:midBC.x, y:midBC.y+34, "font-size":26, "font-weight":800,
      fill:stroke, "text-anchor":"middle"}, g).textContent = showLen.BC;
    el("text", {x:midCA.x+22, y:midCA.y+8, "font-size":26, "font-weight":800,
      fill:stroke}, g).textContent = showLen.CA;
  }
  return g;
}

// ============================================================
// 角色 SVG
// ============================================================
function addShinchan(parent, cx, cy, scale=1){
  const g = el("g", {transform:`translate(${cx},${cy}) scale(${scale})`}, parent);
  el("ellipse", {cx:0,cy:0,rx:55,ry:60,fill:"#FAD7A0",stroke:"#7E5109","stroke-width":3}, g);
  el("ellipse", {cx:0,cy:-55,rx:22,ry:18,fill:"#1B2631"}, g);
  el("rect", {x:-28,y:-20,width:24,height:8,fill:"#1B2631",transform:"rotate(-8 -16 -16)"}, g);
  el("rect", {x:4,y:-20,width:24,height:8,fill:"#1B2631",transform:"rotate(8 16 -16)"}, g);
  el("circle", {cx:-15,cy:-5,r:5,fill:"#1B2631"}, g);
  el("circle", {cx:15,cy:-5,r:5,fill:"#1B2631"}, g);
  el("ellipse", {cx:0,cy:18,rx:18,ry:8,fill:"#C0392B",stroke:"#7B241C","stroke-width":2}, g);
  el("rect", {x:-45,y:55,width:90,height:50,fill:"#F1C40F",stroke:"#9A7D0A","stroke-width":2,rx:8}, g);
  el("rect", {x:-35,y:100,width:70,height:30,fill:"#C0392B",stroke:"#7B241C","stroke-width":2}, g);
  return g;
}
function addDoraemon(parent, cx, cy, scale=1){
  const g = el("g", {transform:`translate(${cx},${cy}) scale(${scale})`}, parent);
  el("ellipse", {cx:0,cy:0,rx:65,ry:60,fill:"#3498DB",stroke:"#1B4F72","stroke-width":3}, g);
  el("ellipse", {cx:0,cy:15,rx:50,ry:40,fill:"#fff",stroke:"#1B4F72","stroke-width":2}, g);
  el("ellipse", {cx:-15,cy:-10,rx:12,ry:16,fill:"#fff",stroke:"#1B4F72","stroke-width":2}, g);
  el("ellipse", {cx:15,cy:-10,rx:12,ry:16,fill:"#fff",stroke:"#1B4F72","stroke-width":2}, g);
  el("circle", {cx:-12,cy:-6,r:4,fill:"#1B2631"}, g);
  el("circle", {cx:12,cy:-6,r:4,fill:"#1B2631"}, g);
  el("circle", {cx:0,cy:5,r:10,fill:"#C0392B",stroke:"#7B241C","stroke-width":2}, g);
  for(const [x1,y1,x2,y2] of [[-10,15,-35,10],[-10,20,-35,22],[-10,25,-35,34],
                               [10,15,35,10],[10,20,35,22],[10,25,35,34]]){
    el("line", {x1,y1,x2,y2,stroke:"#1B2631","stroke-width":2}, g);
  }
  el("path", {d:"M-10,32 Q0,40 10,32",fill:"none",stroke:"#1B2631","stroke-width":2}, g);
  el("rect", {x:-30,y:55,width:60,height:8,fill:"#C0392B"}, g);
  el("circle", {cx:0,cy:70,r:14,fill:"#F1C40F",stroke:"#9A7D0A","stroke-width":2}, g);
  el("line", {x1:-10,y1:70,x2:10,y2:70,stroke:"#1B2631","stroke-width":2}, g);
  el("circle", {cx:0,cy:75,r:2,fill:"#1B2631"}, g);
  return g;
}
function addKirby(parent, cx, cy, scale=1){
  const g = el("g", {transform:`translate(${cx},${cy}) scale(${scale})`}, parent);
  el("circle", {cx:0,cy:0,r:55,fill:"#F5B7B1",stroke:"#922B21","stroke-width":3}, g);
  el("ellipse", {cx:-25,cy:55,rx:22,ry:14,fill:"#C0392B",stroke:"#7B241C","stroke-width":2}, g);
  el("ellipse", {cx:25,cy:55,rx:22,ry:14,fill:"#C0392B",stroke:"#7B241C","stroke-width":2}, g);
  el("ellipse", {cx:-14,cy:-10,rx:5,ry:11,fill:"#1B2631"}, g);
  el("ellipse", {cx:14,cy:-10,rx:5,ry:11,fill:"#1B2631"}, g);
  el("ellipse", {cx:-28,cy:8,rx:10,ry:6,fill:"#E74C3C"}, g);
  el("ellipse", {cx:28,cy:8,rx:10,ry:6,fill:"#E74C3C"}, g);
  el("ellipse", {cx:0,cy:10,rx:8,ry:4,fill:"#922B21"}, g);
  return g;
}
function addShirokuma(parent, cx, cy, scale=1){
  const g = el("g", {transform:`translate(${cx},${cy}) scale(${scale})`}, parent);
  el("ellipse", {cx:0,cy:5,rx:58,ry:50,fill:"#FDEBD0",stroke:"#7E5109","stroke-width":3}, g);
  el("circle", {cx:-40,cy:-35,r:16,fill:"#FDEBD0",stroke:"#7E5109","stroke-width":2}, g);
  el("circle", {cx:40,cy:-35,r:16,fill:"#FDEBD0",stroke:"#7E5109","stroke-width":2}, g);
  el("circle", {cx:-18,cy:-5,r:5,fill:"#1B2631"}, g);
  el("circle", {cx:18,cy:-5,r:5,fill:"#1B2631"}, g);
  el("ellipse", {cx:-32,cy:15,rx:10,ry:6,fill:"#F5B7B1"}, g);
  el("ellipse", {cx:32,cy:15,rx:10,ry:6,fill:"#F5B7B1"}, g);
  el("ellipse", {cx:0,cy:12,rx:6,ry:4,fill:"#7E5109"}, g);
  el("path", {d:"M-8,22 Q0,28 8,22",fill:"none",stroke:"#7E5109","stroke-width":2}, g);
  return g;
}
function addBubble(parent, x, y, w, h, text, tail="left"){
  const g = el("g", {}, parent);
  el("rect", {x,y,width:w,height:h,rx:18,ry:18,fill:"#fff",stroke:"#34495E","stroke-width":3}, g);
  const tx = tail==="left" ? x-12 : x+w+12;
  const ty = y + h*0.65;
  el("path", {
    d: tail==="left" ? `M${x+20},${ty} L${tx},${ty+5} L${x+25},${ty+20} Z`
                     : `M${x+w-20},${ty} L${tx},${ty+5} L${x+w-25},${ty+20} Z`,
    fill:"#fff", stroke:"#34495E", "stroke-width":3
  }, g);
  const lines = text.split("\n");
  const lh = Math.min(30, h/(lines.length+1));
  lines.forEach((ln,i)=>{
    el("text", {x:x+w/2, y:y+h/2-(lines.length-1)*lh/2+i*lh,
      "text-anchor":"middle","dominant-baseline":"middle",
      "font-size":Math.min(22,lh*0.75), "font-weight":700,
      fill:"#2C3E50","font-family":"Microsoft JhengHei,sans-serif"}, g)
      .textContent = ln;
  });
  return g;
}

// ============================================================
// 旁白 / 提示
// ============================================================
function setNarration(text){
  const n = document.getElementById("narration");
  if(text){ n.textContent = text; n.classList.add("visible"); }
  else { n.classList.remove("visible"); }
}
function setTeacherTip(text){
  document.getElementById("tip-content").innerHTML = text;
}
function flashCorrect(){
  SFX.success();
  const f = document.createElement("div");
  f.className = "flash"; f.textContent = "✅";
  document.getElementById("stage").appendChild(f);
  setTimeout(()=>f.remove(), 700);
  confetti(20);
}
function flashRetry(){
  SFX.gentle();
  const f = document.createElement("div");
  f.className = "flash"; f.textContent = "💛 再想想";
  f.style.fontSize = "60px"; f.style.color = "#E67E22";
  document.getElementById("stage").appendChild(f);
  setTimeout(()=>f.remove(), 900);
}
function confetti(n=20){
  const colors = ["#E74C3C","#3498DB","#F39C12","#9B59B6","#27AE60","#F4D03F"];
  for(let i=0;i<n;i++){
    const d = document.createElement("div");
    d.className = "confetti";
    d.style.left = Math.random()*100+"vw";
    d.style.background = colors[i%colors.length];
    d.style.animationDelay = (Math.random()*0.6)+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 3200);
  }
}

// ============================================================
// 場景資料: 每個場景有 step[] 陣列
// 每步 {tip: 老師提示, narrate: 學生看的大字, action: 要做什麼}
// ============================================================
const scenes = [
// ============ 場景 1: 疊合 ============
{
  name: "疊合實驗",
  init(){
    const root = clearScene();
    const A = triangleFromSSS(6, 8, 10);
    const pts1 = transform(A, 500, 460, 30);
    const pts2 = transform(A, 1100, 460, 30);
    drawTri(root, pts1, {fill:"#FADBD8", stroke:"#E74C3C", sw:5, id:"t1"});
    drawTri(root, pts2, {fill:"#D6EAF8", stroke:"#3498DB", sw:5, id:"t2"});
    addShinchan(root, 180, 700, 1.1);
    addBubble(root, 280, 580, 280, 100, "我要兩個\n一樣的三角積木！");
    this._orig = pts2;
    this._target = pts1;
  },
  steps: [
    {
      tip:"說：『小新訂了兩個一樣的三角積木。怎麼證明它們一樣？』<br><b>先讓學生猜 10 秒</b>再按下一步。",
      narrate:"怎麼確認兩個三角形一樣？",
      run(){ /* 只顯示初始畫面 */ }
    },
    {
      tip:"說：『想一想，如果兩個東西一樣——疊起來會怎樣？』然後按下一步，看畫面自動把藍色疊到紅色上。",
      narrate:"試試看：把藍色疊到紅色上！",
      run(){
        // 動畫把 t2 平移到 t1
        const from = this._orig;
        const to = this._target;
        animateTri("t2", from, to, 60, () => {
          // 改成紫色 = 全等
          const t2p = document.querySelector("#t2 path");
          if(t2p){ t2p.setAttribute("fill","#E8DAEF"); t2p.setAttribute("stroke","#9B59B6"); }
          SFX.success();

// ============================================================
// 三角形動畫 (補間)
// ============================================================
let animId = 0;
function animateTri(elemId, from, to, frames, onDone){
  cancelAnimationFrame(animId);
  let f = 0;
  const tick = () => {
    f++;
    const t = f / frames;
    const cur = lerpPts(from, to, t);
    const p = document.querySelector(`#${elemId} path`);
    if(p) p.setAttribute("d", triPath(cur));
    if(f < frames) animId = requestAnimationFrame(tick);
    else if(onDone) onDone();
  };
  tick();
}

// ============================================================
// 控制：下一步 / 場景切換
// ============================================================
function renderScene(){
  const scene = scenes[state.sceneIdx];
  state.stepIdx = -1;
  scene.init && scene.init();
  setNarration("");
  setTeacherTip(`<b>🎬 第 ${state.sceneIdx+1} 幕：${scene.name}</b><br>按「▶ 下一步」開始`);
  document.getElementById("s-n").textContent = state.sceneIdx + 1;
  document.getElementById("scene-tag").textContent = `${state.sceneIdx+1}/6`;
  // 進度條
  document.querySelectorAll(".prog-seg").forEach((s,i)=>{
    s.classList.remove("done","current");
    if(i < state.sceneIdx) s.classList.add("done");
    else if(i === state.sceneIdx) s.classList.add("current");
  });
  // 按鈕恢復預設
  const actions = document.getElementById("main-actions");
  actions.innerHTML = "";
  const b = document.createElement("button");
  b.className = "btn btn-next";
  b.id = "btn-next";
  b.textContent = "▶ 下一步";
  b.onclick = advanceStep;
  actions.appendChild(b);
}

function advanceStep(){
  SFX.click();
  ensureAudio();
  const scene = scenes[state.sceneIdx];
  state.stepIdx++;
  if(state.stepIdx < scene.steps.length){
    // 執行步驟
    const step = scene.steps[state.stepIdx];
    setTeacherTip(`<b>🎬 第 ${state.sceneIdx+1}.${state.stepIdx+1} 步</b><br>${step.tip}`);
    setNarration(step.narrate);
    step.run && step.run.call(scene);
    // 如果是場景5 且是最後一步, 顯示答題按鈕
    if(scene.onFinalStep && state.stepIdx === scene.steps.length - 1){
      setTimeout(()=>scene.onFinalStep(), 600);
    }
  } else {
    // 步驟完成 → 顯示「進入下一幕」按鈕
    if(scene.afterSteps){
      setTeacherTip(`<b>✅ 本幕完成</b><br>${scene.afterSteps.tip}`);
      if(scene.afterSteps.narrate) setNarration(scene.afterSteps.narrate);
    }
    const actions = document.getElementById("main-actions");
    actions.innerHTML = "";
    if(state.sceneIdx < scenes.length - 1){
      const nx = document.createElement("button");
      nx.className = "btn btn-scene-next";
      nx.textContent = "▶ 進入下一幕";
      nx.onclick = () => nextScene();
      actions.appendChild(nx);
    } else {
      const rst = document.createElement("button");
      rst.className = "btn btn-scene-next";
      rst.textContent = "🔁 再來一次";
      rst.onclick = () => { state.sceneIdx = 0; renderScene(); };
      actions.appendChild(rst);
    }
  }
}

function nextScene(){
  SFX.click();
  if(state.sceneIdx < scenes.length - 1){
    state.sceneIdx++;
    renderScene();
  }
}
function prevScene(){
  SFX.click();
  if(state.sceneIdx > 0){
    state.sceneIdx--;
    renderScene();
  }
}

// ============================================================
// 初始化
// ============================================================
document.addEventListener("click", ensureAudio, {once:true});
document.addEventListener("touchstart", ensureAudio, {once:true});
document.getElementById("btn-prev").onclick = prevScene;
document.getElementById("btn-restart").onclick = () => {
  SFX.click();
  state.sceneIdx = 0; renderScene();
};
document.getElementById("btn-mute").onclick = (e) => {
  state.audioOn = !state.audioOn;
  e.currentTarget.textContent = state.audioOn ? "🔊" : "🔇";
  if(state.audioOn) SFX.click();
};
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight" || e.key === " "){ e.preventDefault(); advanceStep(); }
  if(e.key === "ArrowLeft") prevScene();
});

renderScene();
</script>
