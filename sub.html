.pick .sub{font-size:.95em;color:#888;font-weight:600}

.pending{opacity:.55;cursor:default}
.pending:hover{background:#fff;color:#111;transform:none;box-shadow:none}
.pending:hover .sub{color:#888}
@media(max-width:500px){.pick{grid-template-columns:1fr}}
