<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代課工作區</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',-apple-system,'Segoe UI',sans-serif;background:#fafafa;color:#1a1a1a;padding:28px 16px;min-height:100vh}
.wrap{max-width:720px;margin:0 auto}
header{text-align:center;border-bottom:2px solid #111;padding-bottom:14px;margin-bottom:28px}
h1{font-size:1.9em;font-weight:900;letter-spacing:-.5px}
.meta{color:#666;font-size:.92em;margin-top:4px}

.day-block{margin-bottom:26px}
.day-title{font-size:1.05em;font-weight:800;color:#111;padding:4px 0 10px;border-bottom:1px dashed #ccc;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.day-title::before{content:'';width:4px;height:16px;background:#111;border-radius:2px}

.pick{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pick a{display:block;padding:22px 16px;border:2px solid #111;border-radius:12px;background:#fff;text-decoration:none;color:#111;text-align:center;transition:all .15s}
.pick a:hover{background:#111;color:#fff;transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.1)}
.pick .cls{font-size:1.8em;font-weight:900;letter-spacing:-1px}
.pick .sub{font-size:.85em;color:#888;font-weight:600;margin-top:4px}
.pick a:hover .sub{color:#ddd}
@media(max-width:500px){.pick{grid-template-columns:1fr}}

footer{text-align:center;color:#999;font-size:.82em;margin-top:28px;padding-top:14px;border-top:1px solid #eee}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>代課工作區</h1>
    <div class="meta">請選班級</div>
  </header>

  <!-- 4/28（二） -->
  <div class="day-block">
    <div class="day-title">4/28（二）</div>
    <div class="pick">
      <a href="sub-9a-0428.html">
        <div class="cls">9A</div>
        <div class="sub">下午第一節 · 過去式特訓上半</div>
      </a>
    </div>
  </div>

  <footer>Stacey · classtools1020</footer>
</div>
</body>
</html>
