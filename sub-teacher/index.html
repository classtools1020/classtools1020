<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代課老師專區 | 芎林國中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #F5E6D3 0%, #E8D0B3 100%);
    min-height: 100vh;
    padding: 20px;
    color: #6B3A1F;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    background: #8B4513;
    color: #FFF8E7;
    padding: 30px 20px;
    border-radius: 20px;
    margin-bottom: 25px;
    box-shadow: 0 4px 12px rgba(139,69,19,0.3);
  }
  h1 {
    font-size: 2.2rem;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 1.1rem;
    color: #F5E6D3;
    opacity: 0.95;
  }
  .teacher-info {
    background: #FFF8E7;
    border: 3px solid #D4A574;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    font-size: 1.1rem;
    line-height: 1.8;
  }
  .teacher-info strong { color: #8B4513; }
  .section-title {
    font-size: 1.3rem;
    font-weight: bold;
    color: #8B4513;
    margin: 25px 10px 12px;
    padding-left: 10px;
    border-left: 5px solid #8B4513;
  }
  .day-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .day-btn {
    display: block;
    background: #FFF8E7;
    border: 4px solid #8B4513;
    border-radius: 20px;
    padding: 25px;
    text-decoration: none;
    color: #6B3A1F;
    box-shadow: 0 6px 16px rgba(139,69,19,0.25);
    transition: all 0.2s;
    min-height: 48px;
  }
  .day-btn.math {
    border-color: #1B5E8F;
    background: #F0F7FB;
  }
  .day-btn.math .date {
    color: #1B5E8F;
  }
  .day-btn:hover, .day-btn:active {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(139,69,19,0.35);
    background: #D4A574;
  }
  .day-btn.math:hover, .day-btn.math:active {
    background: #B5D9EC;
    box-shadow: 0 10px 20px rgba(27,94,143,0.35);
  }
  .day-btn .date {
    font-size: 1.6rem;
    font-weight: bold;
    color: #8B4513;
    margin-bottom: 8px;
  }
  .day-btn .title {
    font-size: 1.35rem;
    color: #6B3A1F;
    line-height: 1.4;
  }
  .day-btn .icon {
    font-size: 2.3rem;
    margin-right: 10px;
    vertical-align: middle;
  }
  .day-btn .sub {
    font-size: 0.95rem;
    color: #8B4513;
    margin-top: 5px;
  }
  .day-btn.math .sub {
    color: #1B5E8F;
  }
  .footer {
    text-align: center;
    margin-top: 30px;
    color: #8B4513;
    font-size: 0.95rem;
    opacity: 0.8;
  }
  @media (max-width: 480px) {
    h1 { font-size: 1.7rem; }
    .day-btn .date { font-size: 1.35rem; }
    .day-btn .title { font-size: 1.15rem; }
    .section-title { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>👩‍🏫 代課老師專區</h1>
    <div class="subtitle">芎林國中 · 特教班社會科 + 8A 資源班數學</div>
  </div>

  <div class="teacher-info">
    <strong>🙏 老師您好，辛苦了！</strong><br>
    這兩天麻煩您了。<br>
    點選下方<strong>當天 + 科目</strong>，有上課流程和教材連結。
  </div>

  <div class="section-title">📚 特教班 · 社會科</div>
  <div class="day-buttons">
    <a href="thursday.html" class="day-btn">
      <div class="date"><span class="icon">📅</span>禮拜四（4/23）</div>
      <div class="title">🌍 環遊世界美食偵探<div class="sub">（日本・印度・非洲）</div></div>
    </a>

    <a href="friday.html" class="day-btn">
      <div class="date"><span class="icon">📅</span>禮拜五（4/24）</div>
      <div class="title">🍛 今天吃咖哩！<div class="sub">（實作體驗課）</div></div>
    </a>
  </div>

  <div class="section-title">📐 8A 資源班 · 數學</div>
  <div class="day-buttons">
    <a href="congruence-thu.html" class="day-btn math">
      <div class="date"><span class="icon">📅</span>禮拜四（4/23）</div>
      <div class="title">🔺 全等三角形 · SSS<div class="sub">（三邊相同就全等）</div></div>
    </a>

    <a href="congruence-fri.html" class="day-btn math">
      <div class="date"><span class="icon">📅</span>禮拜五（4/24）</div>
      <div class="title">🔷 全等三角形 · SAS + ASA<div class="sub">（新招式登場）</div></div>
    </a>
  </div>

  <div class="footer">
    芎林國中
  </div>
</div>
</body>
</html>
