<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(135deg, #F5E6D3 0%, #E8D0B3 100%);
    min-height: 100vh;
    padding: 15px;
    color: #6B3A1F;
    line-height: 1.6;
  }
  .container { max-width: 750px; margin: 0 auto; }
  .back-btn {
    display: inline-block;
    background: #8B4513;
    color: #FFF8E7;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 1rem;
    margin-bottom: 20px;
    min-height: 48px;
    line-height: 1.5;
  }
  .back-btn:hover { background: #6B3A1F; }
  .header {
    background: #8B4513;
    color: #FFF8E7;
    padding: 25px 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(139,69,19,0.3);
  }
  h1 { font-size: 1.9rem; margin-bottom: 5px; letter-spacing: 1px; }
  .date-label { font-size: 1.05rem; color: #F5E6D3; margin-top: 5px; }
  .core-concept {
    background: #FFF8E7;
    border: 3px solid #D4A574;
    border-radius: 15px;
    padding: 18px;
    margin-bottom: 20px;
    font-size: 1.15rem;
    text-align: center;
  }
  .core-concept strong { color: #8B4513; font-size: 1.3rem; }

  .step-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: #8B4513;
    margin: 25px 10px 12px;
    padding-left: 12px;
    border-left: 5px solid #8B4513;
  }

  .flow-steps {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 25px;
  }
  .step-btn {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #FFF8E7;
    border: 3px solid #8B4513;
    border-radius: 15px;
    padding: 20px;
    text-decoration: none;
    color: #6B3A1F;
    box-shadow: 0 4px 10px rgba(139,69,19,0.18);
    transition: all 0.2s;
    min-height: 48px;
  }
  .step-btn:hover, .step-btn:active {
    background: #D4A574;
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(139,69,19,0.3);
  }
  .step-btn.no-link {
    cursor: default;
    background: #FBF3E4;
  }
  .step-btn.no-link:hover {
    transform: none;
    background: #FBF3E4;
  }
  .step-num {
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    background: #8B4513;
    color: #FFF;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: bold;
  }
  .step-body { flex: 1; min-width: 0; }
  .step-body .title-text {
    font-size: 1.2rem;
    font-weight: bold;
    color: #8B4513;
    margin-bottom: 4px;
  }
  .step-body .desc {
    font-size: 0.95rem;
    color: #7A5A42;
  }
  .step-arrow {
    font-size: 1.8rem;
    color: #8B4513;
    flex-shrink: 0;
  }
  .step-btn.no-link .step-arrow { display: none; }

  .video-box {
    background: #FFF3D4;
    border: 3px solid #E5A93A;
    border-radius: 15px;
    padding: 18px;
    margin: 25px 0;
  }
  .video-box .v-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: #8B6414;
    margin-bottom: 10px;
    text-align: center;
  }
  .video-box a {
    display: block;
    background: #FFF8E7;
    border: 2px solid #E5A93A;
    border-radius: 10px;
    padding: 12px 15px;
    margin: 8px 0;
    text-decoration: none;
    color: #6B4C00;
    font-size: 1rem;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .video-box a:hover { background: #FFE5B8; }

  .footer {
    text-align: center;
    margin-top: 30px;
    color: #8B4513;
    font-size: 0.95rem;
    opacity: 0.8;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .step-body .title-text { font-size: 1.05rem; }
    .step-body .desc { font-size: 0.88rem; }
    .step-num { width: 44px; height: 44px; font-size: 1.3rem; }
  }
</style>
</head>
