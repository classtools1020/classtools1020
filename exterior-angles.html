<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外角和 = 360° 動畫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1D3A;font-family:'Noto Sans TC',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1px 1px at 10% 20%,#FFD700 100%,transparent),radial-gradient(1.5px 1.5px at 50% 10%,#fff 100%,transparent),radial-gradient(1px 1px at 70% 40%,#FFD700 100%,transparent),radial-gradient(1px 1px at 90% 80%,#fff 100%,transparent);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:900px;padding:16px}
h1{text-align:center;font-size:1.9em;font-weight:900;margin:8px 0 4px;background:linear-gradient(135deg,#FF6B35,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#4FC3F7;font-size:1em;margin-bottom:10px}
/* Tabs */
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
.tab{padding:10px 20px;border-radius:30px;border:2px solid #2A5A8A;background:#1A3A6A;font-family:'Noto Sans TC',sans-serif;font-size:1em;font-weight:700;color:#B0C4DE;cursor:pointer;transition:all .3s}
.tab.active{background:linear-gradient(135deg,#FF6B35,#FF8F60);color:#fff;border-color:transparent}
canvas{width:100%;max-width:700px;height:auto;display:block;margin:0 auto;border-radius:16px;background:#112D5A;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.controls{display:flex;justify-content:center;gap:12px;margin:14px 0;flex-wrap:wrap}
.btn{padding:12px 28px;border:none;border-radius:50px;font-family:'Noto Sans TC',sans-serif;font-size:1em;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn-next{background:linear-gradient(135deg,#FF6B35,#FF8F60);color:#fff}
.btn-prev{background:#1A3A6A;color:#B0C4DE;border:2px solid #2A5A8A}
.btn-reset{background:#1A3A6A;color:#FFD700;border:2px solid #FFD700}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.info-card{background:#1A3A6A;border-radius:16px;padding:16px 20px;margin:10px auto;max-width:700px;box-shadow:0 4px 16px rgba(0,0,0,0.3);border-left:5px solid #FF6B35;transition:all .4s}
.step-label{font-size:.85em;color:#00C9A7;font-weight:700;margin-bottom:4px}
.step-text{font-size:1.1em;line-height:1.6}
.formula{display:inline-block;background:#FF6B35;color:#fff;padding:5px 16px;border-radius:8px;font-weight:900;font-size:1.2em;margin-top:6px}
.progress-bar{display:flex;justify-content:center;gap:6px;margin:6px 0}
.progress-dot{width:12px;height:12px;border-radius:50%;background:#1A3A6A;border:2px solid #2A5A8A;transition:all .3s}
.progress-dot.active{background:#00C9A7;border-color:#00C9A7}
.progress-dot.done{background:#FF6B35;border-color:#FF6B35}
</style>
</head>
<body>
<div class="container">
  <h1>🔄 外角和 = 360°</h1>
  <p class="subtitle">不管幾邊形，外角轉一圈，永遠 360°！</p>
  <div class="tabs">
    <div class="tab active" onclick="switchShape(3)">🔺 三角形</div>
    <div class="tab" onclick="switchShape(4)">🔷 四邊形</div>
    <div class="tab" onclick="switchShape(5)">⬠ 五邊形</div>
  </div>
  <div class="progress-bar" id="progressBar"></div>
  <canvas id="c" width="700" height="500"></canvas>
  <div class="info-card" id="infoCard">
    <div class="step-label" id="stepLabel"></div>
    <div class="step-text" id="stepText"></div>
  </div>
  <div class="controls">
    <button class="btn btn-prev" id="prevBtn" onclick="prev()">⬅ 上一步</button>
    <button class="btn btn-next" id="nextBtn" onclick="next()">下一步 ➡</button>
    <button class="btn btn-reset" onclick="reset()">🔄 重來</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=700,H=500;
if(!ctx.roundRect){ctx.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r,r,r,r];this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);this.closePath()}}

const extColors=['#FF6B35','#4FC3F7','#FFD700','#00E676','#FF2D95'];
const colShape='#00C9A7';

// Shape definitions
const SHAPES={
  3:{name:'三角形',icon:'🔺',verts:[{x:350,y:70},{x:120,y:400},{x:580,y:400}]},
  4:{name:'四邊形',icon:'🔷',verts:[{x:180,y:80},{x:560,y:110},{x:600,y:390},{x:120,y:400}]},
  5:{name:'五邊形',icon:'⬠',verts:[{x:350,y:55},{x:580,y:180},{x:510,y:420},{x:190,y:420},{x:120,y:180}]},
};

let curN=3,step=0,anim=0,animId=null,animLoop=null;

// Each shape has N+4 steps:
// 0: show shape
// 1: explain exterior angle concept
// 2..N+1: show each exterior angle one by one
// N+2: collect all exterior angles, animate walking/rotating
// N+3: conclusion = 360°
function totalSteps(){return curN+4;}

function getSteps(){
  const n=curN,s=SHAPES[n];
  const steps=[
    {label:`${s.icon} 開始`,text:`這是一個${s.name}！\n它有 ${n} 個頂點`,border:'#00C9A7'},
    {label:'什麼是外角？',text:'在每個頂點，把一條邊延長\n延長線和另一條邊之間的角\n就是「外角」！',border:'#FFD700'},
  ];
  for(let i=0;i<n;i++){
    steps.push({label:`第 ${i+1} 個外角`,text:`在頂點 ${String.fromCharCode(65+i)} 的外角\n把邊延長，看看外角有多大！`,border:extColors[i]});
  }
  steps.push({label:'🔄 轉一圈！',text:`沿著${s.name}走一圈⋯\n每到一個頂點就轉一個外角\n走完一圈，你轉了多少度？`,border:'#FF6B35'});
  steps.push({label:'🎉 結論',text:'',border:'#00E676'});
  return steps;
}

function lerp(a,b,t){return a+(b-a)*t}

// Compute exterior angle direction at vertex i
function getExteriorAngle(verts,i){
  const n=verts.length;
  const prev=verts[(i-1+n)%n];
  const cur=verts[i];
  const next=verts[(i+1)%n];
  // Direction from prev to cur (incoming)
  const inAngle=Math.atan2(cur.y-prev.y,cur.x-prev.x);
  // Direction from cur to next (outgoing)
  const outAngle=Math.atan2(next.y-cur.y,next.x-cur.x);
  // Extension of incoming edge: same direction as inAngle
  const extStart=inAngle; // direction of extension (same as incoming)
  const extEnd=outAngle; // direction of outgoing edge
  // Exterior angle is measured from the extension to the outgoing edge
  // We want the angle swept clockwise (for a clockwise polygon)
  let ext=outAngle-inAngle;
  // Normalize
  while(ext>Math.PI)ext-=Math.PI*2;
  while(ext<-Math.PI)ext+=Math.PI*2;
  return{inAngle,outAngle,ext,extStart,extEnd};
}

function drawShape(verts,alpha){
  ctx.globalAlpha=alpha;ctx.beginPath();
  verts.forEach((v,i)=>{if(i===0)ctx.moveTo(v.x,v.y);else ctx.lineTo(v.x,v.y);});
  ctx.closePath();ctx.strokeStyle=colShape;ctx.lineWidth=4;ctx.stroke();ctx.globalAlpha=1;
}

function drawVertices(verts,alpha){
  const n=verts.length;
  verts.forEach((v,i)=>{
    ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(v.x,v.y,7,0,Math.PI*2);ctx.fillStyle=extColors[i%5];ctx.fill();
    ctx.font='bold 20px "Noto Sans TC"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=extColors[i%5];
    // Offset label outward from center
    const cx=verts.reduce((s,v)=>s+v.x,0)/n;
    const cy=verts.reduce((s,v)=>s+v.y,0)/n;
    const dx=v.x-cx,dy=v.y-cy;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    ctx.fillText(String.fromCharCode(65+i),v.x+dx/dist*25,v.y+dy/dist*25);
    ctx.globalAlpha=1;
  });
}

function drawExtension(verts,i,progress,alpha){
  const n=verts.length;
  const prev=verts[(i-1+n)%n],cur=verts[i];
  const dx=cur.x-prev.x,dy=cur.y-prev.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len,uy=dy/len;
  const extLen=80*progress;
  ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.setLineDash([8,6]);
  ctx.moveTo(cur.x,cur.y);
  ctx.lineTo(cur.x+ux*extLen,cur.y+uy*extLen);
  ctx.strokeStyle=extColors[i%5];ctx.lineWidth=3;ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
  return{ex:cur.x+ux*extLen,ey:cur.y+uy*extLen};
}

function drawExteriorArc(verts,i,alpha,radius){
  radius=radius||35;
  const n=verts.length;
  const prev=verts[(i-1+n)%n],cur=verts[i],next=verts[(i+1)%n];
  const inAngle=Math.atan2(cur.y-prev.y,cur.x-prev.x);
  const outAngle=Math.atan2(next.y-cur.y,next.x-cur.x);
  // The exterior angle arc goes from inAngle (extension direction) to outAngle
  // We draw it as a colored arc
  ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.moveTo(cur.x,cur.y);
  // Determine sweep direction
  ctx.arc(cur.x,cur.y,radius,inAngle,outAngle,false);
  ctx.closePath();
  ctx.fillStyle=extColors[i%5];ctx.fill();
  ctx.globalAlpha=1;
}

function drawLabel(x,y,text,color,size,alpha){
  ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.font=`bold ${size}px "Noto Sans TC"`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x,y);ctx.globalAlpha=1;
}

// Walking arrow animation
function drawWalkingArrow(verts,progress){
  const n=verts.length;
  // Progress 0→1 goes around the full polygon
  const totalLen=[];
  let total=0;
  for(let i=0;i<n;i++){
    const next=verts[(i+1)%n];
    const dx=next.x-verts[i].x,dy=next.y-verts[i].y;
    const l=Math.sqrt(dx*dx+dy*dy);
    totalLen.push(l);total+=l;
  }
  const targetDist=progress*total;
  let accum=0,seg=0;
  for(let i=0;i<n;i++){
    if(accum+totalLen[i]>=targetDist){seg=i;break;}
    accum+=totalLen[i];
  }
  const segProgress=(targetDist-accum)/totalLen[seg];
  const cur=verts[seg],next=verts[(seg+1)%n];
  const px=lerp(cur.x,next.x,segProgress);
  const py=lerp(cur.y,next.y,segProgress);
  const angle=Math.atan2(next.y-cur.y,next.x-cur.x);

  // Draw arrow
  ctx.save();ctx.translate(px,py);ctx.rotate(angle);
  ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(-8,-8);ctx.lineTo(-8,8);ctx.closePath();
  ctx.fillStyle='#FF6B35';ctx.fill();
  ctx.restore();

  // Draw trail
  ctx.beginPath();ctx.moveTo(verts[0].x,verts[0].y);
  for(let i=0;i<=seg;i++){
    ctx.lineTo(verts[(i+1)%n].x,verts[(i+1)%n].y);
  }
  if(segProgress<1)ctx.lineTo(px,py);
  ctx.strokeStyle='rgba(255,107,53,0.5)';ctx.lineWidth=6;ctx.stroke();

  // Show cumulative rotation
  const completedAngles=seg+(segProgress>.5?1:0);
  if(completedAngles>0){
    drawLabel(350,50,`已轉 ${completedAngles} 個外角...`,'#FFD700',20,1);
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  const verts=SHAPES[curN].verts;
  const n=curN;
  const T=totalSteps();

  if(step===0){
    // Just shape
    drawShape(verts,1);drawVertices(verts,1);
  }
  else if(step===1){
    // Explain exterior angle - show one example
    drawShape(verts,1);drawVertices(verts,1);
    drawExtension(verts,0,anim,1);
    drawExteriorArc(verts,0,0.5*anim,40);
    // Label
    if(anim>0.3){
      const prev=verts[n-1],cur=verts[0];
      const dx=cur.x-prev.x,dy=cur.y-prev.y;
      const len=Math.sqrt(dx*dx+dy*dy);
      drawLabel(cur.x+dx/len*55,cur.y+dy/len*55-20,'← 外角',extColors[0],18,anim);
    }
  }
  else if(step>=2&&step<2+n){
    // Show exterior angle one by one
    const showIdx=step-2;
    drawShape(verts,1);drawVertices(verts,1);
    // Show all previous exterior angles
    for(let i=0;i<showIdx;i++){
      drawExtension(verts,i,1,0.7);
      drawExteriorArc(verts,i,0.4,35);
    }
    // Animate current one
    drawExtension(verts,showIdx,anim,1);
    drawExteriorArc(verts,showIdx,0.5*anim,40);
    // Pulse current
    if(anim>=1){
      const pulse=0.4+0.15*Math.sin(Date.now()/400);
      drawExteriorArc(verts,showIdx,pulse,42);
      requestAnimationFrame(render);
    }
  }
  else if(step===2+n){
    // Walking animation - all exterior angles shown, arrow walks around
    drawShape(verts,0.5);drawVertices(verts,0.8);
    // All exterior angles
    for(let i=0;i<n;i++){
      drawExtension(verts,i,1,0.6);
      drawExteriorArc(verts,i,0.4,35);
    }
    // Walking arrow
    if(anim<=1){
      drawWalkingArrow(verts,anim);
    }
    // At end, show "轉了一圈！"
    if(anim>=0.95){
      drawLabel(350,250,'🔄 轉了一整圈！','#00E676',28,1);
      drawLabel(350,285,'= 360°','#FFD700',32,1);
    }
  }
  else if(step===T-1){
    // Grand finale
    drawShape(verts,0.3);
    for(let i=0;i<n;i++){
      drawExtension(verts,i,1,0.5);
      drawExteriorArc(verts,i,0.35,35);
    }

    const pulse=1+0.05*Math.sin(Date.now()/300);
    ctx.save();ctx.translate(350,240);ctx.scale(pulse,pulse);
    ctx.fillStyle='rgba(255,107,53,0.95)';ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(-175,-80,350,160,24);else ctx.rect(-175,-80,350,160);
    ctx.fill();ctx.strokeStyle='#FFD700';ctx.lineWidth=5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 22px "Noto Sans TC"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`${SHAPES[n].name}外角和`,0,-45);
    ctx.fillStyle='#fff';ctx.font='bold 18px "Noto Sans TC"';
    ctx.fillText(`${n} 個外角，轉一圈`,0,-15);
    ctx.fillStyle='#FFD700';ctx.font='bold 52px "Noto Sans TC"';
    ctx.fillText('= 360°',0,35);
    ctx.restore();

    const t=Date.now()/500;
    ['🔄','✨','⭐','🔄','✨','⭐'].forEach((e,i)=>{
      const sx=350+Math.cos(t+i*1.05)*260;
      const sy=240+Math.sin(t+i*1.4)*150;
      ctx.font='20px serif';ctx.textAlign='center';ctx.fillText(e,sx,sy);
    });
    requestAnimationFrame(render);
  }
}

function animateTo(target,duration,cb){
  if(animId)cancelAnimationFrame(animId);
  const start=anim,startTime=performance.now();
  function tick(now){
    const t=Math.min((now-startTime)/duration,1);
    const ease=1-Math.pow(1-t,3);anim=start+(target-start)*ease;render();
    if(t<1)animId=requestAnimationFrame(tick);
    else{anim=target;render();if(cb)cb();}
  }
  animId=requestAnimationFrame(tick);
}

function updateUI(){
  const steps=getSteps();const s=steps[step];
  document.getElementById('stepLabel').textContent=s.label;
  const T=totalSteps();
  if(step===T-1){
    document.getElementById('stepText').innerHTML=`${SHAPES[curN].name}的外角和<br><span class="formula">永遠 = 360° ！</span><br><br>不管幾邊形，外角轉一圈都是 360°`;
  }else{
    document.getElementById('stepText').innerHTML=s.text.replace(/\n/g,'<br>');
  }
  document.getElementById('infoCard').style.borderLeftColor=s.border;
  document.getElementById('prevBtn').disabled=step===0;
  document.getElementById('nextBtn').disabled=step===T-1;
  // Progress dots
  const bar=document.getElementById('progressBar');bar.innerHTML='';
  for(let i=0;i<T;i++){
    const d=document.createElement('div');d.className='progress-dot';
    if(i<step)d.classList.add('done');else if(i===step)d.classList.add('active');
    bar.appendChild(d);
  }
  // Tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[curN-3].classList.add('active');
}

function next(){if(step>=totalSteps()-1)return;step++;anim=0;updateUI();
  const dur=step===curN+2?2500:900; // Walking step is slower
  animateTo(1,dur);
}
function prev(){if(step<=0)return;step--;anim=1;updateUI();render();}
function reset(){step=0;anim=0;updateUI();render();}
function switchShape(n){curN=n;step=0;anim=0;updateUI();render();}

updateUI();render();
</script>
</body>
</html>
