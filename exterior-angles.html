<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外角和 = 360° 動畫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1D3A;font-family:'Noto Sans TC',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1px 1px at 10% 20%,#FFD700 100%,transparent),radial-gradient(1.5px 1.5px at 50% 10%,#fff 100%,transparent),radial-gradient(1px 1px at 70% 40%,#FFD700 100%,transparent),radial-gradient(1px 1px at 90% 80%,#fff 100%,transparent);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:900px;padding:16px}
h1{text-align:center;font-size:1.8em;font-weight:900;margin:8px 0 4px;background:linear-gradient(135deg,#FF6B35,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#4FC3F7;font-size:1em;margin-bottom:10px}
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:10px}
.tab{padding:10px 18px;border-radius:30px;border:2px solid #2A5A8A;background:#1A3A6A;font-family:'Noto Sans TC',sans-serif;font-size:.95em;font-weight:700;color:#B0C4DE;cursor:pointer;transition:all .3s}
.tab.active{background:linear-gradient(135deg,#FF6B35,#FF8F60);color:#fff;border-color:transparent}
canvas{width:100%;max-width:700px;height:auto;display:block;margin:0 auto;border-radius:16px;background:#112D5A;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.controls{display:flex;justify-content:center;gap:10px;margin:14px 0;flex-wrap:wrap}
.btn{padding:12px 26px;border:none;border-radius:50px;font-family:'Noto Sans TC',sans-serif;font-size:1em;font-weight:700;cursor:pointer;transition:all .3s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn-next{background:linear-gradient(135deg,#FF6B35,#FF8F60);color:#fff}
.btn-prev{background:#1A3A6A;color:#B0C4DE;border:2px solid #2A5A8A}
.btn-reset{background:#1A3A6A;color:#FFD700;border:2px solid #FFD700}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.info-card{background:#1A3A6A;border-radius:16px;padding:16px 20px;margin:10px auto;max-width:700px;box-shadow:0 4px 16px rgba(0,0,0,0.3);border-left:5px solid #FF6B35;transition:all .4s}
.step-label{font-size:.85em;color:#00C9A7;font-weight:700;margin-bottom:4px}
.step-text{font-size:1.1em;line-height:1.6}
.formula{display:inline-block;background:#FF6B35;color:#fff;padding:5px 16px;border-radius:8px;font-weight:900;font-size:1.2em;margin-top:6px}
.progress-bar{display:flex;justify-content:center;gap:6px;margin:6px 0}
.progress-dot{width:12px;height:12px;border-radius:50%;background:#1A3A6A;border:2px solid #2A5A8A;transition:all .3s}
.progress-dot.active{background:#00C9A7;border-color:#00C9A7}
.progress-dot.done{background:#FF6B35;border-color:#FF6B35}
</style>
</head>
<body>
<div class="container">
  <h1>🚗 外角和 = 360°</h1>
  <p class="subtitle">小車車跑一圈，撕下外角拼起來！</p>
  <div class="tabs">
    <div class="tab active" onclick="switchShape(3)">🔺 三角形</div>
    <div class="tab" onclick="switchShape(4)">🔷 四邊形</div>
    <div class="tab" onclick="switchShape(5)">⬠ 五邊形</div>
  </div>
  <div class="progress-bar" id="progressBar"></div>
  <canvas id="c" width="700" height="520"></canvas>
  <div class="info-card" id="infoCard">
    <div class="step-label" id="stepLabel"></div>
    <div class="step-text" id="stepText"></div>
  </div>
  <div class="controls">
    <button class="btn btn-prev" id="prevBtn" onclick="prev()">⬅ 上一步</button>
    <button class="btn btn-next" id="nextBtn" onclick="next()">下一步 ➡</button>
    <button class="btn btn-reset" onclick="reset()">🔄 重來</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=700,H=520;

const extC=['#FF6B35','#4FC3F7','#FFD700','#00E676','#FF2D95'];
const colShape='#00C9A7';

// Assembly circle position
const AX=580,AY=130,AR=65;

const SHAPES={
  3:{name:'三角形',icon:'🔺',verts:[{x:280,y:100},{x:80,y:400},{x:480,y:400}]},
  4:{name:'四邊形',icon:'🔷',verts:[{x:140,y:100},{x:460,y:120},{x:480,y:400},{x:80,y:390}]},
  5:{name:'五邊形',icon:'⬠',verts:[{x:280,y:75},{x:480,y:190},{x:420,y:410},{x:140,y:410},{x:80,y:190}]},
};

let curN=3,step=0,anim=0,animId=null;

// Compute exterior (turning) angles for the polygon
function computeExteriors(verts){
  const n=verts.length,result=[];
  for(let i=0;i<n;i++){
    const prev=verts[(i-1+n)%n],cur=verts[i],next=verts[(i+1)%n];
    const inA=Math.atan2(cur.y-prev.y,cur.x-prev.x);
    const outA=Math.atan2(next.y-cur.y,next.x-cur.x);
    let ext=Math.PI-angleBetween(inA,outA);
    // For convex polygon, exterior = PI - interior
    // Turning angle = PI - interior angle
    // Actually let's compute turning angle directly
    let turn=outA-inA;
    while(turn>Math.PI)turn-=2*Math.PI;
    while(turn<-Math.PI)turn+=2*Math.PI;
    // For clockwise polygon, turning angle is negative (turn right)
    // We want the magnitude
    const extAngle=Math.abs(turn);
    // The arc at the vertex goes from the extension of incoming edge to the outgoing edge
    result.push({vertex:cur,inAngle:inA,outAngle:outA,extAngle,turnAngle:turn});
  }
  return result;
}

function angleBetween(a,b){let d=b-a;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return d;}

function lerp(a,b,t){return a+(b-a)*t}
function lerpPt(a,b,t){return{x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t)}}

// Total steps: 0=intro, 1=explain, 2..N+1=collect each angle, N+2=assembled, N+3=conclusion
function totalSteps(){return curN+4;}

function getStepsText(){
  const s=SHAPES[curN],n=curN;
  const arr=[
    {label:`${s.icon} 出發！`,text:`這是一個${s.name}！\n小車車準備出發跑一圈 🚗💨`,border:'#00C9A7'},
    {label:'什麼是外角？',text:'看頂點 A：\n灰色 = 內角（三角形裡面的角）\n把邊延長出去 ➡ 虛線\n橘色 = 外角（延長線和另一條邊中間的角）\n內角＋外角 = 一條直線 = 180°',border:'#FFD700'},
  ];
  for(let i=0;i<n;i++){
    arr.push({label:`🚗 第 ${i+1} 個轉彎`,text:`小車車到了頂點 ${String.fromCharCode(65+i)}！\n轉彎！外角被撕下來\n飛到右邊的圓圈裡！`,border:extC[i]});
  }
  arr.push({label:'🔄 拼起來！',text:`所有外角拼在一起⋯\n剛好變成一個完整的圓！\n一個圓 = 360°`,border:'#FF6B35'});
  arr.push({label:'🎉 結論',text:'',border:'#00E676'});
  return arr;
}

// Draw the polygon
function drawPoly(verts,alpha){
  ctx.globalAlpha=alpha;ctx.beginPath();
  verts.forEach((v,i)=>{i?ctx.lineTo(v.x,v.y):ctx.moveTo(v.x,v.y);});
  ctx.closePath();ctx.strokeStyle=colShape;ctx.lineWidth=4;ctx.stroke();ctx.globalAlpha=1;
}

function drawVerts(verts,alpha){
  const n=verts.length;
  const cx=verts.reduce((s,v)=>s+v.x,0)/n,cy=verts.reduce((s,v)=>s+v.y,0)/n;
  verts.forEach((v,i)=>{
    ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(v.x,v.y,6,0,Math.PI*2);ctx.fillStyle=extC[i];ctx.fill();
    const dx=v.x-cx,dy=v.y-cy,d=Math.sqrt(dx*dx+dy*dy)||1;
    ctx.font='bold 18px "Noto Sans TC"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=extC[i];ctx.fillText(String.fromCharCode(65+i),v.x+dx/d*22,v.y+dy/d*22);
    ctx.globalAlpha=1;
  });
}

// Draw car at position (x,y) facing angle
function drawCar(x,y,angle,alpha){
  ctx.globalAlpha=alpha;ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  // Car body
  ctx.fillStyle='#FF4444';
  ctx.beginPath();
  ctx.moveTo(18,0);ctx.lineTo(-12,-10);ctx.quadraticCurveTo(-16,0,-12,10);ctx.closePath();
  ctx.fill();
  // Windshield
  ctx.fillStyle='#4FC3F7';
  ctx.beginPath();ctx.arc(6,0,5,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(8,-1,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(9,-1,1.2,0,Math.PI*2);ctx.fill();
  // Wheels
  ctx.fillStyle='#333';
  ctx.fillRect(-10,-12,8,3);ctx.fillRect(-10,9,8,3);
  ctx.restore();ctx.globalAlpha=1;
}

// Draw interior angle arc at a vertex (gray, to contrast with exterior)
function drawIntArc(verts,idx,alpha,radius){
  radius=radius||28;
  const n=verts.length;
  const prev=verts[(idx-1+n)%n],cur=verts[idx],next=verts[(idx+1)%n];
  const a1=Math.atan2(prev.y-cur.y,prev.x-cur.x);
  const a2=Math.atan2(next.y-cur.y,next.x-cur.x);
  ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.moveTo(cur.x,cur.y);
  ctx.arc(cur.x,cur.y,radius,a2,a1);
  ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.globalAlpha=1;
}

// Draw label with arrow line pointing to a position
function drawArrowLabel(fromX,fromY,toX,toY,text,color,alpha){
  ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.moveTo(fromX,fromY);ctx.lineTo(toX,toY);
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  // Arrowhead
  const angle=Math.atan2(toY-fromY,toX-fromX);
  ctx.beginPath();
  ctx.moveTo(toX,toY);
  ctx.lineTo(toX-8*Math.cos(angle-0.4),toY-8*Math.sin(angle-0.4));
  ctx.lineTo(toX-8*Math.cos(angle+0.4),toY-8*Math.sin(angle+0.4));
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
  // Text
  ctx.fillStyle=color;ctx.font='bold 15px "Noto Sans TC"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,fromX,fromY-12);
  ctx.globalAlpha=1;
}

// Draw exterior angle arc at a vertex
// The exterior angle is the SMALL angle between the extension line and the outgoing edge
// It's supplementary to the interior angle (interior + exterior = 180°)
function drawExtArc(ext,idx,alpha,radius){
  radius=radius||30;
  const v=ext.vertex;
  // Draw counterclockwise from inAngle to outAngle = the exterior angle (small arc, on the outside)
  ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.moveTo(v.x,v.y);
  ctx.arc(v.x,v.y,radius,ext.inAngle,ext.outAngle,true); // true = counterclockwise = the small outside arc
  ctx.closePath();
  ctx.fillStyle=extC[idx];ctx.fill();
  ctx.strokeStyle=extC[idx];ctx.lineWidth=2;ctx.stroke();
  ctx.globalAlpha=1;
}

// Draw extension line at vertex
function drawExtLine(verts,idx,alpha){
  const n=verts.length;
  const prev=verts[(idx-1+n)%n],cur=verts[idx];
  const dx=cur.x-prev.x,dy=cur.y-prev.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.setLineDash([8,6]);
  ctx.moveTo(cur.x,cur.y);ctx.lineTo(cur.x+dx/len*70,cur.y+dy/len*70);
  ctx.strokeStyle=extC[idx];ctx.lineWidth=3;ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
}

// Draw the assembly circle outline + collected sectors
function drawAssembly(collectedAngles,exts,highlight){
  // Circle outline
  ctx.beginPath();ctx.arc(AX,AY,AR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.stroke();
  // Label
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='bold 14px "Noto Sans TC"';
  ctx.textAlign='center';ctx.fillText('外角拼圖',AX,AY-AR-10);

  // Draw collected sectors
  let accumulated=0;
  for(let i=0;i<collectedAngles;i++){
    const ext=exts[i];
    const startA=-Math.PI/2+accumulated; // Start from top
    const endA=startA+ext.extAngle;
    ctx.beginPath();ctx.moveTo(AX,AY);
    ctx.arc(AX,AY,AR,startA,endA);ctx.closePath();
    ctx.fillStyle=extC[i];
    ctx.globalAlpha=highlight===i?0.9:0.7;
    ctx.fill();
    ctx.strokeStyle='#112D5A';ctx.lineWidth=2;ctx.stroke();
    ctx.globalAlpha=1;
    // Angle label inside sector
    const midA=(startA+endA)/2;
    const lx=AX+Math.cos(midA)*(AR*0.6);
    const ly=AY+Math.sin(midA)*(AR*0.6);
    ctx.fillStyle='#fff';ctx.font='bold 11px "Noto Sans TC"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(Math.round(ext.extAngle*180/Math.PI)+'°',lx,ly);
    accumulated+=ext.extAngle;
  }
}

// Draw a flying sector (from vertex to assembly circle)
function drawFlyingSector(ext,idx,collectedBefore,exts,progress){
  const startPos={x:ext.vertex.x,y:ext.vertex.y};
  const endPos={x:AX,y:AY};
  const pos=lerpPt(startPos,endPos,progress);
  const r=lerp(30,AR,progress);

  // Source: midpoint of exterior angle at vertex (CCW from inAngle)
  const srcMid=ext.inAngle-ext.extAngle/2;
  // Destination: midpoint of sector in assembly circle
  let accum=0;
  for(let i=0;i<collectedBefore;i++)accum+=exts[i].extAngle;
  const dstMid=-Math.PI/2+accum+ext.extAngle/2;

  // Interpolate midpoint angle (handle wrapping)
  let diff=dstMid-srcMid;
  while(diff>Math.PI)diff-=2*Math.PI;
  while(diff<-Math.PI)diff+=2*Math.PI;
  const midA=srcMid+diff*progress;
  const half=ext.extAngle/2;

  ctx.globalAlpha=0.8;
  ctx.beginPath();ctx.moveTo(pos.x,pos.y);
  ctx.arc(pos.x,pos.y,r,midA-half,midA+half);ctx.closePath();
  ctx.fillStyle=extC[idx];ctx.fill();
  ctx.strokeStyle='#112D5A';ctx.lineWidth=2;ctx.stroke();
  ctx.globalAlpha=1;
}

function drawLabel(x,y,text,color,size,alpha){
  ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.font=`bold ${size}px "Noto Sans TC"`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x,y);ctx.globalAlpha=1;
}

function render(){
  ctx.clearRect(0,0,W,H);
  const verts=SHAPES[curN].verts;
  const n=curN;
  const T=totalSteps();
  const exts=computeExteriors(verts);

  if(step===0){
    // Intro: show polygon + car at vertex 0
    drawPoly(verts,1);drawVerts(verts,1);
    const dir=Math.atan2(verts[1].y-verts[0].y,verts[1].x-verts[0].x);
    drawCar(verts[0].x,verts[0].y,dir,1);
    drawAssembly(0,exts,-1);
    // Cute text
    drawLabel(verts[0].x,verts[0].y-30,'🚗 出發！','#FFD700',16,0.7+0.3*Math.sin(Date.now()/500));
    requestAnimationFrame(render);
  }
  else if(step===1){
    // Explain: show interior angle (gray) + extension line + exterior angle (colored) + clear labels
    drawPoly(verts,1);drawVerts(verts,1);
    const dir=Math.atan2(verts[1].y-verts[0].y,verts[1].x-verts[0].x);
    drawCar(verts[0].x,verts[0].y,dir,0.6);
    drawAssembly(0,exts,-1);

    const v0=verts[0],prev0=verts[n-1],next0=verts[1];

    // Step animation: first interior, then extension, then exterior
    // Phase 1 (0→0.3): show interior angle (gray)
    if(anim>0){
      const t1=Math.min(anim/0.3,1);
      drawIntArc(verts,0,0.5*t1,35);
      // Label "內角" with arrow
      const intMidA=(Math.atan2(prev0.y-v0.y,prev0.x-v0.x)+Math.atan2(next0.y-v0.y,next0.x-v0.x))/2;
      const ilx=v0.x+Math.cos(intMidA)*55,ily=v0.y+Math.sin(intMidA)*55;
      drawArrowLabel(v0.x+Math.cos(intMidA)*80,v0.y+Math.sin(intMidA)*80,ilx,ily,'內角','rgba(255,255,255,0.6)',t1);
    }
    // Phase 2 (0.3→0.6): draw extension line
    if(anim>0.3){
      const t2=Math.min((anim-0.3)/0.3,1);
      drawExtLine(verts,0,t2);
      // Label "延長線"
      const dx0=v0.x-prev0.x,dy0=v0.y-prev0.y,len0=Math.sqrt(dx0*dx0+dy0*dy0);
      drawLabel(v0.x+dx0/len0*85,v0.y+dy0/len0*85+15,'延長線 →','#B0C4DE',13,t2);
    }
    // Phase 3 (0.6→1.0): show exterior angle (colored) with label
    if(anim>0.6){
      const t3=Math.min((anim-0.6)/0.4,1);
      drawExtArc(exts[0],0,0.6*t3,40);
      // Label "外角" with arrow pointing to the exterior angle area
      const extMidA=(exts[0].inAngle+exts[0].outAngle)/2;
      const elx=v0.x+Math.cos(extMidA)*50,ely=v0.y+Math.sin(extMidA)*50;
      drawArrowLabel(v0.x+Math.cos(extMidA)*90,v0.y+Math.sin(extMidA)*90,elx,ely,'外角','#FF6B35',t3);
      // Show "內角 + 外角 = 180°" text
      if(t3>0.5){
        drawLabel(350,480,'💡 內角 ＋ 外角 ＝ 一條直線 ＝ 180°','#FFD700',16,(t3-0.5)*2);
      }
    }
  }
  else if(step>=2 && step<2+n){
    // Collect each exterior angle
    const idx=step-2;

    drawPoly(verts,0.7);drawVerts(verts,0.8);
    drawAssembly(idx,exts,-1);

    // Show completed angles faintly
    for(let i=0;i<idx;i++){
      drawExtLine(verts,i,0.3);
      drawExtArc(exts[i],i,0.12,28);
    }

    // Always show interior angle at current vertex (gray) for context
    if(anim>0.1){
      drawIntArc(verts,idx,0.4,30);
    }

    if(anim<0.3){
      // Phase 1: car drives to vertex
      const fromV=verts[(idx-1+n)%n],toV=verts[idx];
      const t=anim/0.3;
      const carPos=lerpPt(fromV,toV,t);
      const dir=Math.atan2(toV.y-fromV.y,toV.x-fromV.x);
      drawCar(carPos.x,carPos.y,dir,1);
    }
    else if(anim<0.55){
      // Phase 2: car at vertex, show interior(gray) + extension + exterior(color)
      const t=(anim-0.3)/0.25;
      const inDir=Math.atan2(verts[idx].y-verts[(idx-1+n)%n].y,verts[idx].x-verts[(idx-1+n)%n].x);
      const outDir=Math.atan2(verts[(idx+1)%n].y-verts[idx].y,verts[(idx+1)%n].x-verts[idx].x);
      const carAngle=lerp(inDir,outDir,t);
      drawCar(verts[idx].x,verts[idx].y,carAngle,1);
      // Extension line grows
      drawExtLine(verts,idx,t);
      // Exterior angle appears
      drawExtArc(exts[idx],idx,0.65*t,38);

      // Labels
      const v=verts[idx],prev=verts[(idx-1+n)%n],next=verts[(idx+1)%n];
      // Interior label
      const intMidA=(Math.atan2(prev.y-v.y,prev.x-v.x)+Math.atan2(next.y-v.y,next.x-v.x))/2;
      drawLabel(v.x+Math.cos(intMidA)*50,v.y+Math.sin(intMidA)*50,'內角','rgba(255,255,255,0.5)',13,t);
      // Exterior label
      const extMidA=(exts[idx].inAngle+exts[idx].outAngle)/2;
      drawLabel(v.x+Math.cos(extMidA)*55,v.y+Math.sin(extMidA)*55,'外角',extC[idx],14,t);
      // Turn label
      if(t>0.5) drawLabel(v.x,v.y-40,'轉彎！🔄',extC[idx],16,(t-0.5)*2);
    }
    else{
      // Phase 3: exterior angle flies to assembly circle
      const t=(anim-0.55)/0.45;
      const outDir=Math.atan2(verts[(idx+1)%n].y-verts[idx].y,verts[(idx+1)%n].x-verts[idx].x);
      drawCar(verts[idx].x,verts[idx].y,outDir,1);
      drawExtLine(verts,idx,1-t*0.6);

      // Flying sector
      drawFlyingSector(exts[idx],idx,idx,exts,t);
      // Fading arc at vertex
      drawExtArc(exts[idx],idx,0.25*(1-t),30);

      // Keep interior angle visible
      drawIntArc(verts,idx,0.3*(1-t),28);
    }
  }
  else if(step===T-2){
    // All collected - show the completed circle with highlight
    drawPoly(verts,0.4);drawVerts(verts,0.5);

    // Show all extension lines faintly
    for(let i=0;i<n;i++){
      drawExtLine(verts,i,0.25);
    }

    // Car back at start
    const dir=Math.atan2(verts[1].y-verts[0].y,verts[1].x-verts[0].x);
    drawCar(verts[0].x,verts[0].y,dir,0.8);
    drawLabel(verts[0].x,verts[0].y-30,'跑完一圈了！','#00E676',16,1);

    // Assembly circle - all collected with pulse
    drawAssembly(n,exts,-1);

    // Highlight: pulsing glow
    const pulse=0.3+0.15*Math.sin(Date.now()/400);
    ctx.beginPath();ctx.arc(AX,AY,AR+5,0,Math.PI*2);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.globalAlpha=pulse;ctx.stroke();ctx.globalAlpha=1;

    // "= 360°" below circle
    drawLabel(AX,AY+AR+25,'拼成一個完整圓！','#00E676',16,anim);
    drawLabel(AX,AY+AR+50,'= 360°','#FFD700',28,anim);

    // Sum text
    let sumText=exts.map((e,i)=>Math.round(e.extAngle*180/Math.PI)+'°').join(' + ');
    drawLabel(350,480,sumText+' = 360°','#B0C4DE',14,anim);

    requestAnimationFrame(render);
  }
  else if(step===T-1){
    // Grand finale
    drawPoly(verts,0.2);

    // Assembly circle stays
    drawAssembly(n,exts,-1);
    const pulse2=0.4+0.15*Math.sin(Date.now()/300);
    ctx.beginPath();ctx.arc(AX,AY,AR+6,0,Math.PI*2);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.globalAlpha=pulse2;ctx.stroke();ctx.globalAlpha=1;
    drawLabel(AX,AY+AR+22,'完整圓 = 360°','#FFD700',15,1);

    // Result card
    const pulse=1+0.05*Math.sin(Date.now()/300);
    ctx.save();ctx.translate(280,260);ctx.scale(pulse,pulse);
    ctx.fillStyle='rgba(255,107,53,0.95)';ctx.beginPath();
    ctx.roundRect(-170,-80,340,160,24);ctx.fill();
    ctx.strokeStyle='#FFD700';ctx.lineWidth=5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 22px "Noto Sans TC"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`${SHAPES[n].name}外角和`,0,-45);
    ctx.font='bold 16px "Noto Sans TC"';
    ctx.fillText(`🚗 跑一圈，轉 ${n} 個彎`,0,-15);
    ctx.fillText('外角拼起來 = 一個完整圓',0,12);
    ctx.fillStyle='#FFD700';ctx.font='bold 48px "Noto Sans TC"';
    ctx.fillText('= 360°',0,55);
    ctx.restore();

    const t=Date.now()/500;
    ['🚗','✨','🔄','⭐','🚗','✨'].forEach((e,i)=>{
      const sx=300+Math.cos(t+i*1.05)*250;
      const sy=260+Math.sin(t+i*1.4)*160;
      ctx.font='18px serif';ctx.textAlign='center';ctx.fillText(e,sx,sy);
    });
    requestAnimationFrame(render);
  }
}

function animateTo(target,duration,cb){
  if(animId)cancelAnimationFrame(animId);
  const start=anim,startTime=performance.now();
  function tick(now){
    const t=Math.min((now-startTime)/duration,1);
    const ease=1-Math.pow(1-t,3);anim=start+(target-start)*ease;render();
    if(t<1)animId=requestAnimationFrame(tick);
    else{anim=target;render();if(cb)cb();}
  }
  animId=requestAnimationFrame(tick);
}

function updateUI(){
  const stepsText=getStepsText();const s=stepsText[step];const T=totalSteps();
  document.getElementById('stepLabel').textContent=s.label;
  if(step===T-1){
    document.getElementById('stepText').innerHTML=`${SHAPES[curN].name}的外角和<br><span class="formula">永遠 = 360° ！</span><br><br>不管幾邊形，外角拼起來都是一個完整的圓！`;
  }else{
    document.getElementById('stepText').innerHTML=s.text.replace(/\n/g,'<br>');
  }
  document.getElementById('infoCard').style.borderLeftColor=s.border;
  document.getElementById('prevBtn').disabled=step===0;
  document.getElementById('nextBtn').disabled=step===T-1;
  const bar=document.getElementById('progressBar');bar.innerHTML='';
  for(let i=0;i<T;i++){
    const d=document.createElement('div');d.className='progress-dot';
    if(i<step)d.classList.add('done');else if(i===step)d.classList.add('active');
    bar.appendChild(d);
  }
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[curN-3].classList.add('active');
}

function next(){if(step>=totalSteps()-1)return;step++;anim=0;updateUI();
  const dur=step>=2&&step<2+curN?1800:900;
  animateTo(1,dur);
}
function prev(){if(step<=0)return;step--;anim=1;updateUI();render();}
function reset(){step=0;anim=0;updateUI();render();}
function switchShape(n){curN=n;step=0;anim=0;updateUI();render();}

// roundRect polyfill
if(!ctx.roundRect){ctx.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r,r,r,r];this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);this.closePath()}}

updateUI();render();
</script>
