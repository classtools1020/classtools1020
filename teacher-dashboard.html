<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教師後台 — 學生進度總覽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;font-family:'Noto Sans TC',sans-serif;color:#fff;min-height:100vh;padding:16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(79,195,247,.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,107,53,.06),transparent 50%);pointer-events:none}
.container{position:relative;z-index:1;max-width:1100px;margin:0 auto}
h1{text-align:center;font-size:1.8em;font-weight:900;background:linear-gradient(135deg,#4FC3F7,#00BCD4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0 4px}
.subtitle{text-align:center;color:rgba(255,255,255,.5);font-size:.9em;margin-bottom:16px}
.toolbar{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toolbar button{padding:8px 16px;border:2px solid rgba(255,255,255,.12);border-radius:30px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);font-family:'Noto Sans TC',sans-serif;font-size:.85em;font-weight:700;cursor:pointer;transition:all .2s}
.toolbar button:hover{border-color:#4FC3F7;color:#4FC3F7}
.toolbar button.active{background:rgba(79,195,247,.12);border-color:#4FC3F7;color:#4FC3F7}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,.4);font-size:1.1em}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top:3px solid #4FC3F7;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Summary */
.summary-bar{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:0 auto 16px;padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px}
.sum-item{text-align:center;min-width:70px}
.sum-val{font-size:1.4em;font-weight:900;color:#ffd700}
.sum-label{font-size:.65em;color:rgba(255,255,255,.4)}

/* Student Cards */
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
@media(max-width:420px){.students-grid{grid-template-columns:1fr}}
.student-card{background:rgba(255,255,255,.03);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.08);border-radius:18px;padding:18px;transition:all .3s}
.student-card:hover{border-color:rgba(79,195,247,.3);box-shadow:0 4px 20px rgba(79,195,247,.08)}
.sc-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.sc-avatar{font-size:2.2em}
.sc-name{font-size:1.2em;font-weight:900}
.sc-coins{margin-left:auto;font-size:.95em;color:#ffd700;font-weight:700}

.tool-section{margin:8px 0;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:10px;border-left:3px solid rgba(255,255,255,.08)}
.tool-section.ts-vocab{border-left-color:#81C784}
.tool-section.ts-grammar{border-left-color:#4FC3F7}
.tool-section.ts-listening{border-left-color:#CE93D8}
.tool-section.ts-rpg{border-left-color:#FF8A65}
.ts-title{font-size:.8em;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ts-body{font-size:.78em;color:rgba(255,255,255,.55);line-height:1.6}
.ts-body strong{color:#fff}
.good{color:#00ff88}.warn{color:#ff8a65}.bad{color:#ff4444}
.mini-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:3px 0}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.mb-green{background:linear-gradient(90deg,#00C9A7,#4FC3F7)}
.mb-blue{background:linear-gradient(90deg,#4FC3F7,#CE93D8)}
.mb-purple{background:linear-gradient(90deg,#CE93D8,#FF6B35)}
.mb-orange{background:linear-gradient(90deg,#FF6B35,#FFD700)}
.day-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.dtag{border-radius:4px;padding:1px 5px;font-size:.68em}
.dtag-done{background:rgba(0,201,167,.12);border:1px solid rgba(0,201,167,.25);color:#00C9A7}
.dtag-not{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.18)}
.ew-tag{background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.25);border-radius:5px;padding:1px 6px;font-size:.72em;color:#ff8a65}
.ew-tag.defeated{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.25);color:#00ff88;text-decoration:line-through}
.no-data{color:rgba(255,255,255,.25);font-style:italic}

.back-link{display:inline-block;color:rgba(255,255,255,.4);font-size:.9em;text-decoration:none;margin-bottom:8px}
.back-link:hover{color:#4FC3F7}
.refresh-info{text-align:center;color:rgba(255,255,255,.25);font-size:.72em;margin-top:14px}

/* Password */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center}
.pw-box{background:rgba(20,30,70,.95);border:2px solid #4FC3F7;border-radius:20px;padding:28px;text-align:center;max-width:340px;width:90%}
.pw-box h2{color:#4FC3F7;margin-bottom:10px;font-size:1.3em}
.pw-box p{color:rgba(255,255,255,.5);font-size:.85em;margin-bottom:12px}
.pw-box input{width:100%;padding:12px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:1.1em;font-family:'Noto Sans TC',sans-serif;text-align:center;margin-bottom:12px}
.pw-box button{padding:12px 30px;border:none;border-radius:30px;background:linear-gradient(135deg,#4FC3F7,#00BCD4);color:#fff;font-size:1em;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.pw-error{color:#ff4444;font-size:.85em;margin-top:6px}
</style>
</head>
<body>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h2>🔐 教師後台</h2>
    <p>輸入密碼查看學生進度</p>
    <input type="password" id="pwInput" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">進入</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<div class="container" id="mainContent" style="display:none">
  <a href="eng9.html" class="back-link">⬅ 回到選單</a>
  <h1>📊 教師後台</h1>
  <p class="subtitle">即時查看 6 位學生的雲端進度</p>

  <div class="summary-bar" id="summaryBar"></div>

  <div class="toolbar">
    <button class="active" onclick="setView('all',this)">👥 全部</button>
    <button onclick="setView('vocab',this)">📚 單字</button>
    <button onclick="setView('grammar',this)">📝 句型</button>
    <button onclick="setView('listening',this)">🎧 聽力</button>
    <button onclick="setView('rpg',this)">👹 RPG</button>
    <button onclick="refreshData()" style="border-color:rgba(255,193,7,.3);color:#ffd700">🔄 重新整理</button>
  </div>

  <div id="content"><div class="loading"><div class="spinner"></div><br>載入中...</div></div>
  <div class="refresh-info" id="refreshInfo"></div>
</div>

<script>
const PW='stacey2026';
const STUDENTS=[{n:'Wendy',e:'🐱'},{n:'Lynn',e:'🐶'},{n:'Yumi',e:'🦊'},{n:'Fan',e:'🐯'},{n:'Yoyo',e:'🐼'},{n:'Mike',e:'🦁'}];
const TOOLS=['vocabPractice','grammarPractice','listeningBP','errorPool','rpgBoss'];
const API='https://script.google.com/macros/s/AKfycbxXBdWtuWvMDqJh7HzTc5K954ZF-UwrT7mhVQFJjbc9AW4MnzCyd3tmyV5SYxT2PiG2/exec';
let D={},V='all';

function checkPw(){
  if(document.getElementById('pwInput').value===PW){
    document.getElementById('pwOverlay').style.display='none';
    document.getElementById('mainContent').style.display='block';
    refreshData();
  } else {
    document.getElementById('pwError').textContent='密碼錯誤';
    document.getElementById('pwInput').value='';
  }
}

function setView(v,btn){
  V=v;
  document.querySelectorAll('.toolbar button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

async function fetchOne(name,tool){
  try{
    const r=await fetch(`${API}?action=load_progress&name=${encodeURIComponent(name)}&tool=${encodeURIComponent(tool)}`);
    const j=await r.json();
    if(j.status==='ok'&&j.data) return JSON.parse(j.data);
  }catch(e){}
  return null;
}

async function refreshData(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><br>正在從雲端載入 6 位學生資料...</div>';
  D={};
  const ps=[];
  STUDENTS.forEach(s=>{
    TOOLS.forEach(t=>{
      ps.push(fetchOne(s.n,t).then(data=>{
        if(!D[s.n])D[s.n]={};
        D[s.n][t]=data;
      }));
    });
  });
  await Promise.all(ps);
  document.getElementById('refreshInfo').textContent='更新時間：'+new Date().toLocaleString('zh-TW');
  render();
}

function render(){
  renderSummary();
  let h='<div class="students-grid">';
  STUDENTS.forEach(s=>{ h+=renderCard(s,D[s.n]||{}); });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function renderSummary(){
  let tv=0,tg=0,tl=0,te=0,td=0;
  STUDENTS.forEach(s=>{
    const d=D[s.n]||{};
    if(d.vocabPractice) for(let i=1;i<=20;i++) if(d.vocabPractice[`day${i}`]?.learned) tv++;
    if(d.grammarPractice) for(let i=1;i<=8;i++) if(d.grammarPractice[`unit${i}`]?.done) tg++;
    if(d.listeningBP?.done) tl+=Object.keys(d.listeningBP.done).filter(k=>d.listeningBP.done[k]).length;
    if(Array.isArray(d.errorPool)) d.errorPool.forEach(w=>{ if((w.correctInRPG||0)>=2)td++; else te++; });
  });
  document.getElementById('summaryBar').innerHTML=`
    <div class="sum-item"><div class="sum-val">${tv}</div><div class="sum-label">單字完成天<br>(滿${6*20})</div></div>
    <div class="sum-item"><div class="sum-val">${tg}</div><div class="sum-label">句型完成數<br>(滿${6*8})</div></div>
    <div class="sum-item"><div class="sum-val">${tl}</div><div class="sum-label">聽力完成天<br>(滿${6*29})</div></div>
    <div class="sum-item"><div class="sum-val" style="color:#ff8a65">${te}</div><div class="sum-label">活怪獸</div></div>
    <div class="sum-item"><div class="sum-val" style="color:#00ff88">${td}</div><div class="sum-label">已消滅</div></div>`;
}

function renderCard(stu,d){
  const vp=d.vocabPractice||{}, gp=d.grammarPractice||{}, lp=d.listeningBP||{}, ep=d.errorPool||[], rp=d.rpgBoss||{};
  const coins=lp.coins||0;
  let h=`<div class="student-card"><div class="sc-header"><div class="sc-avatar">${stu.e}</div><div class="sc-name">${stu.n}</div><div class="sc-coins">🪙 ${coins}</div></div>`;

  if(V==='all'||V==='vocab'){
    let dn=0,st=0;
    for(let i=1;i<=20;i++){if(vp[`day${i}`]?.learned)dn++;st+=(vp[`day${i}`]?.stars||0);}
    h+=`<div class="tool-section ts-vocab"><div class="ts-title">📚 單字練習</div><div class="ts-body">
      ${dn?`<strong>${dn}/20</strong> 天 · ⭐${st}顆`:'<span class="no-data">未開始</span>'}
      <div class="mini-bar"><div class="mini-bar-fill mb-green" style="width:${dn/20*100}%"></div></div>
      ${dn?dayTags(vp,20,'day','learned'):''}</div></div>`;
  }

  if(V==='all'||V==='grammar'){
    const un=['be動詞','do/does','過去式','未來式','進行式','比較級','連接詞','介系詞'];
    let dn=0,st=0;
    for(let i=1;i<=8;i++){if(gp[`unit${i}`]?.done)dn++;st+=(gp[`unit${i}`]?.stars||0);}
    h+=`<div class="tool-section ts-grammar"><div class="ts-title">📝 句型格鬥場</div><div class="ts-body">
      ${dn?`<strong>${dn}/8</strong> STAGE · ⭐${st}顆`:'<span class="no-data">未開始</span>'}
      <div class="mini-bar"><div class="mini-bar-fill mb-blue" style="width:${dn/8*100}%"></div></div>
      ${dn?unitTags(gp,un):''}</div></div>`;
  }

  if(V==='all'||V==='listening'){
    let dn=0;
    if(lp.done) dn=Object.keys(lp.done).filter(k=>lp.done[k]).length;
    h+=`<div class="tool-section ts-listening"><div class="ts-title">🎧 聽力戰令</div><div class="ts-body">
      ${dn?`<strong>${dn}/29</strong> 天 · 🪙${coins}`:'<span class="no-data">未開始</span>'}
      <div class="mini-bar"><div class="mini-bar-fill mb-purple" style="width:${dn/29*100}%"></div></div>
    </div></div>`;
  }

  if(V==='all'||V==='rpg'){
    const alive=ep.filter(w=>(w.correctInRPG||0)<2);
    const dead=ep.filter(w=>(w.correctInRPG||0)>=2);
    h+=`<div class="tool-section ts-rpg"><div class="ts-title">👹 錯題大魔王</div><div class="ts-body">
      ${ep.length?`🐉 <strong class="warn">${alive.length}</strong>隻 · 💀 <strong class="good">${dead.length}</strong>已消滅`:'<span class="no-data">沒有錯題</span>'}
      ${rp.xp?` · Lv.${Math.floor(rp.xp/100)+1}`:''}
      ${alive.length?`<div class="day-tags">${alive.map(w=>`<span class="ew-tag">${w.en}</span>`).join('')}</div>`:''}
      ${dead.length?`<div class="day-tags">${dead.map(w=>`<span class="ew-tag defeated">${w.en}</span>`).join('')}</div>`:''}
    </div></div>`;
  }

  h+=`</div>`;
  return h;
}

function dayTags(vp,n,prefix,field){
  let h='<div class="day-tags">';
  for(let i=1;i<=n;i++){
    const d=vp[`${prefix}${i}`];
    const done=d?.[field];
    const stars=d?.stars||0;
    h+=done?`<span class="dtag dtag-done" title="Day${i}: ${stars}⭐">D${i}${'⭐'.repeat(Math.min(stars,3))}</span>`
           :`<span class="dtag dtag-not">D${i}</span>`;
  }
  return h+'</div>';
}

function unitTags(gp,names){
  let h='<div class="day-tags">';
  for(let i=1;i<=8;i++){
    const u=gp[`unit${i}`];
    const stars=u?.stars||0;
    h+=u?.done?`<span class="dtag dtag-done" title="${names[i-1]}: ${stars}⭐">${names[i-1]}${'⭐'.repeat(Math.min(stars,3))}</span>`
              :`<span class="dtag dtag-not">${names[i-1]}</span>`;
  }
  return h+'</div>';
}
</script>
</body>
</html>
