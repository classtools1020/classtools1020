<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚔️ 角度競技場</title>
<style>
:root{--bg1:#1a0a1e;--bg2:#1e0f2e;--cyan:#00d4ff;--pink:#ff4d6d;--gold:#ffd700;--green:#00ff88;--orange:#ff9f43;--purple:#a855f7;--text:#e8eaf0;--text2:rgba(255,255,255,.5);--glass:rgba(255,255,255,.06);--gborder:rgba(255,215,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh}
.glass{background:rgba(255,215,0,.03);border:1px solid var(--gborder);border-radius:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.screen{padding:20px;min-height:100vh;display:flex;flex-direction:column;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.2)}50%{box-shadow:0 0 40px rgba(255,215,0,.5)}}
@keyframes star-spin{0%{transform:scale(0) rotate(0)}50%{transform:scale(1.3) rotate(180deg)}100%{transform:scale(1) rotate(360deg)}}
@keyframes crack{0%{transform:scale(1)}30%{transform:scale(1.1) rotate(-3deg)}60%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(0);opacity:0}}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e6a800);color:#000;box-shadow:0 0 20px rgba(255,215,0,.3)}
.btn-pink{background:linear-gradient(135deg,var(--pink),#c9184a);color:#fff;box-shadow:0 0 20px rgba(255,77,109,.3)}
.btn-green{background:linear-gradient(135deg,var(--green),#00b35c);color:#000}
.btn-ghost{background:var(--glass);border:1px solid var(--gborder);color:var(--text2)}
.login{align-items:center;gap:14px;padding-top:50px}
.name-input{width:100%;max-width:280px;background:var(--glass);border:2px solid var(--gborder);border-radius:14px;padding:14px;color:#fff;font-size:20px;text-align:center;font-family:inherit;outline:none}
.name-input:focus{border-color:var(--gold)}
.name-input::placeholder{color:rgba(255,255,255,.2)}
.avatar-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.avp{width:46px;height:46px;border-radius:50%;background:var(--glass);border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .15s}
.avp.active{border-color:var(--gold);background:rgba(255,215,0,.1);transform:scale(1.1)}
.map-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pbar{display:flex;align-items:center;gap:8px}.pbar .av{font-size:26px}.pbar .pn{color:#fff;font-size:14px;font-weight:700}.pbar .pt{font-size:11px;font-weight:600}
.pwb{display:flex;align-items:center;gap:4px;background:linear-gradient(135deg,rgba(255,77,109,.1),rgba(168,85,247,.06));border:1px solid rgba(255,77,109,.2);padding:5px 12px;border-radius:30px;color:var(--pink);font-size:13px;font-weight:800}
.lvc{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.lvc:hover:not(.locked){border-color:var(--gold);transform:translateX(3px)}
.lvc.locked{opacity:.3;cursor:not-allowed}
.lvc.current{border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.08)}
.lvc.done{border-color:rgba(0,255,136,.15)}
.lvn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
.lvc.done .lvn{background:linear-gradient(135deg,var(--green),#00b35c)}
.lvc.current .lvn{background:linear-gradient(135deg,var(--gold),#e6a800);color:#000}
.lvc.locked .lvn{background:rgba(255,255,255,.08)}
.lvi{flex:1}.lvi .lt{color:#fff;font-size:14px;font-weight:700}.lvi .ld{color:var(--text2);font-size:11px;margin-top:1px}
.lvs{font-size:15px;color:rgba(255,255,255,.2)}.lvc.done .lvs{color:var(--gold)}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.qback{width:34px;height:34px;border-radius:50%;border:none;background:var(--glass);color:var(--text2);font-size:15px;cursor:pointer}
.qtag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.qprog{color:var(--text2);font-size:12px;font-weight:600}
.pbar2{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:8px;overflow:hidden}
.pbar2 .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--pink));border-radius:2px;transition:width .3s}
.cvs-wrap{display:flex;justify-content:center;border-radius:14px;overflow:hidden;background:rgba(8,8,24,.7);margin-bottom:10px}
.cvs-wrap canvas{display:block;max-width:100%}
.qp{font-size:17px;font-weight:700;text-align:center;line-height:1.6;margin-bottom:10px;white-space:pre-line}
.choices{display:flex;flex-direction:column;gap:7px}
.ch{width:100%;padding:14px 16px;border:2.5px solid rgba(255,215,0,.06);border-radius:14px;background:rgba(255,215,0,.02);font-size:17px;font-weight:700;color:#fff;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.ch:hover{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.04)}
.ch:active{transform:scale(.98)}
.ch .ci{width:32px;height:32px;border-radius:50%;background:rgba(255,215,0,.06);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:rgba(255,215,0,.35);flex-shrink:0}
.ch.correct{border-color:var(--green);background:rgba(0,255,136,.06);animation:pop .3s}
.ch.correct .ci{background:var(--green);color:#000}
.ch.wrong{border-color:var(--pink);background:rgba(255,77,109,.04);animation:shake .35s}
.ch.wrong .ci{background:var(--pink);color:#fff}
.ch:disabled{cursor:not-allowed;opacity:.45}
.boss-label{display:inline-block;background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.25);color:var(--pink);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:6px}
.fbo{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .2s}
.fbo .bk{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px)}
.fbo .fc{position:relative;border-radius:24px;padding:28px 22px;text-align:center;max-width:340px;width:100%;animation:pop .3s}
.fbo .fe{font-size:52px;margin-bottom:8px}.fbo .ft{font-size:20px;font-weight:900;margin-bottom:4px}
.fbo .ft.ok{color:var(--green)}.fbo .ft.ng{color:var(--orange)}
.fbo .fm{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.gacha{justify-content:center;align-items:center;text-align:center;gap:14px}
.egg{font-size:90px;cursor:pointer;user-select:none;transition:transform .1s}
.egg:hover{transform:scale(1.05)}.egg.cracking{animation:crack .6s ease forwards}
.reward-reveal{animation:pop .5s;font-size:52px}
.lvdone{justify-content:center;align-items:center;text-align:center;gap:14px}
.stars{font-size:40px;letter-spacing:5px}
.stars span{display:inline-block;animation:star-spin .5s ease forwards}
.stars span:nth-child(2){animation-delay:.12s}.stars span:nth-child(3){animation-delay:.24s}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.2);padding:4px 12px;border-radius:20px;color:var(--pink);font-size:13px;font-weight:800}
.confetti{position:fixed;width:7px;height:7px;border-radius:2px;z-index:200;pointer-events:none;animation:cfall 2.5s ease forwards}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:50;animation:pop .3s;color:#fff;white-space:nowrap}
@media(max-width:380px){.qp{font-size:15px}.ch{font-size:15px;padding:12px 14px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const AVATARS=['🐉','🦅','🐺','🦈','🦂','🐍','🦇','🐲'];
const TITLES=[{p:0,n:'挑戰者',c:'#999'},{p:30,n:'鬥士',c:'#ff9f43'},{p:80,n:'勇者',c:'#ff4d6d'},{p:150,n:'霸主',c:'#a855f7'},{p:300,n:'傳說',c:'#ffd700'}];
const GACHA=[
  {e:'⚡',l:'+15 戰力',t:'p',v:15,w:35},{e:'💎',l:'+30 戰力',t:'p',v:30,w:20},
  {e:'🌟',l:'+50 戰力！',t:'p',v:50,w:8},{e:'👑',l:'+80 戰力！！',t:'p',v:80,w:3},
  {e:'🔥',l:'暴擊卷軸',t:'i',v:1,w:15},{e:'🛡️',l:'守護之盾',t:'i',v:1,w:12},{e:'⚔️',l:'傳說之劍',t:'i',v:1,w:7},
];

const LEVELS=[
  {id:'ch1',title:'速攻練習',desc:'互補互餘快速回答',icon:'⚡',
   questions:[
    {q:'互補：155° → ？',choices:['15°','25°','35°'],correct:1,hint:'180−155=25',draw:'supp',dp:{g:155}},
    {q:'互補：89° → ？',choices:['81°','91°','101°'],correct:1,hint:'180−89=91',draw:'supp',dp:{g:89}},
    {q:'互餘：26° → ？',choices:['54°','64°','74°'],correct:1,hint:'90−26=64',draw:'comp',dp:{g:26}},
    {q:'🏴 BOSS\n互餘：71° → ？',choices:['9°','19°','29°'],correct:1,hint:'90−71=19',draw:'comp',dp:{g:71},boss:true},
   ]},
  {id:'ch2',title:'交叉迷宮',desc:'對頂角 + 鄰角混合',icon:'✖️',
   questions:[
    {q:'∠1 = 53°，對頂角 ∠3 = ？',choices:['53°','127°','137°'],correct:0,hint:'對頂角相等',draw:'vert',dp:{a:53,ask:'opp'}},
    {q:'∠1 = 37°，旁邊 ∠2 = ？',choices:['133°','143°','153°'],correct:1,hint:'180−37=143',draw:'vert',dp:{a:37,ask:'adj'}},
    {q:'🏴 BOSS\n∠1 = 68°，對頂角 = ？',choices:['58°','68°','112°'],correct:1,hint:'對頂角=68°',draw:'vert',dp:{a:68,ask:'opp'},boss:true},
   ]},
  {id:'ch3',title:'三角風暴',desc:'內角和的各種變化',icon:'🔺',
   questions:[
    {q:'∠A=47°，∠B=68°\n∠C=？',choices:['55°','65°','75°'],correct:1,hint:'180−47−68=65',draw:'tri',dp:{a:47,b:68,c:-1}},
    {q:'直角三角形\n∠A=90°，∠B=28°，∠C=？',choices:['52°','62°','72°'],correct:1,hint:'180−90−28=62',draw:'tri',dp:{a:90,b:28,c:-1}},
    {q:'等腰三角形，頂角=50°\n底角=？',choices:['55°','65°','75°'],correct:1,hint:'(180−50)÷2=65',draw:'tri',dp:{a:50,b:-1,c:-1}},
    {q:'🏴 BOSS\n∠A=33°，∠B=79°\n∠C=？',choices:['58°','68°','78°'],correct:1,hint:'180−33−79=68',draw:'tri',dp:{a:33,b:79,c:-1},boss:true},
   ]},
  {id:'ch4',title:'外角突擊',desc:'外角定理正反算',icon:'🎯',
   questions:[
    {q:'∠A=35°，∠B=49°\n外角=？',choices:['74°','84°','94°'],correct:1,hint:'35+49=84',draw:'ext',dp:{a:35,b:49}},
    {q:'外角=128°，∠A=73°\n∠B=？',choices:['45°','55°','65°'],correct:1,hint:'128−73=55',draw:'ext_rev',dp:{ext:128,a:73}},
    {q:'🏴 BOSS\n∠A=40°，∠B=75°\n∠C 的外角=？',choices:['105°','115°','125°'],correct:1,hint:'外角=40+75=115',draw:'ext',dp:{a:40,b:75},boss:true},
   ]},
  {id:'ch5',title:'最終 BOSS',desc:'全部混在一起！',icon:'👑',
   questions:[
    {q:'互補：147° → ？',choices:['23°','33°','43°'],correct:1,hint:'180−147=33',draw:'supp',dp:{g:147}},
    {q:'∠1=72°，旁邊 ∠2=？',choices:['98°','108°','118°'],correct:1,hint:'180−72=108',draw:'vert',dp:{a:72,ask:'adj'}},
    {q:'∠A=56°，∠B=74°\n∠C=？',choices:['40°','50°','60°'],correct:1,hint:'180−56−74=50',draw:'tri',dp:{a:56,b:74,c:-1}},
    {q:'🏴 最終 BOSS 🏴\n∠A=62°，∠B=53°\n外角=？',choices:['105°','115°','125°'],correct:1,hint:'62+53=115',draw:'ext',dp:{a:62,b:53},boss:true},
   ]},
];

let S={screen:'splash',name:'',avatar:'🐉',lvIdx:0,qIdx:0,answered:false,attempts:0,lvScore:0,streak:0,maxStreak:0};
const KEY='ag-ch';
function db(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return{}}}
function dbSet(d){localStorage.setItem(KEY,JSON.stringify(d))}
function gp(){const d=db();return d[S.name]||{avatar:S.avatar,power:0,levels:{}};}
function sp(p){const d=db();d[S.name]=p;dbSet(d);}
function unlocked(i){if(i===0)return true;const p=gp();return(p.levels[LEVELS[i-1].id]||0)>0;}
function title(pw){let t=TITLES[0];TITLES.forEach(x=>{if(pw>=x.p)t=x});return t;}

// AUDIO
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function ia(){if(!ac)ac=new AC();}
function tone(f,d,t='sine',v=.12){try{ia();const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sfxOk(){tone(523,.08,'square',.1);setTimeout(()=>tone(659,.08,'square',.1),80);setTimeout(()=>tone(784,.15,'square',.12),160);}
function sfxNg(){tone(200,.15,'sawtooth',.06);setTimeout(()=>tone(180,.2,'sawtooth',.05),120);}
function sfxBoss(){[784,988,1175,1319].forEach((f,i)=>setTimeout(()=>tone(f,.1,'square',.12),i*80));}
function sfxCrit(){tone(880,.05,'square',.12);setTimeout(()=>tone(1100,.05,'square',.12),60);setTimeout(()=>tone(1320,.12,'square',.14),120);}
function sfxLvUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.12,'square',.1),i*100));}
function sfxGacha(){tone(330,.1,'triangle',.1);setTimeout(()=>tone(440,.1,'triangle',.1),100);setTimeout(()=>tone(660,.2,'triangle',.12),250);}
function sfxStreak(){tone(784,.06,'square',.1);setTimeout(()=>tone(988,.06,'square',.1),60);setTimeout(()=>tone(1175,.12,'square',.14),120);}

// CANVAS — same drawing engine as homework version
const DPR=Math.min(window.devicePixelRatio||1,2);
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;};}
function setupC(id,w,h){const c=document.getElementById(id);if(!c)return null;c.width=w*DPR;c.height=h*DPR;c.style.width=w+'px';c.style.height=h+'px';const x=c.getContext('2d');x.scale(DPR,DPR);return x;}
function gL(c,x1,y1,x2,y2,col='rgba(255,255,255,.7)',w=3){c.save();c.shadowColor=col;c.shadowBlur=10;c.strokeStyle=col;c.lineWidth=w;c.lineCap='round';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.restore();}
function gA(c,cx,cy,r,sa,ea,col,f=.25,ccw=false){c.save();c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,r,sa,ea,ccw);c.closePath();c.fillStyle=col+Math.round(f*255).toString(16).padStart(2,'0');c.fill();c.shadowColor=col;c.shadowBlur=8;c.beginPath();c.arc(cx,cy,r,sa,ea,ccw);c.strokeStyle=col;c.lineWidth=2.5;c.stroke();c.restore();}
function gD(c,x,y,col,lb='',ox=0,oy=-20){c.save();c.beginPath();c.arc(x,y,12,0,Math.PI*2);c.fillStyle=col+'33';c.fill();c.beginPath();c.arc(x,y,6,0,Math.PI*2);c.fillStyle=col;c.fill();c.strokeStyle='#fff';c.lineWidth=2;c.stroke();if(lb){c.font='bold 15px "Microsoft JhengHei",sans-serif';c.fillStyle=col;c.textAlign='center';c.textBaseline='middle';c.fillText(lb,x+ox,y+oy);}c.restore();}
function gT(c,t,x,y,col,sz=14){c.save();c.shadowColor=col;c.shadowBlur=6;c.font=`bold ${sz}px "Microsoft JhengHei",sans-serif`;c.fillStyle=col;c.textAlign='center';c.textBaseline='middle';c.fillText(t,x,y);c.restore();}
function bgR(c,W,H){c.fillStyle='rgba(8,8,24,.85)';c.beginPath();c.roundRect(0,0,W,H,10);c.fill();c.strokeStyle='rgba(180,100,255,.03)';c.lineWidth=1;for(let x=0;x<W;x+=30){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}for(let y=0;y<H;y+=30){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}}
function raSq(c,cx,cy,a1,a2,sz=14,col='#00ff88'){const mx=cx+sz*Math.cos(a1),my=cy+sz*Math.sin(a1),ex=mx+sz*Math.cos(a2),ey=my+sz*Math.sin(a2),nx=cx+sz*Math.cos(a2),ny=cy+sz*Math.sin(a2);c.save();c.strokeStyle=col;c.lineWidth=2;c.beginPath();c.moveTo(mx,my);c.lineTo(ex,ey);c.lineTo(nx,ny);c.stroke();c.restore();}

function drawQ(id,q){
  const W=320,H=200,c=setupC(id,W,H);if(!c)return;bgR(c,W,H);const d=q.dp;
  switch(q.draw){
    case 'supp':{const cx=W*.42,cy=H*.55,len=W*.35,rad=d.g*Math.PI/180,ar=35;gL(c,20,cy,W-20,cy,'rgba(255,255,255,.5)');gL(c,cx,cy,cx+len*Math.cos(-rad),cy+len*Math.sin(-rad),'rgba(255,255,255,.7)');gD(c,cx,cy,'#fff','');gA(c,cx,cy,ar,-rad,0,'#4a90d9',.3,true);gT(c,d.g+'°',cx+ar+16,cy-14,'#4a90d9',14);gA(c,cx,cy,ar,Math.PI,-rad,'#ff4d6d',.2,true);gT(c,'？',cx-ar-12,cy-14,'#ff4d6d',18);break;}
    case 'comp':{const cx=W*.2,cy=H*.8,len=W*.55,rad=d.g*Math.PI/180,ar=32;gL(c,cx,cy,cx+len,cy,'rgba(255,255,255,.5)');gL(c,cx,cy,cx,cy-len,'rgba(255,255,255,.5)');gL(c,cx,cy,cx+len*.7*Math.cos(-rad),cy+len*.7*Math.sin(-rad),'rgba(255,255,255,.6)');raSq(c,cx,cy,0,-Math.PI/2,14,'#00ff88');gD(c,cx,cy,'#fff','');gA(c,cx,cy,ar,-rad,0,'#4a90d9',.3,true);gT(c,d.g+'°',cx+ar+16,cy-14,'#4a90d9',13);gA(c,cx,cy,ar,-Math.PI/2,-rad,'#ff4d6d',.25,true);gT(c,'？',cx+10,cy-ar-14,'#ff4d6d',16);break;}
    case 'vert':{const cx=W/2,cy=H/2,len=W*.35,rad=d.a*Math.PI/180,ar=26;gL(c,cx-len,cy,cx+len,cy,'rgba(255,255,255,.5)');gL(c,cx-len*Math.cos(rad),cy+len*Math.sin(rad),cx+len*Math.cos(rad),cy-len*Math.sin(rad),'rgba(255,255,255,.5)');gD(c,cx,cy,'#fff','');gA(c,cx,cy,ar,-rad,0,'#4a90d9',.35,true);gT(c,'∠1='+d.a+'°',cx+40,cy-22,'#4a90d9',12);if(d.ask==='opp'){gA(c,cx,cy,ar,Math.PI-rad,Math.PI,'#ff4d6d',.3,true);gT(c,'∠3=？',cx-40,cy+28,'#ff4d6d',14);}else{gA(c,cx,cy,ar,Math.PI,-rad,'#ff4d6d',.25,true);gT(c,'∠2=？',cx-45,cy-22,'#ff4d6d',14);}break;}
    case 'tri':{const ax=W*.5,ay=H*.08,bx=W*.1,by=H*.85,cx2=W*.9,cy2=H*.85;const gcx=(ax+bx+cx2)/3,gcy=(ay+by+cy2)/3;c.save();c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);c.lineTo(cx2,cy2);c.closePath();c.fillStyle='rgba(0,212,255,.04)';c.fill();c.restore();gL(c,ax,ay,bx,by,'rgba(255,255,255,.6)');gL(c,bx,by,cx2,cy2,'rgba(255,255,255,.6)');gL(c,ax,ay,cx2,cy2,'rgba(255,255,255,.6)');const verts=[[ax,ay],[bx,by],[cx2,cy2]],vals=[d.a,d.b,d.c],cols=['#ff6b6b','#4ecdc4','#45b7d1'];verts.forEach(([vx,vy],i)=>{const dx2=gcx-vx,dy2=gcy-vy,dist2=Math.hypot(dx2,dy2),px=vx+dx2/dist2*30,py=vy+dy2/dist2*28;const isQ=vals[i]===-1;gT(c,isQ?'？':vals[i]+'°',px,py,isQ?'#ff4d6d':cols[i],isQ?15:13);});gD(c,ax,ay,'#ff6b6b','A',0,-18);gD(c,bx,by,'#4ecdc4','B',-14,14);gD(c,cx2,cy2,'#45b7d1','C',14,14);break;}
    case 'ext':{const ax=W*.42,ay=H*.06,bx=W*.06,by=H*.76,cx2=W*.58,cy2=H*.76,dx=cx2+(cx2-bx)*.32,dy=cy2;const egcx=(ax+bx+cx2)/3,egcy=(ay+by+cy2)/3;c.save();c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);c.lineTo(cx2,cy2);c.closePath();c.fillStyle='rgba(255,215,0,.03)';c.fill();c.restore();gL(c,ax,ay,bx,by,'rgba(255,255,255,.6)');gL(c,bx,by,cx2,cy2,'rgba(255,255,255,.6)');gL(c,ax,ay,cx2,cy2,'rgba(255,255,255,.6)');c.save();c.setLineDash([8,5]);gL(c,cx2,cy2,dx,dy,'#ffd700',2.5);c.setLineDash([]);c.restore();const aCA=Math.atan2(ay-cy2,ax-cx2),aCD=Math.atan2(dy-cy2,dx-cx2);gA(c,cx2,cy2,28,aCA,aCD,'#ffd700',.25,false);[[bx,by,d.a+'°','#4a90d9'],[ax,ay,d.b+'°','#4ecdc4']].forEach(([vx,vy,lb,col])=>{const dx3=egcx-vx,dy3=egcy-vy,dd=Math.hypot(dx3,dy3);gT(c,lb,vx+dx3/dd*28,vy+dy3/dd*26,col,13);});const extM=(aCA+aCD)/2+Math.PI;gT(c,'外角=？',cx2+Math.cos(extM)*42,cy2+Math.sin(extM)*32,'#ffd700',13);gD(c,ax,ay,'#ff6b6b','A',0,-16);gD(c,bx,by,'#4ecdc4','B',-14,14);gD(c,cx2,cy2,'#45b7d1','C',0,14);gD(c,dx,dy,'#ffd700','D',10,14);break;}
    case 'ext_rev':{const ax=W*.42,ay=H*.06,bx=W*.06,by=H*.76,cx2=W*.58,cy2=H*.76,dx=cx2+(cx2-bx)*.32,dy=cy2;const egcx2=(ax+bx+cx2)/3,egcy2=(ay+by+cy2)/3;c.save();c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);c.lineTo(cx2,cy2);c.closePath();c.fillStyle='rgba(255,215,0,.03)';c.fill();c.restore();gL(c,ax,ay,bx,by,'rgba(255,255,255,.6)');gL(c,bx,by,cx2,cy2,'rgba(255,255,255,.6)');gL(c,ax,ay,cx2,cy2,'rgba(255,255,255,.6)');c.save();c.setLineDash([8,5]);gL(c,cx2,cy2,dx,dy,'#ffd700',2.5);c.setLineDash([]);c.restore();const aCA2=Math.atan2(ay-cy2,ax-cx2),aCD2=Math.atan2(dy-cy2,dx-cx2);gA(c,cx2,cy2,28,aCA2,aCD2,'#ffd700',.25,false);{const dx3=egcx2-bx,dy3=egcy2-by,dd=Math.hypot(dx3,dy3);gT(c,d.a+'°',bx+dx3/dd*28,by+dy3/dd*26,'#4a90d9',13);}{const dx3=egcx2-ax,dy3=egcy2-ay,dd=Math.hypot(dx3,dy3);gT(c,'∠B=？',ax+dx3/dd*28,ay+dy3/dd*26,'#ff4d6d',14);}const extM2=(aCA2+aCD2)/2+Math.PI;gT(c,'外角='+d.ext+'°',cx2+Math.cos(extM2)*42,cy2+Math.sin(extM2)*32,'#ffd700',13);gD(c,ax,ay,'#ff6b6b','A',0,-16);gD(c,bx,by,'#4ecdc4','B',-14,14);gD(c,cx2,cy2,'#45b7d1','C',0,14);gD(c,dx,dy,'#ffd700','D',10,14);break;}
  }
}

// RENDER (same structure as homework but with streak)
const app=document.getElementById('app');
function render(){switch(S.screen){case 'splash':rSplash();break;case 'login':rLogin();break;case 'map':rMap();break;case 'question':rQ();break;case 'gacha':rGacha();break;case 'lvDone':rLvDone();break;case 'ending':rEnding();break;}}

function rSplash(){app.innerHTML=`<div class="screen" style="justify-content:center;align-items:center;text-align:center;gap:14px"><div style="font-size:68px;animation:float 3s ease-in-out infinite">⚔️</div><h1 style="font-size:30px;background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">角度競技場</h1><div style="color:var(--text2);font-size:14px;line-height:1.6">挑戰版 — 5 關 × BOSS 戰<br>連勝加倍獎勵！你能撐到最後嗎？</div><button class="btn btn-gold" onclick="S.screen='login';render()" style="font-size:19px;padding:14px 42px;animation:glow 2s infinite">接受挑戰 ⚔️</button></div>`;}

function rLogin(){
  const avs=AVATARS.map(a=>`<div class="avp ${S.avatar===a?'active':''}" data-a="${a}">${a}</div>`).join('');
  app.innerHTML=`<div class="screen login"><div style="font-size:52px;animation:float 2s ease-in-out infinite" id="avShow">${S.avatar}</div><div style="color:#fff;font-size:20px;font-weight:800">你的名字？</div><input class="name-input" id="ni" placeholder="輸入名字..." maxlength="10"><div style="color:var(--text2);font-size:12px">選角色</div><div class="avatar-row" id="avr">${avs}</div><button class="btn btn-gold" id="go" style="margin-top:6px">進入競技場 →</button></div>`;
  const ni=document.getElementById('ni');ni.value=S.name;ni.addEventListener('input',e=>{S.name=e.target.value;});
  document.getElementById('avr').addEventListener('click',e=>{const t=e.target.closest('[data-a]');if(!t)return;S.avatar=t.dataset.a;document.querySelectorAll('.avp').forEach(el=>el.classList.remove('active'));t.classList.add('active');document.getElementById('avShow').textContent=S.avatar;});
  document.getElementById('go').addEventListener('click',()=>{if(!S.name.trim()){toast('先取名字！','var(--pink)');return;}const p=gp();p.avatar=S.avatar;sp(p);S.screen='map';render();});
  ni.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
  setTimeout(()=>ni.focus(),100);
}

function rMap(){
  const p=gp(),t=title(p.power);
  let cards=LEVELS.map((lv,i)=>{const stars=p.levels[lv.id]||0,ul=unlocked(i),done=stars>0,cur=ul&&!done;let cls='lvc glass';if(done)cls+=' done';else if(cur)cls+=' current';else if(!ul)cls+=' locked';return `<div class="${cls}" onclick="${ul?`startLv(${i})`:''}"><div class="lvn">${i+1}</div><div class="lvi"><div class="lt">${lv.icon} ${lv.title}</div><div class="ld">${lv.desc}</div></div>${ul?`<div class="lvs">${done?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆'}</div>`:'<span style="color:var(--text2)">🔒</span>'}</div>`;}).join('');
  app.innerHTML=`<div class="screen" style="gap:8px;padding-top:16px"><div class="map-top"><div class="pbar"><div class="av">${S.avatar}</div><div><div class="pn">${S.name}</div><div class="pt" style="color:${t.c}">${t.n}</div></div></div><div class="pwb">⚔️ ${p.power}</div></div><div style="font-size:18px;font-weight:800;color:#fff;margin:4px 0">選擇關卡</div>${cards}<div style="text-align:center;margin-top:8px"><button class="btn btn-ghost" onclick="S.screen='login';render()" style="font-size:12px;padding:8px 18px">← 換人</button></div></div>`;
}

function rQ(){
  const lv=LEVELS[S.lvIdx],q=lv.questions[S.qIdx],total=lv.questions.length,prog=(S.qIdx/total)*100;const labels=['A','B','C'];
  app.innerHTML=`<div class="screen" style="gap:6px;padding-top:12px"><div class="qtop"><button class="qback" onclick="S.screen='map';render()">←</button><span class="qtag" style="background:rgba(255,215,0,.1);color:var(--gold)">${lv.icon} ${lv.title}</span><span class="qprog">${S.qIdx+1}/${total}</span></div><div class="pbar2"><div class="fill" style="width:${prog}%"></div></div><div style="display:flex;justify-content:center;gap:10px;margin-bottom:4px">${S.streak>=2?`<span class="streak-badge">🔥 連勝 ${S.streak}</span>`:''}</div>${q.boss?'<div class="boss-label">🏴 BOSS 題</div>':''}<div class="cvs-wrap"><canvas id="qcv" width="1" height="1" style="width:320px;height:200px"></canvas></div><div class="qp">${q.q.replace(/\n/g,'<br>')}</div><div class="choices">${q.choices.map((ch,i)=>`<button class="ch" id="ch${i}" onclick="pick(${i})"><span class="ci">${labels[i]}</span><span>${ch}</span></button>`).join('')}</div></div>`;
  setTimeout(()=>drawQ('qcv',q),30);
}

function rGacha(){sfxGacha();app.innerHTML=`<div class="screen gacha"><div style="color:var(--gold);font-size:13px;font-weight:700;letter-spacing:2px">通關獎勵</div><div style="color:#fff;font-size:20px;font-weight:800">點擊龍蛋！</div><div class="egg" id="egg" onclick="crackEgg()">🥚</div></div>`;}

function crackEgg(){const egg=document.getElementById('egg');if(!egg||egg.dataset.done)return;egg.dataset.done='1';egg.classList.add('cracking');sfxCrit();const total=GACHA.reduce((a,b)=>a+b.w,0);let r=Math.random()*total;let reward=GACHA[0];for(const item of GACHA){r-=item.w;if(r<=0){reward=item;break;}}setTimeout(()=>{const p=gp(),crit=Math.random()<.2;if(reward.t==='p'){p.power+=crit?reward.v*2:reward.v;}sp(p);confetti(18);app.innerHTML=`<div class="screen gacha"><div class="reward-reveal">${reward.e}</div><div style="color:#fff;font-size:20px;font-weight:800">${reward.l}</div>${crit?'<div style="color:var(--pink);font-size:15px;font-weight:800">🔥 暴擊！雙倍！</div>':''}<div style="color:var(--text2);font-size:13px">⚔️ 戰力：${p.power}</div><button class="btn btn-gold" onclick="S.screen='lvDone';render()">繼續 →</button></div>`;},700);}

function rLvDone(){const lv=LEVELS[S.lvIdx],total=lv.questions.length,pct=S.lvScore/total,stars=pct>=.9?3:pct>=.6?2:1;const p=gp();p.levels[lv.id]=Math.max(p.levels[lv.id]||0,stars);sp(p);sfxLvUp();const msgs=['繼續加油 💪','不錯喔！🌟','完美！🏆'];const starH=Array.from({length:3},(_,i)=>`<span style="animation-delay:${i*.12}s">${i<stars?'⭐':'☆'}</span>`).join('');const hasNext=S.lvIdx<LEVELS.length-1;app.innerHTML=`<div class="screen lvdone"><div style="font-size:52px;animation:pop .5s">${lv.icon}</div><h2 style="color:#fff;font-size:24px">${lv.title} 完成！</h2><div class="stars">${starH}</div><div style="color:var(--gold);font-size:15px;font-weight:700">答對 ${S.lvScore}/${total}</div>${S.maxStreak>=3?`<div style="color:var(--pink);font-size:14px;font-weight:700">🔥 最高連勝：${S.maxStreak}</div>`:''}<div style="color:var(--text2);font-size:14px">${msgs[stars-1]}</div><div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:260px">${hasNext?`<button class="btn btn-gold" onclick="startLv(${S.lvIdx+1})" style="width:100%">下一關 →</button>`:`<button class="btn btn-gold" onclick="S.screen='ending';render()" style="width:100%;font-size:18px">🎉 搭電梯回家慶祝！</button>`}<button class="btn btn-ghost" onclick="S.screen='map';render()" style="width:100%">回地圖</button></div></div>`;if(stars>=2)confetti(12);}

// GAME LOGIC
function startLv(i){if(!unlocked(i))return;S.lvIdx=i;S.qIdx=0;S.answered=false;S.attempts=0;S.lvScore=0;S.streak=0;S.screen='question';render();}

function pick(idx){if(S.answered)return;const q=LEVELS[S.lvIdx].questions[S.qIdx],el=document.getElementById('ch'+idx);
  if(idx===q.correct){el.classList.add('correct');S.answered=true;if(S.attempts===0){S.lvScore++;S.streak++;if(S.streak>S.maxStreak)S.maxStreak=S.streak;}else{S.streak=0;}const crit=Math.random()<.15,pw=crit?20:10;addPw(pw);q.choices.forEach((_,i)=>{document.getElementById('ch'+i).disabled=true;});if(q.boss)sfxBoss();else if(S.streak>=3)sfxStreak();else sfxOk();if(crit)setTimeout(()=>{toast('🔥 暴擊！+20','var(--pink)');sfxCrit();},200);confetti(q.boss?18:S.streak>=3?12:6);setTimeout(()=>showFB(true,q),q.boss?500:350);
  }else{el.classList.add('wrong');el.disabled=true;S.attempts++;S.streak=0;sfxNg();if(S.attempts>=2){S.answered=true;document.getElementById('ch'+q.correct).classList.add('correct');q.choices.forEach((_,i)=>{document.getElementById('ch'+i).disabled=true;});setTimeout(()=>showFB(false,q),400);}else{toast('再想想！💡 '+q.hint,'var(--orange)');}}}

function addPw(n){const p=gp();p.power+=n;sp(p);}

function showFB(ok,q){const lv=LEVELS[S.lvIdx],isLast=S.qIdx>=lv.questions.length-1;const ov=document.createElement('div');ov.className='fbo';ov.innerHTML=`<div class="bk"></div><div class="fc glass"><div class="fe">${ok?(q.boss?'⚔️':'🎉'):'💡'}</div><div class="ft ${ok?'ok':'ng'}">${ok?(q.boss?'BOSS 擊敗！':S.streak>=3?'🔥 連勝 '+S.streak+'！':'答對了！'):'答案：'+q.choices[q.correct]}</div><div class="fm">${q.hint}</div><button class="btn ${ok?'btn-gold':'btn-ghost'}" onclick="nextQ()" style="width:100%">${isLast?'看結果 🏆':'下一題 →'}</button></div>`;document.body.appendChild(ov);}

function nextQ(){document.querySelectorAll('.fbo').forEach(e=>e.remove());const lv=LEVELS[S.lvIdx];if(S.qIdx<lv.questions.length-1){S.qIdx++;S.answered=false;S.attempts=0;S.screen='question';render();}else{S.screen='gacha';render();}}

function confetti(n=10){const cols=['#ffd700','#ff4d6d','#00ff88','#a855f7','#00d4ff'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='confetti';p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[i%cols.length]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.4}s;animation-duration:${2+Math.random()}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),3000);}}
function toast(msg,bg='var(--orange)'){const t=document.createElement('div');t.className='toast';t.style.background=bg;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

function rEnding(){
  sfxLvUp();const p=gp(),t=title(p.power);
  app.innerHTML=`<div class="screen" style="justify-content:center;align-items:center;padding:0;overflow:hidden;background:#1a0a1e;position:relative">
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;align-items:center">
      ${Array.from({length:10},(_,i)=>`<div style="width:160px;height:32px;border:2px solid rgba(255,215,0,.06);background:rgba(255,215,0,.01);display:flex;align-items:center;justify-content:center;position:relative"><span style="position:absolute;left:-28px;color:rgba(255,255,255,.15);font-size:10px;font-weight:700">${10-i}F</span>${i===0?'<span style="color:var(--gold);font-size:10px;font-weight:700">👑 LEGEND</span>':''}${i===9?'<span style="color:rgba(255,255,255,.15);font-size:9px">START</span>':''}</div>`).join('')}
    </div>
    <div style="position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100px;height:100%">
      <div id="elevator" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:76px;height:65px;background:linear-gradient(180deg,#4a2a5c,#3a1a4c);border:3px solid #8a5a9a;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:bottom 5s cubic-bezier(.2,.8,.3,1);box-shadow:0 0 20px rgba(138,90,154,.3)">
        <div style="font-size:26px" id="elvChar">${S.avatar}</div>
        <div style="font-size:7px;color:rgba(255,255,255,.5)">${S.name}</div>
        <div style="position:absolute;top:0;left:0;width:50%;height:100%;border-right:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02)"></div>
      </div>
      <div style="position:absolute;top:0;left:50%;width:2px;background:linear-gradient(180deg,#8a5a9a,transparent);height:calc(100% - 70px);transform:translateX(-50%)"></div>
    </div>
    <div id="floorNum" style="position:absolute;top:25px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border:2px solid #8a5a9a;border-radius:8px;padding:5px 14px;font-size:18px;font-weight:900;color:var(--gold);font-family:monospace;letter-spacing:2px">1F</div>
    <div id="endMsg" style="position:absolute;top:70px;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity 1s;width:80%">
      <div style="font-size:22px;font-weight:900;color:#fff">全部通關！你是傳說！</div>
      <div style="font-size:14px;color:var(--gold);margin-top:4px">${t.n} ⚔️${p.power}</div>
      ${S.maxStreak>=3?`<div style="font-size:13px;color:var(--pink);margin-top:4px">🔥 最高連勝：${S.maxStreak}</div>`:''}
    </div>
    <div id="endBtns" style="position:absolute;bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:8px;opacity:0;transition:opacity .5s">
      <button class="btn btn-ghost" onclick="S.screen='map';render()" style="font-size:12px">回地圖</button>
      <button class="btn btn-gold" onclick="location.reload()" style="font-size:12px">再挑戰</button>
    </div>
  </div>`;
  let floor=1;const elv=document.getElementById('elevator'),fn=document.getElementById('floorNum');
  setTimeout(()=>{elv.style.bottom='calc(100% - 80px)';const iv=setInterval(()=>{floor++;fn.textContent=floor+'F';if(floor>=10){clearInterval(iv);fn.textContent='👑';fn.style.color='var(--gold)';setTimeout(()=>{document.getElementById('endMsg').style.opacity='1';document.getElementById('endBtns').style.opacity='1';confetti(30);const ch=document.getElementById('elvChar');let b=0;const bi=setInterval(()=>{ch.style.transform=b%2===0?'translateY(-8px) scale(1.2)':'translateY(0) scale(1)';b++;if(b>10)clearInterval(bi);},300);tone(880,.15,'sine',.15);setTimeout(()=>tone(1175,.2,'sine',.12),200);},500);}},500);},500);
}

render();
</script>
