<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 教師後台 — 角度練習</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;background:#0a0a1a;color:#e8eaf0;min-height:100vh;padding:20px}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
h2{font-size:17px;margin:20px 0 10px;color:#fff;display:flex;align-items:center;gap:8px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
th{color:rgba(255,255,255,.4);font-size:11px;font-weight:700;text-transform:uppercase}
td:first-child{text-align:left;font-weight:600;font-size:14px;min-width:80px}
.gold{color:#ffd700}
.dim{color:rgba(255,255,255,.15)}
.empty{color:rgba(255,255,255,.3);text-align:center;padding:20px;font-size:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-red{background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.2);color:#ff4d6d}
.btn-blue{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:#00d4ff}
.btn-green{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);color:#00ff88}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
.links{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.link-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit}
.link-card:hover{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.03)}
.link-icon{font-size:28px;flex-shrink:0}
.link-info{flex:1}
.link-info .lt{font-size:14px;font-weight:700;color:#fff}
.link-info .lu{font-size:11px;color:rgba(255,255,255,.3);word-break:break-all;margin-top:2px}
.copy-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.copy-btn:hover{border-color:rgba(0,212,255,.3);color:#00d4ff}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:10px;border:none;background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:rgba(0,212,255,.12);color:#00d4ff}
.refresh-note{font-size:11px;color:rgba(255,255,255,.2);margin-top:4px}
.title-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.name-input{width:100%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;margin-bottom:8px}
.name-input:focus{border-color:#00d4ff}
.status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:8px}
.status.live{background:rgba(0,255,136,.15);color:#00ff88}
.status.local{background:rgba(255,159,67,.15);color:#ff9f43}
.loading{text-align:center;padding:30px;color:rgba(255,255,255,.4)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#00d4ff;border-radius:50%;animation:s 1s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes s{to{transform:rotate(360deg)}}
.hint{font-size:12px;color:rgba(255,255,255,.4);background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.1);border-radius:8px;padding:10px;margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="title-row">
    <h1>📊 教師後台 <span class="status live" id="statusTag">☁️ 雲端同步</span></h1>
    <button class="btn btn-green" onclick="refresh()">🔄 重新整理</button>
  </div>

  <h2>🔗 網站連結</h2>
  <div class="links" id="links"></div>

  <h2>👥 學生名單</h2>
  <div class="card">
    <div class="hint">輸入學生的名字（就是他們在遊戲登入時打的），用逗號或空白分開。例如：<b>小明, 小華, 小美, 小安, 小琪</b></div>
    <input class="name-input" id="rosterInput" placeholder="輸入名字，用逗號分開...">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      <button class="btn btn-blue" onclick="saveRoster()">💾 儲存名單並查詢</button>
      <button class="btn btn-ghost" onclick="autoDiscover()">🔍 自動搜尋名單</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabHw" onclick="showTab('hw')">🛡️ 守衛戰（作業）</button>
    <button class="tab" id="tabCh" onclick="showTab('ch')">⚔️ 競技場（挑戰）</button>
  </div>

  <div id="hwPanel"></div>
  <div id="chPanel" style="display:none"></div>

  <h2>⚙️ 管理</h2>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-red" onclick="clearLocal()">🗑️ 清除本機紀錄</button>
  </div>
  <div class="refresh-note" style="margin-top:12px">
    ☁️ 學生的作答結果會自動同步到雲端（Google Apps Script）<br>
    如果學生剛玩完但看不到，按「重新整理」或等 10 秒
  </div>
</div>

<script>
const CLOUD='https://script.google.com/macros/s/AKfycbxXBdWtuWvMDqJh7HzTc5K954ZF-UwrT7mhVQFJjbc9AW4MnzCyd3tmyV5SYxT2PiG2/exec';
const BASE='https://classtools1020.github.io/classtools1020/angle-practice/';

const SITES=[
  {icon:'🛡️',name:'角度守衛戰（回家作業）',url:BASE},
  {icon:'⚔️',name:'角度競技場（挑戰版）',url:BASE+'challenge.html'},
  {icon:'📊',name:'教師後台（本頁）',url:BASE+'teacher.html'},
];

const HW_LEVELS=[{id:'hw1',t:'互補互餘'},{id:'hw2',t:'對頂角'},{id:'hw3',t:'三角形外角'}];
const CH_LEVELS=[{id:'ch1',t:'速攻'},{id:'ch2',t:'交叉'},{id:'ch3',t:'三角'},{id:'ch4',t:'外角'},{id:'ch5',t:'最終'}];

let ROSTER=JSON.parse(localStorage.getItem('teacherRoster')||'[]');
let HW_DATA={},CH_DATA={};

document.getElementById('links').innerHTML=SITES.map(s=>`
  <div class="link-card" onclick="window.open('${s.url}','_blank')">
    <div class="link-icon">${s.icon}</div>
    <div class="link-info">
      <div class="lt">${s.name}</div>
      <div class="lu">${s.url}</div>
    </div>
    <button class="copy-btn" onclick="event.stopPropagation();copyUrl('${s.url}',this)">複製</button>
  </div>
`).join('');

function copyUrl(url,btn){navigator.clipboard.writeText(url).then(()=>{btn.textContent='已複製 ✓';btn.style.color='#00ff88';setTimeout(()=>{btn.textContent='複製';btn.style.color='';},1500);});}

async function fetchOne(name,tool){
  try{
    const r=await fetch(`${CLOUD}?action=load_progress&name=${encodeURIComponent(name)}&tool=${encodeURIComponent(tool)}`);
    const j=await r.json();
    if(j.status==='ok'&&j.data)return JSON.parse(j.data);
  }catch(e){}
  return null;
}

async function autoDiscover(){
  // Try to load a ROSTER entry saved by the students themselves
  const hwRoster=await fetchOne('_ROSTER','angleGuard');
  const chRoster=await fetchOne('_ROSTER','angleArena');
  const combined=Array.from(new Set([...(hwRoster||[]),...(chRoster||[])]));
  if(combined.length){
    ROSTER=combined;
    localStorage.setItem('teacherRoster',JSON.stringify(ROSTER));
    document.getElementById('rosterInput').value=ROSTER.join(', ');
    refresh();
  }else{
    alert('雲端還沒有學生資料。請讓學生至少玩一關，或手動輸入名字。');
  }
}

function saveRoster(){
  const raw=document.getElementById('rosterInput').value;
  const names=raw.split(/[,，、\s]+/).map(n=>n.trim()).filter(n=>n);
  ROSTER=names;
  localStorage.setItem('teacherRoster',JSON.stringify(ROSTER));
  refresh();
}

async function refresh(){
  document.getElementById('rosterInput').value=ROSTER.join(', ');
  if(!ROSTER.length){
    document.getElementById('hwPanel').innerHTML=`<div class="card"><div class="empty">請先輸入學生名單或按「自動搜尋」</div></div>`;
    document.getElementById('chPanel').innerHTML=`<div class="card"><div class="empty">請先輸入學生名單或按「自動搜尋」</div></div>`;
    return;
  }

  document.getElementById('hwPanel').innerHTML=`<div class="loading"><span class="spin"></span>載入中...</div>`;
  document.getElementById('chPanel').innerHTML=`<div class="loading"><span class="spin"></span>載入中...</div>`;

  HW_DATA={};CH_DATA={};
  const tasks=[];
  ROSTER.forEach(n=>{
    tasks.push(fetchOne(n,'angleGuard').then(d=>{if(d)HW_DATA[n]=d;}));
    tasks.push(fetchOne(n,'angleArena').then(d=>{if(d)CH_DATA[n]=d;}));
  });
  await Promise.all(tasks);
  render('hw',HW_DATA,HW_LEVELS,'hwPanel');
  render('ch',CH_DATA,CH_LEVELS,'chPanel');
}

function render(tag,data,levels,panelId){
  const panel=document.getElementById(panelId);
  const headers=levels.map(l=>`<th>${l.t}</th>`).join('');
  const rows=ROSTER.map(n=>{
    const p=data[n];
    if(!p){
      const empty=levels.map(()=>`<td class="dim">—</td>`).join('');
      return `<tr><td style="color:rgba(255,255,255,.35)">${n}</td><td class="dim">—</td>${empty}</tr>`;
    }
    const pw=p.power||0;
    const cells=levels.map(l=>{
      const s=p.levels?.[l.id]||0;
      return s>0?`<td class="gold">${'⭐'.repeat(s)}</td>`:`<td class="dim">—</td>`;
    }).join('');
    return `<tr><td>${p.avatar||'👤'} ${n}</td><td class="gold">${pw}</td>${cells}</tr>`;
  }).join('');

  const playedCount=Object.keys(data).length;
  panel.innerHTML=`
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px">
      📊 ${playedCount}/${ROSTER.length} 位學生已作答
    </div>
    <div class="card">
      <table>
        <tr><th style="text-align:left">學生</th><th>⚔️ 戰力</th>${headers}</tr>
        ${rows}
      </table>
    </div>`;
}

function showTab(tab){
  document.getElementById('tabHw').classList.toggle('active',tab==='hw');
  document.getElementById('tabCh').classList.toggle('active',tab==='ch');
  document.getElementById('hwPanel').style.display=tab==='hw'?'':'none';
  document.getElementById('chPanel').style.display=tab==='ch'?'':'none';
}

function clearLocal(){
  if(confirm('清除瀏覽器本機紀錄？（雲端資料不會被刪除）')){
    localStorage.removeItem('ag-hw');localStorage.removeItem('ag-ch');
    alert('本機紀錄已清除');
  }
}

// Init
if(ROSTER.length){refresh();}else{autoDiscover();}
</script>
</body>
</html>
