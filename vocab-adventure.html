<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英文冒險 RPG｜會考搶分特訓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e27;--card:rgba(20,30,70,.85);--glass:rgba(255,255,255,.08);--neon-blue:#00d4ff;--neon-pink:#ff2d95;--neon-green:#00ff88;--neon-gold:#ffd700;--neon-orange:#ff6b35}
body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:#fff;min-height:100vh;min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.08),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,45,149,.08),transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(0,255,136,.06),transparent 50%);pointer-events:none;z-index:0}
canvas#particles{position:fixed;inset:0;pointer-events:none;z-index:999}
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:12px 16px 90px}
.screen.active{display:block}
/* ===== ANIMATIONS ===== */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,212,255,.3)}50%{box-shadow:0 0 40px rgba(0,212,255,.6)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fireGlow{0%,100%{text-shadow:0 0 10px #ff6b35,0 0 20px #ff4500,0 0 40px #ff0000}50%{text-shadow:0 0 20px #ffd700,0 0 40px #ff6b35,0 0 60px #ff4500}}
@keyframes rainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes starFloat{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-60px) rotate(180deg);opacity:0}}
/* ===== HOME ===== */
.home-hero{text-align:center;padding:20px 0 10px}
.home-hero h1{font-size:2em;font-weight:900;background:linear-gradient(135deg,var(--neon-gold),var(--neon-orange),var(--neon-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 3s infinite}
.home-hero .tagline{color:var(--neon-blue);font-size:.95em;margin-top:4px}
.hero-character{font-size:3em;animation:float 3s ease-in-out infinite;margin:8px 0}
.stats-bar{display:flex;justify-content:center;gap:16px;margin:12px 0}
.stat{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;text-align:center;min-width:80px}
.stat .stat-val{font-size:1.4em;font-weight:900;color:var(--neon-gold)}
.stat .stat-label{font-size:.7em;color:rgba(255,255,255,.6)}
.xp-bar{background:rgba(255,255,255,.1);border-radius:20px;height:16px;margin:8px auto;max-width:350px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--neon-green),var(--neon-blue));border-radius:20px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.xp-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.xp-text{font-size:.75em;color:rgba(255,255,255,.5);text-align:center;margin-top:2px}
/* Map path */
.map-scroll{overflow-x:auto;overflow-y:hidden;padding:10px 0 20px;-webkit-overflow-scrolling:touch}
.map-path{display:flex;align-items:center;gap:0;min-width:max-content;padding:10px 20px}
.map-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .3s;position:relative;min-width:70px}
.map-node:active{transform:scale(.9)}
.node-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6em;border:3px solid rgba(255,255,255,.15);background:var(--card);transition:all .3s;position:relative}
.map-node.done .node-circle{border-color:var(--neon-green);box-shadow:0 0 15px rgba(0,255,136,.3)}
.map-node.current .node-circle{border-color:var(--neon-gold);animation:glow 2s infinite;box-shadow:0 0 20px rgba(255,215,0,.4)}
.map-node.locked .node-circle{opacity:.35;cursor:not-allowed}
.node-label{font-size:.65em;color:rgba(255,255,255,.5);margin-top:4px;text-align:center;max-width:70px}
.map-node.done .node-label{color:var(--neon-green)}
.map-node.current .node-label{color:var(--neon-gold);font-weight:700}
.node-stars{font-size:.7em;margin-top:2px}
.map-connector{width:30px;height:3px;background:rgba(255,255,255,.1);flex-shrink:0}
.map-node.done+.map-connector{background:var(--neon-green)}
/* ===== QUIZ ===== */
.quiz-hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;margin-bottom:8px}
.hud-left,.hud-right{display:flex;align-items:center;gap:6px}
.hud-score{font-size:1.1em;font-weight:900;color:var(--neon-gold)}
.hud-combo{font-size:1em;font-weight:900;color:var(--neon-orange);min-width:50px;text-align:center}
.hud-combo.fire{animation:fireGlow 1s infinite;color:#ff4500}
.hud-combo.ultra{animation:fireGlow .5s infinite,rainbow 3s infinite;font-size:1.2em}
.quiz-progress{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-bottom:12px}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-orange),var(--neon-gold));border-radius:3px;transition:width .4s}
.quiz-character{text-align:center;font-size:2.5em;min-height:60px;transition:all .3s}
.quiz-prompt{text-align:center;margin:12px 0}
.prompt-mode{font-size:.8em;color:var(--neon-blue);font-weight:700;margin-bottom:6px}
.prompt-word{font-size:2.5em;font-weight:900;color:var(--neon-gold);text-shadow:0 0 20px rgba(255,215,0,.3)}
.prompt-word.zh-mode{color:#fff;font-size:2em}
.audio-btn{width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--neon-orange),var(--neon-pink));color:#fff;font-size:1.6em;cursor:pointer;margin:8px auto;display:block;transition:all .2s;box-shadow:0 4px 20px rgba(255,107,53,.4)}
.audio-btn:active{transform:scale(.85)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:12px auto}
.opt-btn{background:var(--glass);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.15);border-radius:16px;padding:18px 12px;text-align:center;font-size:1.3em;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;color:#fff;position:relative;overflow:hidden}
.opt-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.05));pointer-events:none}
.opt-btn:active{transform:scale(.95)}
.opt-btn.correct{background:linear-gradient(135deg,rgba(0,255,136,.3),rgba(0,212,255,.2));border-color:var(--neon-green);box-shadow:0 0 30px rgba(0,255,136,.4);animation:popIn .3s}
.opt-btn.wrong{background:rgba(255,45,45,.3);border-color:#ff4444;animation:shake .4s}
.opt-btn .opt-label{font-size:.55em;color:rgba(255,255,255,.4);display:block;margin-bottom:2px;font-weight:400}
.feedback-area{text-align:center;min-height:90px;margin:10px 0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fb-msg{font-size:1.4em;font-weight:900;animation:popIn .3s}
.fb-answer{font-size:.95em;color:var(--neon-gold);margin-top:4px}
.fb-anime{font-size:.85em;color:var(--neon-pink);margin-top:4px;font-style:italic}
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;font-weight:900;color:var(--neon-orange);text-shadow:0 0 30px rgba(255,107,53,.8);animation:popIn .5s forwards;pointer-events:none;z-index:998}
/* ===== RESULTS ===== */
.results-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center}
.result-card{background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:30px 24px;max-width:420px;width:100%;animation:popIn .5s}
.result-icon{font-size:5em;margin-bottom:8px}
.result-title{font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--neon-gold),var(--neon-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-stars{font-size:2.5em;margin:10px 0;letter-spacing:6px}
.result-score{font-size:2.2em;font-weight:900;color:var(--neon-green)}
.result-msg{font-size:1em;color:rgba(255,255,255,.7);margin:8px 0;line-height:1.6}
.result-anime{color:var(--neon-pink);font-size:.9em;font-style:italic;margin:6px 0}
.result-xp{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,107,53,.1));border:1px solid var(--neon-gold);border-radius:12px;padding:10px;margin:10px 0;font-weight:700;color:var(--neon-gold);animation:pulse 2s infinite}
.wrong-list{text-align:left;margin:12px 0;max-height:200px;overflow-y:auto}
.wrong-list h4{font-size:.85em;color:var(--neon-orange);margin-bottom:6px}
.wrong-item{background:rgba(255,255,255,.05);border-radius:8px;padding:8px 10px;margin:4px 0;font-size:.85em;display:flex;justify-content:space-between;align-items:center}
.wrong-item button{background:var(--neon-orange);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:.9em;cursor:pointer}
.btn{padding:14px 32px;border:none;border-radius:50px;font-family:'Noto Sans TC',sans-serif;font-size:1.05em;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.95)}
.btn-fire{background:linear-gradient(135deg,var(--neon-orange),var(--neon-pink));color:#fff;box-shadow:0 4px 20px rgba(255,107,53,.4)}
.btn-neon{background:transparent;border:2px solid var(--neon-blue);color:var(--neon-blue)}
.btn-ghost{background:transparent;border:2px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
.btns-col{display:flex;flex-direction:column;gap:10px;margin:16px 0;align-items:center}
.btn-back{background:none;border:none;color:rgba(255,255,255,.5);font-size:.95em;cursor:pointer;padding:8px;font-family:'Noto Sans TC',sans-serif}
/* Star float */
.star-float{position:fixed;pointer-events:none;z-index:997;animation:starFloat 1s forwards}
/* Mode select */
.mode-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:400px;margin:16px auto}
.mode-btn{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .3s}
.mode-btn:active{transform:scale(.95)}
.mode-btn .mode-icon{font-size:2em;margin-bottom:4px}
.mode-btn .mode-name{font-size:.95em;font-weight:700}
.mode-btn .mode-sub{font-size:.7em;color:rgba(255,255,255,.4);margin-top:2px}
/* day-info */
.day-info{text-align:center;padding:12px 0}
.day-info h2{font-size:1.5em;font-weight:900;color:var(--neon-gold)}
.day-info .day-sub{color:var(--neon-blue);font-size:.85em;margin-top:2px}
.word-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:450px;margin:10px auto}
.w-chip{background:var(--glass);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;font-size:.8em}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- ===== HOME ===== -->
<div class="screen active" id="scrHome">
  <div class="home-hero">
    <div class="hero-character">⚔️</div>
    <h1>英文冒險 RPG</h1>
    <div class="tagline">每天打怪練功，會考不再害怕！</div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statWords">0</div><div class="stat-label">已學單字</div></div>
    <div class="stat"><div class="stat-val" id="statLevel">Lv.1</div><div class="stat-label">等級</div></div>
    <div class="stat"><div class="stat-val" id="statStreak">0</div><div class="stat-label">🔥連續天數</div></div>
  </div>
  <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
  <div class="xp-text" id="xpText">EXP 0 / 200</div>
  <div class="map-scroll"><div class="map-path" id="mapPath"></div></div>
  <div style="text-align:center;margin-top:10px">
    <a href="grammar-practice.html" class="btn btn-neon" style="text-decoration:none;font-size:.9em">📝 去練句型</a>
  </div>
</div>

<!-- ===== DAY SELECT ===== -->
<div class="screen" id="scrDay">
  <button class="btn-back" onclick="goHome()">⬅ 回冒險地圖</button>
  <div class="day-info"><h2 id="dayTitle"></h2><div class="day-sub" id="daySub"></div></div>
  <div class="mode-select">
    <div class="mode-btn" onclick="startMode('learn')"><div class="mode-icon">📖</div><div class="mode-name">學習模式</div><div class="mode-sub">先聽先看</div></div>
    <div class="mode-btn" onclick="startMode('listen')"><div class="mode-icon">🔊</div><div class="mode-name">聽力闖關</div><div class="mode-sub">聽英文選中文</div></div>
    <div class="mode-btn" onclick="startMode('match')"><div class="mode-icon">🎯</div><div class="mode-name">配對挑戰</div><div class="mode-sub">看中文選英文</div></div>
    <div class="mode-btn" onclick="startMode('boss')"><div class="mode-icon">👹</div><div class="mode-name">BOSS 戰</div><div class="mode-sub">混合終極挑戰</div></div>
  </div>
  <div class="word-chips" id="wordChips"></div>
</div>

<!-- ===== LEARN ===== -->
<div class="screen" id="scrLearn">
  <button class="btn-back" onclick="show('scrDay')">⬅ 回選單</button>
  <div style="text-align:center;font-size:.85em;color:var(--neon-blue);margin:8px 0" id="learnCount"></div>
  <div style="background:var(--card);backdrop-filter:blur(20px);border-radius:24px;padding:30px 20px;max-width:450px;margin:10px auto;text-align:center;border:1px solid rgba(255,255,255,.1)">
    <div style="font-size:3em;font-weight:900;color:var(--neon-gold);text-shadow:0 0 30px rgba(255,215,0,.3)" id="learnEn"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin:14px 0">
      <button class="audio-btn" onclick="speak(CUR_WORDS[learnIdx].en,'en-US')" style="width:56px;height:56px;font-size:1.3em">🔊</button>
      <button class="audio-btn" onclick="speak(CUR_WORDS[learnIdx].zh,'zh-TW')" style="width:56px;height:56px;font-size:1.3em;background:linear-gradient(135deg,var(--neon-blue),var(--neon-green))">🗣</button>
    </div>
    <div style="font-size:2em;color:#fff" id="learnZh"></div>
    <div style="font-size:.95em;color:var(--neon-blue);margin-top:10px;font-style:italic" id="learnS"></div>
    <div style="font-size:.85em;color:rgba(255,255,255,.5);margin-top:4px" id="learnSz"></div>
  </div>
  <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
    <button class="btn btn-ghost" onclick="learnPrev()">⬅</button>
    <button class="btn btn-fire" onclick="learnNext()">下一個 ➡</button>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div class="screen" id="scrQuiz">
  <div class="quiz-hud">
    <div class="hud-left"><span class="hud-score" id="hudScore">⭐ 0</span></div>
    <div class="hud-combo" id="hudCombo"></div>
    <div class="hud-right"><button class="btn-back" onclick="show('scrDay')" style="padding:4px 8px">✕</button></div>
  </div>
  <div class="quiz-progress"><div class="quiz-progress-fill" id="quizBar"></div></div>
  <div class="quiz-character" id="quizChar">( •̀ᴗ•́ )و</div>
  <div class="quiz-prompt">
    <div class="prompt-mode" id="promptMode"></div>
    <div class="prompt-word" id="promptWord"></div>
  </div>
  <button class="audio-btn" id="qAudioBtn" onclick="speakQuiz()" style="display:none">🔊</button>
  <div class="options-grid" id="optGrid"></div>
  <div class="feedback-area" id="fbArea"></div>
</div>

<!-- ===== RESULTS ===== -->
<div class="screen" id="scrResult">
  <div class="results-screen">
    <div class="result-card">
      <div class="result-icon" id="resIcon"></div>
      <div class="result-title" id="resTitle"></div>
      <div class="result-stars" id="resStars"></div>
      <div class="result-score" id="resScore"></div>
      <div class="result-anime" id="resAnime"></div>
      <div class="result-xp" id="resXp"></div>
      <div class="result-msg" id="resMsg"></div>
      <div class="wrong-list" id="wrongList"></div>
      <div class="btns-col">
        <button class="btn btn-fire" onclick="startMode(CUR_MODE)">🔄 再挑戰一次</button>
        <button class="btn btn-neon" onclick="show('scrDay')">📋 回選單</button>
        <button class="btn btn-ghost" onclick="goHome()">🗺 回冒險地圖</button>
      </div>
    </div>
  </div>
</div>

<script>
// ========== WORD DATA (200 words, compact) ==========
const D={
1:{t:'人物＆身分',i:'👥',w:[
{en:'student',zh:'學生',s:'I am a student.',sz:'我是學生。'},{en:'teacher',zh:'老師',s:'She is a teacher.',sz:'她是老師。'},
{en:'friend',zh:'朋友',s:'He is my friend.',sz:'他是我的朋友。'},{en:'boy',zh:'男孩',s:'The boy is tall.',sz:'那個男孩很高。'},
{en:'girl',zh:'女孩',s:'The girl is smart.',sz:'那個女孩很聰明。'},{en:'people',zh:'人們',s:'Many people are here.',sz:'很多人在這裡。'},
{en:'family',zh:'家人',s:'I love my family.',sz:'我愛我的家人。'},{en:'name',zh:'名字',s:'My name is Amy.',sz:'我的名字是Amy。'}]},

{en:'go',zh:'去',s:'I go to school.',sz:'我去上學。'},{en:'come',zh:'來',s:'Come here.',sz:'過來。'},
{en:'eat',zh:'吃',s:'I eat breakfast.',sz:'我吃早餐。'},{en:'drink',zh:'喝',s:'I drink water.',sz:'我喝水。'},

{en:'sleep',zh:'睡覺',s:'I sleep at ten.',sz:'我十點睡。'},{en:'walk',zh:'走路',s:'I walk to school.',sz:'我走路上學。'}]},
3:{t:'時間',i:'⏰',w:[
{en:'today',zh:'今天',s:'Today is Monday.',sz:'今天是星期一。'},{en:'tomorrow',zh:'明天',s:'See you tomorrow.',sz:'明天見。'},
{en:'morning',zh:'早上',s:'Good morning!',sz:'早安！'},{en:'afternoon',zh:'下午',s:'Good afternoon!',sz:'午安！'},
{en:'evening',zh:'晚上',s:'Good evening!',sz:'晚上好！'},{en:'night',zh:'夜晚',s:'Good night!',sz:'晚安！'},
{en:'week',zh:'星期',s:'One week has seven days.',sz:'一星期有七天。'},{en:'month',zh:'月',s:'This month is April.',sz:'這個月是四月。'},
{en:'year',zh:'年',s:'Happy New Year!',sz:'新年快樂！'},{en:'time',zh:'時間',s:'What time is it?',sz:'現在幾點？'}]},

{en:'school',zh:'學校',s:'I like my school.',sz:'我喜歡我的學校。'},{en:'home',zh:'家',s:'I go home at five.',sz:'我五點回家。'},
{en:'park',zh:'公園',s:'Let\'s go to the park.',sz:'我們去公園。'},{en:'store',zh:'商店',s:'The store is big.',sz:'商店很大。'},
{en:'library',zh:'圖書館',s:'I study in the library.',sz:'我在圖書館讀書。'},{en:'hospital',zh:'醫院',s:'She is in the hospital.',sz:'她在醫院。'},
{en:'restaurant',zh:'餐廳',s:'Let\'s eat at the restaurant.',sz:'去餐廳吃。'},{en:'market',zh:'市場',s:'Mom goes to the market.',sz:'媽媽去市場。'}]},
5:{t:'感受＆情緒',i:'😊',w:[
{en:'happy',zh:'開心',s:'I am happy.',sz:'我很開心。'},{en:'sad',zh:'難過',s:'She is sad.',sz:'她很難過。'},

function gp(){try{return JSON.parse(localStorage.getItem('rpgProg')||'{}')}catch(e){return{}}}
function sp(d){try{localStorage.setItem('rpgProg',JSON.stringify(d))}catch(e){}}
function dp(day){const p=gp();return p[`d${day}`]||{done:false,stars:0,score:0}}
function sdp(day,v){const p=gp();p[`d${day}`]={...dp(day),...v};sp(p)}
function addXp(n){const p=gp();p.xp=(p.xp||0)+n;p.totalWords=Object.keys(D).reduce((s,k)=>s+(dp(k).done?D[k].w.length:0),0);sp(p)}
function markDay(){const p=gp();p['date_'+new Date().toISOString().slice(0,10)]=true;sp(p)}
function getStreak(){const p=gp();let s=0;const now=new Date();for(let i=0;i<60;i++){const d=new Date(now);d.setDate(d.getDate()-i);if(p['date_'+d.toISOString().slice(0,10)])s++;else break;}return s;}
function getLevel(){const p=gp();const xp=p.xp||0;return Math.floor(xp/100)+1;}

// ========== PARTICLE SYSTEM ==========
const cvs=document.getElementById('particles');
const pctx=cvs.getContext('2d');
let parts=[];
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
window.addEventListener('resize',resizeCvs);resizeCvs();
function addParticles(x,y,count,colors,type){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*6;
    const size=type==='confetti'?4+Math.random()*6:2+Math.random()*3;
    parts.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-(type==='confetti'?5:2),
      size,color:colors[Math.floor(Math.random()*colors.length)],life:1,decay:.01+Math.random()*.02,
      rot:Math.random()*360,rotSpeed:Math.random()*10-5,type});
  }
}
function confetti(){const cx=cvs.width/2,cy=cvs.height/3;for(let i=0;i<5;i++)setTimeout(()=>addParticles(cx+Math.random()*200-100,cy,40,['#FFD700','#FF6B35','#00FF88','#00D4FF','#FF2D95','#fff'],'confetti'),i*100);}
function sparkle(x,y){addParticles(x,y,12,['#FFD700','#fff','#00D4FF'],'spark');}
function updateParticles(){
  pctx.clearRect(0,0,cvs.width,cvs.height);
  parts=parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=p.decay;p.rot+=p.rotSpeed;
    if(p.life<=0)return false;
    pctx.save();pctx.globalAlpha=p.life;pctx.translate(p.x,p.y);pctx.rotate(p.rot*Math.PI/180);
    pctx.fillStyle=p.color;
    if(p.type==='confetti'){pctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);}
    else{pctx.beginPath();pctx.arc(0,0,p.size,0,Math.PI*2);pctx.fill();}
    pctx.restore();return true;
  });
  requestAnimationFrame(updateParticles);
}
updateParticles();

// ========== SOUND ==========
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,dur,type,vol){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=type||'sine';o.frequency.value=freq;
  g.gain.value=vol||.15;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sndCorrect(){playTone(523,.08,'sine',.12);setTimeout(()=>playTone(659,.08,'sine',.12),80);setTimeout(()=>playTone(784,.15,'sine',.1),160);}
function sndWrong(){playTone(330,.15,'sawtooth',.08);setTimeout(()=>playTone(262,.2,'sawtooth',.06),100);}
function sndCombo(){playTone(784,.06,'sine',.1);setTimeout(()=>playTone(988,.06,'sine',.1),60);setTimeout(()=>playTone(1175,.12,'sine',.08),120);}
function sndLevelUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.15,'sine',.1),i*120));}

// ========== TTS ==========
function speak(text,lang){
  if(!window.speechSynthesis)return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang=lang||'en-US';u.rate=.75;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith(lang==='en-US'?'en':'zh'));
  if(v)u.voice=v;speechSynthesis.speak(u);
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}

// ========== HOME ==========
function renderHome(){
  const p=gp();let totalW=0;
  const path=document.getElementById('mapPath');path.innerHTML='';
  const zones=[{name:'🌊 新手村',days:[1,2,3,4,5]},{name:'🌋 火山島',days:[6,7,8,9,10]},{name:'🏔 冰山峰',days:[11,12,13,14,15]},{name:'👑 王者城',days:[16,17,18,19,20]}];
  let firstIncomplete=null;
  zones.forEach(z=>{
    const zLabel=document.createElement('div');zLabel.style.cssText='font-size:.65em;color:rgba(255,255,255,.4);min-width:60px;text-align:center;padding:0 4px';
    zLabel.textContent=z.name;path.appendChild(zLabel);
    z.days.forEach((d,i)=>{
      const day=D[d];if(!day)return;
      const prog=dp(d);if(prog.done)totalW+=day.w.length;
      const isDone=prog.done;const isCurrent=!isDone&&!firstIncomplete;
      if(isCurrent)firstIncomplete=d;
      const node=document.createElement('div');
      node.className='map-node'+(isDone?' done':isCurrent?' current':' locked');
      node.innerHTML=`<div class="node-circle">${day.i}</div><div class="node-label">Day${d} ${day.t}</div><div class="node-stars">${prog.stars?'⭐'.repeat(prog.stars):''}</div>`;
      node.onclick=()=>{if(!node.classList.contains('locked'))openDay(d);};
      path.appendChild(node);
      if(i<z.days.length-1){const conn=document.createElement('div');conn.className='map-connector';if(isDone)conn.style.background='var(--neon-green)';path.appendChild(conn);}
    });
    const spacer=document.createElement('div');spacer.style.width='20px';path.appendChild(spacer);
  });
  if(!firstIncomplete)firstIncomplete=20;
  // Scroll to current
  setTimeout(()=>{const cur=document.querySelector('.map-node.current');if(cur)cur.scrollIntoView({behavior:'smooth',inline:'center'});},100);
  document.getElementById('statWords').textContent=totalW;
  document.getElementById('statLevel').textContent='Lv.'+getLevel();
  document.getElementById('statStreak').textContent=getStreak();
  const xp=(p.xp||0)%100;
  document.getElementById('xpFill').style.width=xp+'%';
  document.getElementById('xpText').textContent=`EXP ${xp} / 100（升級到 Lv.${getLevel()+1}）`;
}

  curDay=d;const day=D[d];CUR_WORDS=day.w;

  document.getElementById('daySub').textContent=`${day.w.length} 個單字等你來挑戰！`;

// ========== QUIZ ==========
function startQuiz(mode){
  qIdx=0;qScore=0;qCombo=0;qMaxCombo=0;qResults=[];qLocked=false;
  const words=[...CUR_WORDS].sort(()=>Math.random()-.5);
  qList=words.map(w=>{
    if(mode==='listen'||( mode==='boss'&&Math.random()>.5)){
      return{type:'listen',word:w,prompt:w.en,opts:genOpts(w,'zh'),ans:w.zh};
    }else{
      return{type:'match',word:w,prompt:w.zh,opts:genOpts(w,'en'),ans:w.en};
    }
  });
  renderQuiz();
}
function genOpts(target,field){
  const all=CUR_WORDS.filter(w=>w[field]!==target[field]).sort(()=>Math.random()-.5).slice(0,3).map(w=>w[field]);
  return[target[field],...all].sort(()=>Math.random()-.5);
}
function renderQuiz(){
  const q=qList[qIdx],total=qList.length;
  document.getElementById('hudScore').textContent='⭐ '+qScore;
  document.getElementById('quizBar').style.width=(qIdx/total*100)+'%';
  document.getElementById('fbArea').innerHTML='';
  document.getElementById('quizChar').textContent=CHARS.idle;
  // Combo display
  const hc=document.getElementById('hudCombo');
  if(qCombo>=3){hc.textContent=COMBO_MSG[Math.min(qCombo,10)];hc.className='hud-combo'+(qCombo>=7?' ultra':' fire');}
  else{hc.textContent='';hc.className='hud-combo';}
  // Prompt
  const audioBtn=document.getElementById('qAudioBtn');
  if(q.type==='listen'){
    document.getElementById('promptMode').textContent='🔊 聽英文，選中文';
    document.getElementById('promptWord').textContent=q.prompt;
    document.getElementById('promptWord').className='prompt-word';
    audioBtn.style.display='block';speak(q.prompt,'en-US');
  }else{
    document.getElementById('promptMode').textContent='🎯 看中文，選英文';
    document.getElementById('promptWord').textContent=q.prompt;
    document.getElementById('promptWord').className='prompt-word zh-mode';
    audioBtn.style.display='none';
  }
  // Options
  const grid=document.getElementById('optGrid');grid.innerHTML='';
  const labels=['A','B','C','D'];
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('div');btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span>${o}`;
    btn.onclick=()=>checkAnswer(btn,o,q);grid.appendChild(btn);
  });
}
function speakQuiz(){const q=qList[qIdx];if(q)speak(q.prompt,'en-US');}

function checkAnswer(btn,selected,q){
  if(qLocked)return;qLocked=true;
  const correct=selected===q.ans;
  const fb=document.getElementById('fbArea');
  if(correct){
    btn.classList.add('correct');qScore+=10+(qCombo>=3?qCombo*2:0);qCombo++;qMaxCombo=Math.max(qMaxCombo,qCombo);
    sndCorrect();
    document.getElementById('hudScore').textContent='⭐ '+qScore;
    document.getElementById('quizChar').textContent=qCombo>=5?CHARS.ultra:CHARS.correct;
    // Sparkle at button position
    const rect=btn.getBoundingClientRect();sparkle(rect.left+rect.width/2,rect.top+rect.height/2);
    // Combo popup
    if(qCombo>=3){
      sndCombo();
      const popup=document.createElement('div');popup.className='combo-popup';popup.textContent=COMBO_MSG[Math.min(qCombo,10)];
      document.body.appendChild(popup);setTimeout(()=>popup.remove(),1000);
      const hc=document.getElementById('hudCombo');hc.textContent=COMBO_MSG[Math.min(qCombo,10)];hc.className='hud-combo'+(qCombo>=7?' ultra':' fire');
    }
    const msg=CORRECT_MSG[Math.floor(Math.random()*CORRECT_MSG.length)];
    fb.innerHTML=`<div class="fb-msg" style="color:var(--neon-green)">${msg}</div>`;
    qResults.push({word:q.word,correct:true});
    speak(q.word.en,'en-US');
  }else{
    btn.classList.add('wrong');qCombo=0;sndWrong();
    document.getElementById('quizChar').textContent=CHARS.wrong;
    document.getElementById('hudCombo').textContent='';document.getElementById('hudCombo').className='hud-combo';
    // Shake screen
    document.getElementById('scrQuiz').style.animation='shake .4s';
    setTimeout(()=>document.getElementById('scrQuiz').style.animation='',400);
    // Show correct
    document.querySelectorAll('.opt-btn').forEach(o=>{if(o.textContent.slice(1)===q.ans||o.textContent===q.ans)o.classList.add('correct');});
    const msg=WRONG_MSG[Math.floor(Math.random()*WRONG_MSG.length)];
    fb.innerHTML=`<div class="fb-msg" style="color:var(--neon-orange)">${msg}</div><div class="fb-answer">✅ ${q.word.en} = ${q.word.zh}</div>`;
    qResults.push({word:q.word,correct:false});
    setTimeout(()=>speak(q.word.en,'en-US'),500);
  }
  setTimeout(()=>{qLocked=false;qIdx++;if(qIdx>=qList.length)finishQuiz();else renderQuiz();},correct?1200:2800);
}

function finishQuiz(){
  const total=qList.length,correct=qResults.filter(r=>r.correct).length;
  const pct=correct/total;const stars=pct>=1?3:pct>=.7?2:pct>=.4?1:0;
  const xpGain=correct*5+qMaxCombo*3;
  sdp(curDay,{done:true,stars:Math.max(dp(curDay).stars,stars),score:Math.max(dp(curDay).score,qScore)});
  addXp(xpGain);markDay();
  if(pct>=.7){confetti();sndLevelUp();}
  const qGroup=pct>=.8?'great':pct>=.5?'good':'ok';
  document.getElementById('resIcon').textContent=pct>=.8?'🏆':pct>=.5?'💪':'🌱';
  document.getElementById('resTitle').textContent=pct>=.8?'完美通關！':pct>=.5?'挑戰成功！':'繼續努力！';
  document.getElementById('resStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('resScore').textContent=`${correct}/${total} 答對`;
  document.getElementById('resAnime').textContent=ANIME_Q[qGroup][Math.floor(Math.random()*ANIME_Q[qGroup].length)];
  document.getElementById('resXp').textContent=`🎮 +${xpGain} EXP！${qMaxCombo>=3?' 🔥最高連擊 x'+qMaxCombo:''}`;
  document.getElementById('resMsg').textContent=pct>=.8?'你真的太強了！':'不斷練習，你會越來越厲害！';
  // Wrong words
  const wrongs=qResults.filter(r=>!r.correct);
  const wl=document.getElementById('wrongList');
  if(wrongs.length){
    let h='<h4>🔄 要加強的字：</h4>';
    wrongs.forEach(r=>{h+=`<div class="wrong-item"><span>${r.word.en} = ${r.word.zh}</span><button onclick="speak('${r.word.en}','en-US')">🔊</button></div>`;});
    wl.innerHTML=h;
  }else wl.innerHTML='';
  show('scrResult');
}

// ========== INIT ==========
renderHome();
</script>
