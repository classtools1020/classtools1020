<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>錯題大魔王 RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e27;--card:rgba(20,30,70,.85);--glass:rgba(255,255,255,.08);--neon-blue:#00d4ff;--neon-pink:#ff2d95;--neon-green:#00ff88;--neon-gold:#ffd700;--neon-orange:#ff6b35;--neon-red:#ff4444}
body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:#fff;min-height:100vh;min-height:100dvh;overflow-x:hidden;font-size:18px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,45,45,.08),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,45,149,.08),transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(255,107,53,.06),transparent 50%);pointer-events:none;z-index:0}
canvas#particles{position:fixed;inset:0;pointer-events:none;z-index:999}
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:12px 16px 90px}
.screen.active{display:block}

/* ===== ANIMATIONS ===== */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,68,68,.3)}50%{box-shadow:0 0 40px rgba(255,68,68,.6)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fireGlow{0%,100%{text-shadow:0 0 10px #ff6b35,0 0 20px #ff4500,0 0 40px #ff0000}50%{text-shadow:0 0 20px #ffd700,0 0 40px #ff6b35,0 0 60px #ff4500}}
@keyframes rainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes monsterIdle{0%,100%{transform:translateY(0) rotate(-2deg)}25%{transform:translateY(-5px) rotate(2deg)}50%{transform:translateY(0) rotate(-1deg)}75%{transform:translateY(-3px) rotate(1deg)}}
@keyframes defeated{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.5}100%{transform:scale(0);opacity:0}}
@keyframes starFloat{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-60px) rotate(180deg);opacity:0}}

/* ===== LOGIN ===== */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:linear-gradient(145deg,#2a1040,#1a0a30);border:2px solid var(--neon-pink);border-radius:24px;padding:32px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 0 40px rgba(255,45,149,.2)}
.login-box h2{font-size:1.6em;font-weight:900;color:var(--neon-red);margin-bottom:6px}
.login-box p{color:rgba(255,255,255,.6);font-size:1em;margin-bottom:20px}
.login-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:0 auto;max-width:320px}
.login-btn{background:rgba(255,255,255,.05);border:3px solid rgba(255,255,255,.15);border-radius:18px;padding:18px 8px;text-align:center;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;color:#fff}
.login-btn:active{transform:scale(.93);border-color:var(--neon-orange)}
.login-btn .login-emoji{font-size:2.6em;display:block;margin-bottom:6px}
.login-btn .login-name{font-size:1.1em;font-weight:700}
.switch-btn{border:2px solid var(--neon-blue);color:var(--neon-blue);background:transparent;border-radius:20px;padding:6px 16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}

/* ===== HOME ===== */
.home-hero{text-align:center;padding:20px 0 10px}
.home-hero h1{font-size:2.2em;font-weight:900;background:linear-gradient(135deg,var(--neon-red),var(--neon-orange),var(--neon-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 3s infinite}
.home-hero .tagline{color:var(--neon-orange);font-size:1em;margin-top:4px}
.hero-monster{font-size:4em;animation:monsterIdle 3s ease-in-out infinite}
.stats-bar{display:flex;justify-content:center;gap:12px;margin:12px 0;flex-wrap:wrap}
.stat{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;text-align:center;min-width:75px}
.stat .stat-val{font-size:1.4em;font-weight:900;color:var(--neon-gold)}
.stat .stat-label{font-size:.7em;color:rgba(255,255,255,.6)}
.xp-bar{background:rgba(255,255,255,.1);border-radius:20px;height:16px;margin:8px auto;max-width:350px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--neon-orange),var(--neon-red));border-radius:20px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.xp-text{font-size:.75em;color:rgba(255,255,255,.5);text-align:center;margin-top:2px}

/* ===== MONSTER LIST ===== */
.monster-section{margin:16px 0}
.monster-section h3{font-size:1.1em;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.monster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.monster-card{background:var(--card);backdrop-filter:blur(10px);border:2px solid rgba(255,68,68,.3);border-radius:16px;padding:14px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;text-align:center}
.monster-card:active{transform:scale(.95)}
.monster-card .m-emoji{font-size:2.2em;animation:monsterIdle 2s ease-in-out infinite}
.monster-card .m-word{font-size:1.2em;font-weight:900;color:var(--neon-gold);margin:4px 0}
.monster-card .m-zh{font-size:.9em;color:rgba(255,255,255,.6)}
.monster-card .m-hp{font-size:.75em;margin-top:6px}
.monster-card .hp-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:4px}
.monster-card .hp-fill{height:100%;background:linear-gradient(90deg,var(--neon-red),var(--neon-orange));border-radius:3px;transition:width .3s}
.monster-card.defeated{opacity:.4;border-color:var(--neon-green)}
.monster-card.defeated .m-emoji{animation:none}
.monster-card.defeated::after{content:'✅';position:absolute;top:8px;right:8px;font-size:1.2em}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:40px 20px}
.empty-state .empty-icon{font-size:5em;margin-bottom:16px;animation:float 3s ease-in-out infinite}
.empty-state h2{font-size:1.5em;color:var(--neon-green);margin-bottom:8px}
.empty-state p{color:rgba(255,255,255,.6);font-size:1em;line-height:1.6;margin-bottom:20px}

/* ===== BATTLE SCREEN ===== */
.battle-monster{text-align:center;margin:10px 0}
.battle-monster .bm-emoji{font-size:5em;animation:monsterIdle 2s ease-in-out infinite}
.battle-monster .bm-name{font-size:1.8em;font-weight:900;color:var(--neon-red);margin-top:4px}
.battle-monster .bm-zh{font-size:1.2em;color:var(--neon-gold)}
.battle-monster .bm-hp{margin:8px auto;max-width:250px}
.battle-monster .bm-hp-bar{height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.battle-monster .bm-hp-fill{height:100%;background:linear-gradient(90deg,var(--neon-red),var(--neon-orange));border-radius:5px;transition:width .5s}
.battle-monster .bm-hp-text{font-size:.8em;color:rgba(255,255,255,.5);margin-top:2px}

/* ===== QUIZ ===== */
.quiz-hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;margin-bottom:8px}
.hud-left,.hud-right{display:flex;align-items:center;gap:6px}
.hud-score{font-size:1.1em;font-weight:900;color:var(--neon-gold)}
.hud-combo{font-size:1em;font-weight:900;color:var(--neon-orange);min-width:50px;text-align:center}
.hud-combo.fire{animation:fireGlow 1s infinite;color:#ff4500}
.hud-combo.ultra{animation:fireGlow .5s infinite,rainbow 3s infinite;font-size:1.2em}
.quiz-progress{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-bottom:12px}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-red),var(--neon-gold));border-radius:3px;transition:width .4s}
.quiz-character{text-align:center;font-size:2.5em;min-height:60px;transition:all .3s}
.quiz-prompt{text-align:center;margin:12px 0}
.prompt-mode{font-size:.85em;color:var(--neon-blue);font-weight:700;margin-bottom:6px}
.prompt-word{font-size:2.5em;font-weight:900;color:var(--neon-gold);text-shadow:0 0 20px rgba(255,215,0,.3)}
.prompt-word.zh-mode{color:#fff;font-size:2em}
.audio-btn{width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--neon-orange),var(--neon-pink));color:#fff;font-size:1.6em;cursor:pointer;margin:8px auto;display:block;transition:all .2s;box-shadow:0 4px 20px rgba(255,107,53,.4)}
.audio-btn:active{transform:scale(.85)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:12px auto}
.opt-btn{background:var(--glass);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.15);border-radius:16px;padding:18px 12px;text-align:center;font-size:1.3em;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;color:#fff;position:relative;overflow:hidden}
.opt-btn:active{transform:scale(.95)}
.opt-btn.correct{background:linear-gradient(135deg,rgba(0,255,136,.3),rgba(0,212,255,.2));border-color:var(--neon-green);box-shadow:0 0 30px rgba(0,255,136,.4);animation:popIn .3s}
.opt-btn.wrong{background:rgba(255,45,45,.3);border-color:#ff4444;animation:shake .4s}
.opt-btn .opt-label{font-size:.55em;color:rgba(255,255,255,.4);display:block;margin-bottom:2px;font-weight:400}
.feedback-area{text-align:center;min-height:90px;margin:10px 0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fb-msg{font-size:1.4em;font-weight:900;animation:popIn .3s}
.fb-answer{font-size:1em;color:var(--neon-gold);margin-top:4px}
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;font-weight:900;color:var(--neon-orange);text-shadow:0 0 30px rgba(255,107,53,.8);animation:popIn .5s forwards;pointer-events:none;z-index:998}

/* ===== RESULTS ===== */
.results-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center}
.result-card{background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:30px 24px;max-width:420px;width:100%;animation:popIn .5s}
.result-icon{font-size:5em;margin-bottom:8px}
.result-title{font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--neon-gold),var(--neon-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-score{font-size:2.2em;font-weight:900;color:var(--neon-green)}
.result-msg{font-size:1em;color:rgba(255,255,255,.7);margin:8px 0;line-height:1.6}
.result-coins{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,107,53,.1));border:1px solid var(--neon-gold);border-radius:12px;padding:10px;margin:10px 0;font-weight:700;color:var(--neon-gold);animation:pulse 2s infinite;font-size:1.1em}
.result-xp{color:var(--neon-orange);font-size:.9em;margin:6px 0}
.defeated-list{text-align:left;margin:12px 0}
.defeated-list h4{font-size:.9em;color:var(--neon-green);margin-bottom:6px}
.defeated-item{background:rgba(0,255,136,.08);border-radius:8px;padding:8px 10px;margin:4px 0;font-size:.9em;display:flex;justify-content:space-between;align-items:center}
.btn{padding:14px 32px;border:none;border-radius:50px;font-family:'Noto Sans TC',sans-serif;font-size:1.05em;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.95)}
.btn-fire{background:linear-gradient(135deg,var(--neon-red),var(--neon-orange));color:#fff;box-shadow:0 4px 20px rgba(255,68,68,.4)}
.btn-neon{background:transparent;border:2px solid var(--neon-blue);color:var(--neon-blue)}
.btn-ghost{background:transparent;border:2px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
.btn-green{background:linear-gradient(135deg,var(--neon-green),var(--neon-blue));color:#fff;box-shadow:0 4px 20px rgba(0,255,136,.3)}
.btns-col{display:flex;flex-direction:column;gap:10px;margin:16px 0;align-items:center}
.btn-back{background:none;border:none;color:rgba(255,255,255,.5);font-size:.95em;cursor:pointer;padding:8px;font-family:'Noto Sans TC',sans-serif}
.star-float{position:fixed;pointer-events:none;z-index:997;animation:starFloat 1s forwards}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- ===== LOGIN ===== -->
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-box">
    <h2>👹 你是哪位勇者？</h2>
    <p>選你的動物開始打怪！</p>
    <div class="login-grid">
      <div class="login-btn" onclick="pickStudent('Wendy')"><span class="login-emoji">🐱</span><span class="login-name">Wendy</span></div>
      <div class="login-btn" onclick="pickStudent('Lynn')"><span class="login-emoji">🐶</span><span class="login-name">Lynn</span></div>
      <div class="login-btn" onclick="pickStudent('Yumi')"><span class="login-emoji">🦊</span><span class="login-name">Yumi</span></div>
      <div class="login-btn" onclick="pickStudent('Fan')"><span class="login-emoji">🐯</span><span class="login-name">Fan</span></div>
      <div class="login-btn" onclick="pickStudent('Yoyo')"><span class="login-emoji">🐼</span><span class="login-name">Yoyo</span></div>
      <div class="login-btn" onclick="pickStudent('Mike')"><span class="login-emoji">🦁</span><span class="login-name">Mike</span></div>
    </div>
  </div>
</div>

<!-- ===== HOME ===== -->
<div class="screen active" id="scrHome">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0">
    <a href="eng9.html" style="color:rgba(255,255,255,.5);font-size:.95em;text-decoration:none;font-family:'Noto Sans TC',sans-serif">⬅ 回到選單</a>
    <span id="userBadge" style="font-size:15px;color:rgba(255,255,255,.5)"></span>
    <button class="switch-btn" onclick="switchStudent()">🔄 換人</button>
  </div>
  <div class="home-hero">
    <div class="hero-monster">👹</div>
    <h1>錯題大魔王</h1>
    <div class="tagline">答錯的單字變成怪獸！打敗牠們！</div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statMonsters">0</div><div class="stat-label">🐉 怪獸</div></div>
    <div class="stat"><div class="stat-val" id="statDefeated">0</div><div class="stat-label">💀 已消滅</div></div>
    <div class="stat"><div class="stat-val" id="statLevel">Lv.1</div><div class="stat-label">⚔️ 等級</div></div>
    <div class="stat"><div class="stat-val" id="statCoins">0</div><div class="stat-label">🪙 金幣</div></div>
  </div>
  <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
  <div class="xp-text" id="xpText">EXP 0 / 100</div>
  <div id="monsterArea"></div>
</div>

<!-- ===== BATTLE SCREEN ===== -->
<div class="screen" id="scrBattle">
  <div class="quiz-hud">
    <div class="hud-left"><span class="hud-score" id="hudScore">⭐ 0</span></div>
    <div class="hud-combo" id="hudCombo"></div>
    <div class="hud-right"><button class="btn-back" onclick="show('scrHome');renderHome()" style="padding:4px 8px">✕ 逃跑</button></div>
  </div>
  <div class="quiz-progress"><div class="quiz-progress-fill" id="quizBar"></div></div>
  <div class="battle-monster">
    <div class="bm-emoji" id="bmEmoji">👹</div>
    <div class="bm-name" id="bmName"></div>
    <div class="bm-zh" id="bmZh"></div>
    <div class="bm-hp">
      <div class="bm-hp-bar"><div class="bm-hp-fill" id="bmHpFill" style="width:100%"></div></div>
      <div class="bm-hp-text" id="bmHpText">HP 2/2</div>
    </div>
  </div>
  <div class="quiz-prompt">
    <div class="prompt-mode" id="promptMode"></div>
    <div class="prompt-word" id="promptWord"></div>
  </div>
  <button class="audio-btn" id="qAudioBtn" onclick="speakQuiz()" style="display:none">🔊</button>
  <div class="options-grid" id="optGrid"></div>
  <div class="feedback-area" id="fbArea"></div>
</div>

<!-- ===== RESULTS ===== -->
<div class="screen" id="scrResult">
  <div class="results-screen">
    <div class="result-card">
      <div class="result-icon" id="resIcon"></div>
      <div class="result-title" id="resTitle"></div>
      <div class="result-score" id="resScore"></div>
      <div class="result-coins" id="resCoins" style="display:none"></div>
      <div class="result-xp" id="resXp"></div>
      <div class="result-msg" id="resMsg"></div>
      <div class="defeated-list" id="defeatedList"></div>
      <div class="btns-col">
        <button class="btn btn-fire" onclick="startBattle()">⚔️ 再戰一次</button>
        <button class="btn btn-neon" onclick="show('scrHome');renderHome()">🏠 回大廳</button>
      </div>
    </div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const STUDENT_ANIMALS={Wendy:'🐱',Lynn:'🐶',Yumi:'🦊',Fan:'🐯',Yoyo:'🐼',Mike:'🦁'};
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxXBdWtuWvMDqJh7HzTc5K954ZF-UwrT7mhVQFJjbc9AW4MnzCyd3tmyV5SYxT2PiG2/exec';

// Monster emojis based on wrong count
const MONSTER_EMOJI=['👾','👹','👺','🐉','💀','☠️','🧟','👻','🦇','🕷','🐍','🦂','🔥','⚡','🌪'];
function getMonsterEmoji(word){
  // Consistent emoji per word
  let hash=0;for(let i=0;i<word.en.length;i++)hash=((hash<<5)-hash)+word.en.charCodeAt(i);
  return MONSTER_EMOJI[Math.abs(hash)%MONSTER_EMOJI.length];
}

const COMBO_MSG=['','','','🔥COMBO x3!','⚡x4 連擊!','💥x5 超強!','🌟x6 不可思議!','☄️x7 傳說!','🏆x8 神之領域!','👑x9 無敵!','💎x10 PERFECT!'];
const CORRECT_MSG=['打中了！✨','漂亮一擊！🔥','完美攻擊！💯','NICE！⚡','命中要害！🎯','超強！👏','暴擊！🌟','Critical！💎'];
const WRONG_MSG=['怪獸反擊！💪','差一點！加油😊','被擋住了🛡','閃開了！再來📝'];
const CHARS={idle:'(ง •̀_•́)ง',correct:'✧٩(ˊᗜˋ*)و✧',wrong:'(╥﹏╥)',combo:'🔥(ง\'̀-\'́)ง🔥',ultra:'⚡👑⚡'};

// ========== STATE ==========
let qIdx=0,qScore=0,qCombo=0,qMaxCombo=0,qResults=[],qLocked=false,qList=[];
let battlePool=[]; // current battle monsters (subset of errorPool)
let coinsEarned=0;

// ========== ERROR POOL ==========
function getErrorPool(){
  try{return JSON.parse(localStorage.getItem('errorPool')||'[]');}catch{return [];}
}
function saveErrorPool(pool){
  localStorage.setItem('errorPool',JSON.stringify(pool));
  const name=localStorage.getItem('studentName');
  if(name){
    fetch(APPS_SCRIPT_URL,{
      method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'save_progress',name,tool:'errorPool',data:JSON.stringify(pool)})
    }).catch(()=>{});
  }
}

// ========== RPG PROGRESS ==========
function getRpg(){try{return JSON.parse(localStorage.getItem('rpgBoss')||'{}')}catch{return{}}}
function saveRpg(d){try{localStorage.setItem('rpgBoss',JSON.stringify(d))}catch{}}
function addXp(n){const p=getRpg();p.xp=(p.xp||0)+n;saveRpg(p);}
function getLevel(){return Math.floor((getRpg().xp||0)/100)+1;}
function getCoins(){
  // Read shared coins from listening battle pass storage
  try{
    const bp=JSON.parse(localStorage.getItem('lbpProgress')||'{}');
    return bp.coins||0;
  }catch{return 0;}
}
function addCoins(n){
  try{
    const bp=JSON.parse(localStorage.getItem('lbpProgress')||'{}');
    bp.coins=(bp.coins||0)+n;
    localStorage.setItem('lbpProgress',JSON.stringify(bp));
    // Cloud sync coins
    const name=localStorage.getItem('studentName');
    if(name){
      fetch(APPS_SCRIPT_URL,{

// ========== PARTICLE SYSTEM ==========
const cvs=document.getElementById('particles');
const pctx=cvs.getContext('2d');
let parts=[];
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
window.addEventListener('resize',resizeCvs);resizeCvs();
function addParticles(x,y,count,colors,type){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*6;
    const size=type==='confetti'?4+Math.random()*6:2+Math.random()*3;
    parts.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-(type==='confetti'?5:2),
      size,color:colors[Math.floor(Math.random()*colors.length)],life:1,decay:.01+Math.random()*.02,
      rot:Math.random()*360,rotSpeed:Math.random()*10-5,type});
  }
}
function confetti(){const cx=cvs.width/2,cy=cvs.height/3;for(let i=0;i<5;i++)setTimeout(()=>addParticles(cx+Math.random()*200-100,cy,40,['#FFD700','#FF6B35','#00FF88','#00D4FF','#FF2D95','#fff'],'confetti'),i*100);}
function sparkle(x,y){addParticles(x,y,12,['#FFD700','#fff','#FF4444'],'spark');}
function updateParticles(){
  pctx.clearRect(0,0,cvs.width,cvs.height);
  parts=parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=p.decay;p.rot+=p.rotSpeed;
    if(p.life<=0)return false;
    pctx.save();pctx.globalAlpha=p.life;pctx.translate(p.x,p.y);pctx.rotate(p.rot*Math.PI/180);
    pctx.fillStyle=p.color;
    if(p.type==='confetti'){pctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);}
    else{pctx.beginPath();pctx.arc(0,0,p.size,0,Math.PI*2);pctx.fill();}
    pctx.restore();return true;
  });
  requestAnimationFrame(updateParticles);
}
updateParticles();

// ========== SOUND ==========
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,dur,type,vol){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=type||'sine';o.frequency.value=freq;
  g.gain.value=vol||.15;g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sndCorrect(){playTone(523,.08,'sine',.12);setTimeout(()=>playTone(659,.08,'sine',.12),80);setTimeout(()=>playTone(784,.15,'sine',.1),160);}
function sndWrong(){playTone(330,.15,'sawtooth',.08);setTimeout(()=>playTone(262,.2,'sawtooth',.06),100);}
function sndCombo(){playTone(784,.06,'sine',.1);setTimeout(()=>playTone(988,.06,'sine',.1),60);setTimeout(()=>playTone(1175,.12,'sine',.08),120);}
function sndDefeat(){[784,988,1175,1568].forEach((f,i)=>setTimeout(()=>playTone(f,.15,'sine',.1),i*100));}

// ========== TTS ==========
function speak(text,lang){
  if(!window.speechSynthesis)return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang=lang||'en-US';u.rate=.75;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith(lang==='en-US'?'en':'zh'));
  if(v)u.voice=v;speechSynthesis.speak(u);
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}

// ========== CLOUD SYNC ==========
function cloudLoadErrorPool(){
  const name=localStorage.getItem('studentName');
  if(!name)return;
  fetch(APPS_SCRIPT_URL+'?action=load_progress&name='+encodeURIComponent(name)+'&tool=errorPool')
    .then(r=>r.json()).then(res=>{
      if(res.status==='ok'&&res.data){
        try{
          const cloudPool=JSON.parse(res.data);
          const localPool=getErrorPool();
          // Merge: cloud has more entries → use cloud; else merge by en key
          if(cloudPool.length>0){
            const merged=[...localPool];
            cloudPool.forEach(cw=>{
              const existing=merged.find(w=>w.en===cw.en);
              if(!existing) merged.push(cw);
              else {
                // Take higher wrongCount, higher correctInRPG
                existing.wrongCount=Math.max(existing.wrongCount||0,cw.wrongCount||0);
                existing.correctInRPG=Math.max(existing.correctInRPG||0,cw.correctInRPG||0);
              }
            });
            localStorage.setItem('errorPool',JSON.stringify(merged));
          }
          renderHome();
        }catch(e){}
      }
    }).catch(()=>{});
  // Also load RPG progress
  fetch(APPS_SCRIPT_URL+'?action=load_progress&name='+encodeURIComponent(name)+'&tool=rpgBoss')
    .then(r=>r.json()).then(res=>{
      if(res.status==='ok'&&res.data){
        try{
          const cloud=JSON.parse(res.data);
          const local=getRpg();
          if((cloud.xp||0)>(local.xp||0)){
            localStorage.setItem('rpgBoss',JSON.stringify(cloud));
            renderHome();
          }
        }catch{}
      }
    }).catch(()=>{});
}
function cloudSaveRpg(){
  const name=localStorage.getItem('studentName');
  if(!name)return;
  fetch(APPS_SCRIPT_URL,{
    method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'save_progress',name,tool:'rpgBoss',data:JSON.stringify(getRpg())})
  }).catch(()=>{});
}

// ========== BATTLE ==========
function startBattle(){
  const pool=getErrorPool();
  const alive=pool.filter(w=>(w.correctInRPG||0)<2);
  if(alive.length===0){
    alert('沒有怪獸可以打！去 Step 1 練習單字，答錯的字會變成怪獸！');
    return;
  }

  // Pick up to 5 monsters for this battle
  battlePool=[...alive].sort(()=>Math.random()-.5).slice(0,5);

  // Generate questions: each monster gets 2 questions (listen + match) to give 2 chances
  qList=[];
  battlePool.forEach(w=>{
    // Question 1: listen (hear English, pick Chinese)
    qList.push({type:'listen',word:w,prompt:w.en,opts:genOpts(w,'zh',pool),ans:w.zh});
    // Question 2: match (see Chinese, pick English)
    qList.push({type:'match',word:w,prompt:w.zh,opts:genOpts(w,'en',pool),ans:w.en});
  });
  // Shuffle questions
  qList.sort(()=>Math.random()-.5);

  qIdx=0;qScore=0;qCombo=0;qMaxCombo=0;qResults=[];qLocked=false;coinsEarned=0;
  show('scrBattle');
  renderBattle();
}

function genOpts(target,field,pool){
  // Get distractors from the full error pool or fallback words
  const FALLBACK=[
    {en:'apple',zh:'蘋果'},{en:'book',zh:'書'},{en:'cat',zh:'貓'},{en:'dog',zh:'狗'},
    {en:'eat',zh:'吃'},{en:'fish',zh:'魚'},{en:'good',zh:'好'},{en:'happy',zh:'開心'},
    {en:'ice',zh:'冰'},{en:'jump',zh:'跳'},{en:'kind',zh:'善良'},{en:'love',zh:'愛'}
  ];
  const allWords=[...pool,...FALLBACK];
  const others=allWords.filter(w=>w[field]!==target[field]).sort(()=>Math.random()-.5).slice(0,3).map(w=>w[field]);
  // Ensure we have 3 distractors
  while(others.length<3) others.push('???');
  return[target[field],...others].sort(()=>Math.random()-.5);
}

function renderBattle(){
  const q=qList[qIdx],total=qList.length;
  const monster=q.word;

  // HUD
  document.getElementById('hudScore').textContent='⭐ '+qScore;
  document.getElementById('quizBar').style.width=(qIdx/total*100)+'%';
  document.getElementById('fbArea').innerHTML='';

  // Combo display
  const hc=document.getElementById('hudCombo');
  if(qCombo>=3){hc.textContent=COMBO_MSG[Math.min(qCombo,10)];hc.className='hud-combo'+(qCombo>=7?' ultra':' fire');}
  else{hc.textContent='';hc.className='hud-combo';}

  // Monster display
  document.getElementById('bmEmoji').textContent=getMonsterEmoji(monster);
  document.getElementById('bmEmoji').style.animation='monsterIdle 2s ease-in-out infinite';
  document.getElementById('bmName').textContent=monster.en;
  document.getElementById('bmZh').textContent=monster.zh;
  const hp=2-(monster.correctInRPG||0);
  document.getElementById('bmHpFill').style.width=(hp/2*100)+'%';
  document.getElementById('bmHpText').textContent=`HP ${hp}/2`;

  // Prompt
  const audioBtn=document.getElementById('qAudioBtn');
  if(q.type==='listen'){
    document.getElementById('promptMode').textContent='🔊 聽英文，選中文';
    document.getElementById('promptWord').textContent='❓';
    document.getElementById('promptWord').className='prompt-word';
    audioBtn.style.display='block';speak(q.prompt,'en-US');
  }else{
    document.getElementById('promptMode').textContent='🎯 看中文，選英文';
    document.getElementById('promptWord').textContent=q.prompt;
    document.getElementById('promptWord').className='prompt-word zh-mode';
    audioBtn.style.display='none';
  }

  // Options
  const grid=document.getElementById('optGrid');grid.innerHTML='';
  const labels=['A','B','C','D'];
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('div');btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span>${o}`;
    btn.onclick=()=>checkAnswer(btn,o,q);grid.appendChild(btn);
  });
}

function speakQuiz(){const q=qList[qIdx];if(q&&q.type==='listen')speak(q.prompt,'en-US');}

function checkAnswer(btn,selected,q){
  if(qLocked)return;qLocked=true;
  const correct=selected===q.ans;
  const fb=document.getElementById('fbArea');
  const pool=getErrorPool();

  if(correct){
    btn.classList.add('correct');qScore+=10+(qCombo>=3?qCombo*2:0);qCombo++;qMaxCombo=Math.max(qMaxCombo,qCombo);
    sndCorrect();
    document.getElementById('hudScore').textContent='⭐ '+qScore;

    // Update monster HP in error pool
    const monster=pool.find(w=>w.en===q.word.en);
    if(monster){
      monster.correctInRPG=(monster.correctInRPG||0)+1;
      saveErrorPool(pool);

      if(monster.correctInRPG>=2){
        // Monster defeated!
        sndDefeat();confetti();
        document.getElementById('bmEmoji').style.animation='defeated .6s forwards';
        coinsEarned+=10;
        fb.innerHTML=`<div class="fb-msg" style="color:var(--neon-green);font-size:1.6em">💀 怪獸消滅！+10 金幣！</div>`;
        qResults.push({word:q.word,correct:true,defeated:true});
      } else {
        // Hit but not dead
        const rect=btn.getBoundingClientRect();sparkle(rect.left+rect.width/2,rect.top+rect.height/2);
        const msg=CORRECT_MSG[Math.floor(Math.random()*CORRECT_MSG.length)];
        fb.innerHTML=`<div class="fb-msg" style="color:var(--neon-green)">${msg}</div>`;
        qResults.push({word:q.word,correct:true,defeated:false});
        // Update HP display
        const hp=2-(monster.correctInRPG||0);
        document.getElementById('bmHpFill').style.width=(hp/2*100)+'%';
        document.getElementById('bmHpText').textContent=`HP ${hp}/2`;
      }
    }

    // Combo popup
    if(qCombo>=3){
      sndCombo();
      const popup=document.createElement('div');popup.className='combo-popup';popup.textContent=COMBO_MSG[Math.min(qCombo,10)];
      document.body.appendChild(popup);setTimeout(()=>popup.remove(),1000);
    }

    speak(q.word.en,'en-US');
  } else {
    btn.classList.add('wrong');qCombo=0;sndWrong();
    document.getElementById('hudCombo').textContent='';document.getElementById('hudCombo').className='hud-combo';
    // Shake
    document.getElementById('scrBattle').style.animation='shake .4s';
    setTimeout(()=>document.getElementById('scrBattle').style.animation='',400);
    // Show correct
    document.querySelectorAll('.opt-btn').forEach(o=>{
      const txt=o.textContent.replace(/^[A-D]/,'');
      if(txt===q.ans)o.classList.add('correct');
    });
    const msg=WRONG_MSG[Math.floor(Math.random()*WRONG_MSG.length)];
    fb.innerHTML=`<div class="fb-msg" style="color:var(--neon-orange)">${msg}</div><div class="fb-answer">✅ ${q.word.en} = ${q.word.zh}</div>`;
    qResults.push({word:q.word,correct:false,defeated:false});
    setTimeout(()=>speak(q.word.en,'en-US'),500);
  }

  setTimeout(()=>{qLocked=false;qIdx++;if(qIdx>=qList.length)finishBattle();else renderBattle();},correct?1200:2800);
}

function finishBattle(){
  const total=qList.length;
  const correct=qResults.filter(r=>r.correct).length;
  const defeatedCount=qResults.filter(r=>r.defeated).length;
  const pct=correct/total;
  const xpGain=correct*5+qMaxCombo*3+defeatedCount*15;
  const bonusCoins=qMaxCombo>=3?5:0;
  coinsEarned+=bonusCoins;

  addXp(xpGain);
  if(coinsEarned>0) addCoins(coinsEarned);
  cloudSaveRpg();

  if(pct>=.7){confetti();sndDefeat();}

  document.getElementById('resIcon').textContent=defeatedCount>0?'💀':pct>=.7?'⚔️':'🛡';
  document.getElementById('resTitle').textContent=defeatedCount>0?`消滅了 ${defeatedCount} 隻怪獸！`:pct>=.7?'戰鬥成功！':'再接再厲！';
  document.getElementById('resScore').textContent=`${correct}/${total} 命中`;

  if(coinsEarned>0){
    document.getElementById('resCoins').style.display='block';
    document.getElementById('resCoins').textContent=`🪙 獲得 ${coinsEarned} 金幣！（可以去聽力戰令抽扭蛋）`;
  } else {
    document.getElementById('resCoins').style.display='none';
  }

  document.getElementById('resXp').textContent=`🎮 +${xpGain} EXP！${qMaxCombo>=3?' 🔥最高連擊 x'+qMaxCombo:''}`;
  document.getElementById('resMsg').textContent=defeatedCount>0?'太強了！被打敗的怪獸不會再出現！':'繼續努力，把怪獸打到 HP 歸零就能消滅牠！';

  // Show defeated monsters
  const defList=document.getElementById('defeatedList');
  const defs=qResults.filter(r=>r.defeated);
  if(defs.length>0){
    let h='<h4>💀 本次消滅的怪獸：</h4>';
    defs.forEach(r=>{
      h+=`<div class="defeated-item"><span>${getMonsterEmoji(r.word)} ${r.word.en} = ${r.word.zh}</span><span style="color:var(--neon-green)">+10🪙</span></div>`;
    });
    defList.innerHTML=h;
  } else defList.innerHTML='';

  show('scrResult');
}

// ========== INIT ==========
renderHome();
checkLogin();
