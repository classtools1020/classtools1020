<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>⚔️ 全等戰場 · 五星天王最終戰 · AAS + RHS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;
  font-family:"Microsoft JhengHei","微軟正黑體","Impact",sans-serif;
  font-size:20px;user-select:none;touch-action:manipulation;color:#fff}
body{display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse at top, rgba(138,43,226,.25) 0%, transparent 60%),
    radial-gradient(ellipse at bottom, rgba(0,201,255,.15) 0%, transparent 60%),
    linear-gradient(135deg, #0A0E27 0%, #1A0F3E 40%, #2D1B4E 100%)}

:root{
  --gold:#FFD700; --gold-dk:#C9A227;
  --cyan:#00F5FF; --cyan-dk:#00B8D4;
  --red:#FF3B30; --red-dk:#C00A03;
  --purple:#B967FF; --purple-dk:#7D2AE8;
  --green:#39FF14; --green-dk:#00C853;
  --orange:#FF8A00; --orange-dk:#E67E00;
  --bg-dark:#0A0E27; --bg-mid:#1A1F3A;
  --text:#FFFFFF; --text-dim:#B8C5D6;
  --shadow:0 4px 20px rgba(0,0,0,.5);
  --glow-gold:0 0 20px rgba(255,215,0,.6),0 0 40px rgba(255,215,0,.3);
  --glow-cyan:0 0 20px rgba(0,245,255,.6),0 0 40px rgba(0,245,255,.3);
  --glow-purple:0 0 20px rgba(185,103,255,.6),0 0 40px rgba(185,103,255,.3);
  --glow-red:0 0 20px rgba(255,59,48,.6),0 0 40px rgba(255,59,48,.3);
}

/* ==================== 星空背景 ==================== */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, #fff, transparent),
    radial-gradient(1px 1px at 30% 70%, #fff, transparent),
    radial-gradient(1px 1px at 50% 40%, #FFD700, transparent),
    radial-gradient(2px 2px at 70% 25%, #00F5FF, transparent),
    radial-gradient(1px 1px at 85% 60%, #fff, transparent),
    radial-gradient(1px 1px at 15% 85%, #B967FF, transparent),
    radial-gradient(1px 1px at 95% 90%, #fff, transparent),
    radial-gradient(2px 2px at 40% 10%, #fff, transparent),
    radial-gradient(1px 1px at 60% 55%, #39FF14, transparent),
    radial-gradient(1px 1px at 25% 45%, #FFD700, transparent);
  background-size:200% 200%; animation:starMove 60s linear infinite}
@keyframes starMove{0%{background-position:0 0}100%{background-position:200% 200%}}

/* ==================== 老師提示列 ==================== */
#teacher-tip{background:linear-gradient(90deg,rgba(255,215,0,.15),rgba(255,215,0,.05));
  border-bottom:3px solid var(--gold);padding:12px 20px;min-height:74px;
  display:flex;align-items:center;gap:12px;position:relative;z-index:3;
  backdrop-filter:blur(10px)}
#teacher-tip .badge{background:linear-gradient(135deg,var(--gold),var(--orange));
  color:#1A0F3E;padding:6px 14px;border-radius:20px;font-weight:900;
  font-size:15px;white-space:nowrap;box-shadow:var(--glow-gold)}
#teacher-tip .content{flex:1;font-size:19px;line-height:1.5;color:#fff;
  font-weight:600;text-shadow:0 2px 4px rgba(0,0,0,.5)}
#teacher-tip .content b{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.5)}
#teacher-tip .scene-tag{background:linear-gradient(135deg,var(--purple),var(--purple-dk));
  color:#fff;padding:6px 12px;border-radius:10px;font-size:14px;font-weight:900;
  white-space:nowrap;box-shadow:var(--glow-purple)}

/* ==================== 進度條 ==================== */
#progress{height:12px;background:rgba(0,0,0,.5);display:flex;
  position:relative;z-index:3;border-bottom:2px solid var(--cyan-dk)}
.prog-seg{flex:1;background:transparent;border-right:2px solid rgba(255,255,255,.1);
  transition:background .3s;position:relative}
.prog-seg:last-child{border-right:none}
.prog-seg.done{background:linear-gradient(90deg,var(--purple),var(--cyan))}
.prog-seg.current{background:linear-gradient(90deg,var(--gold),var(--orange));
  animation:progPulse 1.4s infinite}
@keyframes progPulse{0%,100%{opacity:.8;box-shadow:0 0 10px var(--gold)}
  50%{opacity:1;box-shadow:0 0 20px var(--gold)}}

/* ==================== 主舞台 ==================== */
#stage{flex:1;position:relative;overflow:hidden;z-index:2}
#canvas{width:100%;height:100%;display:block;position:relative;z-index:2}

/* 旁白大字 (學生看的) */
#narration{position:absolute;top:20px;left:50%;transform:translateX(-50%);
  max-width:80%;background:linear-gradient(135deg,rgba(10,14,39,.85),rgba(45,27,78,.85));
  border:3px solid var(--gold);border-radius:20px;padding:16px 32px;
  font-size:30px;font-weight:900;color:#fff;text-align:center;line-height:1.3;
  box-shadow:var(--glow-gold);z-index:20;display:none;
  text-shadow:0 0 10px rgba(255,215,0,.5);
  backdrop-filter:blur(6px);letter-spacing:1px}
#narration.visible{display:block;animation:narIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes narIn{from{opacity:0;transform:translate(-50%,-20px) scale(.9)}
  to{opacity:1;transform:translate(-50%,0) scale(1)}}

/* 關卡標籤 */
#stage-label{position:absolute;top:18px;left:20px;z-index:15;
  background:linear-gradient(135deg,var(--red),var(--orange));
  color:#fff;padding:8px 20px;border-radius:6px;font-weight:900;
  font-size:20px;box-shadow:var(--glow-red);display:none;
  clip-path:polygon(12% 0, 100% 0, 88% 100%, 0 100%);
  padding-left:28px; padding-right:28px}
#stage-label.visible{display:block;animation:stageIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes stageIn{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}

/* ==================== 控制列 ==================== */
#control-bar{background:linear-gradient(0deg,rgba(10,14,39,.95),rgba(26,15,62,.9));
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  gap:12px;z-index:15;border-top:3px solid var(--purple);
  box-shadow:0 -4px 20px rgba(185,103,255,.3)}
#progress-info{font-size:17px;color:var(--cyan);font-weight:800;min-width:140px;
  text-shadow:0 0 8px var(--cyan-dk);letter-spacing:.5px}
#main-actions{display:flex;gap:10px;flex:1;justify-content:center;flex-wrap:wrap}
#side-controls{display:flex;gap:6px}

/* 按鈕 - 遊戲技能感 */
.btn{background:linear-gradient(135deg,#2C3E50,#1A252F);
  border:3px solid var(--cyan-dk);border-radius:12px;
  padding:12px 22px;font-size:20px;cursor:pointer;min-height:60px;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;transition:all .2s;
  font-family:inherit;gap:8px;letter-spacing:.5px;
  text-shadow:0 2px 4px rgba(0,0,0,.5)}
.btn:hover{transform:translateY(-2px) scale(1.03);
  box-shadow:var(--glow-cyan)}
.btn:active{transform:translateY(0) scale(.98)}

/* 主按鈕 - 金色技能 */
.btn-next{background:linear-gradient(135deg,#FFD700,#FF8A00);
  border:3px solid var(--gold);color:#1A0F3E;
  min-width:220px;font-size:24px;font-weight:900;
  box-shadow:var(--glow-gold);animation:skillGlow 1.8s infinite;
  text-shadow:0 1px 2px rgba(255,255,255,.5)}
.btn-next:hover{background:linear-gradient(135deg,#FFF200,#FF9F1A);
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 30px rgba(255,215,0,.8),0 0 60px rgba(255,215,0,.4)}
@keyframes skillGlow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.5)}
  50%{box-shadow:0 0 40px rgba(255,215,0,.9),0 0 60px rgba(255,138,0,.4)}}

/* 下一關按鈕 - 紫色終技 */
.btn-scene-next{background:linear-gradient(135deg,var(--purple),var(--purple-dk));
  border:3px solid var(--purple);color:#fff;min-width:240px;font-size:22px;
  box-shadow:var(--glow-purple)}
.btn-scene-next:hover{background:linear-gradient(135deg,#D690FF,#9B4DEF);
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 30px rgba(185,103,255,.9)}

/* 答題按鈕 */
.btn-answer{min-width:220px;font-size:24px;padding:16px 24px}
.btn-ok{background:linear-gradient(135deg,var(--green),var(--green-dk));
  border-color:var(--green);color:#0A0E27;
  box-shadow:0 0 20px rgba(57,255,20,.5)}
.btn-ok:hover{box-shadow:0 0 30px rgba(57,255,20,.9)}
.btn-warn{background:linear-gradient(135deg,var(--red),var(--red-dk));
  border-color:var(--red);color:#fff;
  box-shadow:0 0 20px rgba(255,59,48,.5)}
.btn-warn:hover{box-shadow:0 0 30px rgba(255,59,48,.9)}

/* 小按鈕 */
.btn-small{min-height:48px;padding:8px 14px;font-size:18px;min-width:auto;
  background:linear-gradient(135deg,#2C3E50,#1A252F);
  border-color:rgba(255,255,255,.3)}

/* ==================== Combo 顯示 ==================== */
#combo-display{position:absolute;top:100px;right:30px;z-index:22;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;transition:all .4s;opacity:0;transform:scale(.5)}
#combo-display.visible{opacity:1;transform:scale(1)}
#combo-display .combo-x{font-size:24px;font-weight:900;color:var(--gold);
  text-shadow:0 0 10px var(--gold),0 0 20px rgba(255,215,0,.5);letter-spacing:2px}
#combo-display .combo-n{font-size:80px;font-weight:900;color:var(--gold);
  line-height:1;text-shadow:0 0 20px var(--gold),0 0 40px rgba(255,215,0,.6),
  0 4px 0 rgba(0,0,0,.3);letter-spacing:-2px}
#combo-display .combo-label{font-size:18px;font-weight:900;color:var(--cyan);
  text-shadow:0 0 10px var(--cyan);letter-spacing:3px;margin-top:-4px}

/* ==================== 分數顯示 ==================== */
#score-display{position:absolute;top:20px;right:20px;z-index:15;
  background:linear-gradient(135deg,rgba(10,14,39,.9),rgba(26,15,62,.9));
  border:2px solid var(--gold);border-radius:10px;padding:8px 16px;
  color:var(--gold);font-weight:900;font-size:18px;
  box-shadow:var(--glow-gold);display:none;
  text-shadow:0 0 8px var(--gold)}
#score-display.visible{display:block}

/* ==================== 彩帶 ==================== */
.confetti{position:fixed;width:14px;height:18px;z-index:50;
  animation:fall 3s linear;pointer-events:none;border-radius:2px;
  box-shadow:0 0 8px currentColor}
@keyframes fall{0%{transform:translateY(-20vh) rotate(0)}100%{transform:translateY(110vh) rotate(720deg)}}

/* ==================== 閃現文字 ==================== */
.flash{position:absolute;inset:0;pointer-events:none;z-index:25;
  display:flex;align-items:center;justify-content:center;
  animation:flashIn .7s ease}
.flash-text{font-size:120px;font-weight:900;
  text-shadow:0 0 20px currentColor,0 0 40px currentColor,
  0 6px 0 rgba(0,0,0,.3);letter-spacing:-2px}
@keyframes flashIn{0%{opacity:0;transform:scale(.3) rotate(-10deg)}
  50%{opacity:1;transform:scale(1.3) rotate(5deg)}
  100%{opacity:0;transform:scale(1) rotate(0)}}

/* ==================== 粒子光效 ==================== */
.spark{position:absolute;width:8px;height:8px;border-radius:50%;
  pointer-events:none;z-index:24}

@media (max-width:720px){
  #teacher-tip{padding:8px 12px;flex-wrap:wrap;min-height:auto}
  #teacher-tip .content{font-size:15px}
  #narration{font-size:22px;padding:12px 20px;max-width:92%}
  .btn{font-size:17px;padding:8px 14px;min-height:48px}
  .btn-next,.btn-scene-next{min-width:150px;font-size:18px}
  #combo-display .combo-n{font-size:50px}
  #stage-label{font-size:14px;padding:6px 16px}
}
</style>
</head>
<body>

<div id="starfield"></div>

<div id="teacher-tip">
  <div class="badge">👩‍🏫 老師</div>
  <div class="content" id="tip-content">點「▶ 發動技能」開始召喚師訓練！</div>
  <div class="scene-tag" id="scene-tag">1/6</div>
</div>

<div id="progress">
  <div class="prog-seg current"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
</div>

<div id="stage">
  <svg id="canvas" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- 金色漸層 -->
      <linearGradient id="gradGold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFE34D"/>
        <stop offset="100%" stop-color="#FF8A00"/>
      </linearGradient>
      <!-- 紅色漸層 -->
      <linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF6B6B"/>
        <stop offset="100%" stop-color="#C00A03"/>
      </linearGradient>
      <!-- 藍色漸層 -->
      <linearGradient id="gradBlue" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4DBCFF"/>
        <stop offset="100%" stop-color="#0066CC"/>
      </linearGradient>
      <!-- 紫色漸層 -->
      <linearGradient id="gradPurple" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#D690FF"/>
        <stop offset="100%" stop-color="#7D2AE8"/>
      </linearGradient>
      <!-- 青綠 -->
      <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5EFF8F"/>
        <stop offset="100%" stop-color="#00A849"/>
      </linearGradient>
      <!-- 陰影 / 發光 -->
      <filter id="neonGold" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#FFD700"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="neonRed" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#FF3B30"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#00F5FF"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="neonPurple" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feFlood flood-color="#B967FF"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="neonGreen" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#39FF14"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- 六角形遮罩 -->
      <clipPath id="hexClip">
        <polygon points="50,0 93,25 93,75 50,100 7,75 7,25"/>
      </clipPath>
    </defs>
    <g id="scene-root"></g>
  </svg>
  <div id="stage-label"></div>
  <div id="narration"></div>
  <div id="combo-display">
    <div class="combo-x">COMBO</div>
    <div class="combo-n">0</div>
    <div class="combo-label">×</div>
  </div>
  <div id="score-display">⭐ <span id="score-num">0</span> / 4</div>
</div>

<div id="control-bar">
  <div id="progress-info">⚔️ 第 <span id="s-n">1</span> / 6 關</div>
  <div id="main-actions">
    <button class="btn btn-next" id="btn-next">▶ 發動技能</button>
  </div>
  <div id="side-controls">
    <button class="btn btn-small" id="btn-prev" title="上一關">◀</button>
    <button class="btn btn-small" id="btn-restart" title="重新開始">🔁</button>
    <button class="btn btn-small" id="btn-mute" title="靜音">🔊</button>
  </div>
</div>

<script>
const state = { sceneIdx:0, stepIdx:-1, audioOn:true };

// ==== 音效 ====
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state==="suspended") audioCtx.resume();
}
function beep(f,d=0.15,t="sine",g=0.2){
  if(!state.audioOn||!audioCtx) return;
  const o=audioCtx.createOscillator(), gn=audioCtx.createGain();
  o.type=t; o.frequency.value=f;
  gn.gain.setValueAtTime(g, audioCtx.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+d);
}
const SFX = {
  click(){ beep(800,0.05,"square",0.1); },
  reveal(){ beep(523,0.12,"sine",0.15); setTimeout(()=>beep(659,0.12,"sine",0.15),80); },
  pop(){ beep(1047,0.08,"triangle",0.18); },
  combo(n){
    const base = 660 + n*110;
    beep(base,0.1,"square",0.15);
    setTimeout(()=>beep(base*1.25,0.12,"square",0.15),60);
  },
  ultimate(){
    [440,554,659,880,1175].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"sawtooth",0.18),i*80));
  },
  success(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"sine",0.2),i*100)); },
  gentle(){ beep(440,0.15,"sine",0.12); setTimeout(()=>beep(330,0.2,"sine",0.12),150); },
  win(){
    const seq = [523,659,784,1047,1319];
    seq.forEach((f,i)=>setTimeout(()=>beep(f,0.22,"sawtooth",0.2),i*120));
  }
};

// ==== 幾何 ====
function triFromSSS(a,b,c){
  if(a+b<=c||b+c<=a||a+c<=b) return null;
  const x=(c*c+a*a-b*b)/(2*a);
  const y=Math.sqrt(Math.max(c*c-x*x,0));
  return [{x,y:-y,label:"A"},{x:0,y:0,label:"B"},{x:a,y:0,label:"C"}];
}
function tform(pts,cx,cy,scale=20){
  const mx=pts.reduce((s,p)=>s+p.x,0)/3, my=pts.reduce((s,p)=>s+p.y,0)/3;
  return pts.map(p=>({x:cx+(p.x-mx)*scale, y:cy+(p.y-my)*scale, label:p.label}));
}
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpPts(p1,p2,t){
  return p1.map((p,i)=>({x:lerp(p.x,p2[i].x,t), y:lerp(p.y,p2[i].y,t), label:p.label}));
}

// ==== SVG 工具 ====
const NS="http://www.w3.org/2000/svg";
function el(tag,attrs={},parent=null){
  const e=document.createElementNS(NS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function clearScene(){
  const r=document.getElementById("scene-root");
  r.innerHTML="";
  return r;
}
function triPath(pts){
  return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y} L${pts[2].x},${pts[2].y} Z`;
}

// 霓虹三角形 (水晶/寶石風格)
function drawTri(parent, pts, opts={}){
  const {fill="url(#gradPurple)", stroke="#B967FF", sw=5, id="",
         glow="neonPurple", labels=false, showLen=null} = opts;
  const g = el("g", id?{id, filter:`url(#${glow})`}:{filter:`url(#${glow})`}, parent);
  // 外發光層
  el("path", {d:triPath(pts), fill:"none", stroke, "stroke-width":sw+3,
    opacity:.4, "stroke-linejoin":"round"}, g);
  // 主體
  el("path", {d:triPath(pts), fill, stroke, "stroke-width":sw,
    "stroke-linejoin":"round", "stroke-linecap":"round"}, g);
  // 內部高光 (水晶感)
  const cx = pts.reduce((s,p)=>s+p.x,0)/3;
  const cy = pts.reduce((s,p)=>s+p.y,0)/3;
  el("path", {
    d:`M${pts[0].x},${pts[0].y} L${(pts[0].x+cx)/2},${(pts[0].y+cy)/2}`,
    stroke:"#fff", "stroke-width":2, opacity:.5, fill:"none"
  }, g);
  if(labels){
    pts.forEach(p=>{
      const dx=p.label==="A"?0:(p.label==="B"?-22:22);
      const dy=p.label==="A"?-20:26;
      const t = el("text",{x:p.x+dx,y:p.y+dy,"font-size":24,"font-weight":900,
        fill:"#fff","text-anchor":"middle",
        "stroke":"#000","stroke-width":3,"paint-order":"stroke"},g);
      t.textContent = p.label;
    });
  }
  if(showLen){
    const m=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
    const mAB=m(pts[0],pts[1]), mBC=m(pts[1],pts[2]), mCA=m(pts[2],pts[0]);
    const lbl = (x,y,text,color="#FFD700") => {

// SAS: 兩邊 + 夾角 → 三頂點
function triFromSAS(sideLeft, angleDeg, sideRight){
  const g = angleDeg * Math.PI/180;
  const a = Math.sqrt(sideLeft*sideLeft + sideRight*sideRight - 2*sideLeft*sideRight*Math.cos(g));
  return triFromSSS(a, sideRight, sideLeft);
}
// ASA: 兩角 + 夾邊 → 三頂點
function triFromASA(angleBDeg, sideBC, angleCDeg){
  const B = angleBDeg * Math.PI/180;
  const C = angleCDeg * Math.PI/180;
  const A = Math.PI - B - C;
  const a = sideBC;
  const b = a * Math.sin(B) / Math.sin(A);
  const c = a * Math.sin(C) / Math.sin(A);
  return triFromSSS(a, b, c);
}
// 角度弧
function drawAngleArc(parent, vertex, p1, p2, radius, color, sw){
  radius = radius || 28; color = color || "#F39C12"; sw = sw || 5;
  const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
  const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
  let da = a2 - a1;
  while(da > Math.PI) da -= 2*Math.PI;
  while(da < -Math.PI) da += 2*Math.PI;
  const sweep = da > 0 ? 1 : 0;
  const start = {x:vertex.x+Math.cos(a1)*radius, y:vertex.y+Math.sin(a1)*radius};
  const end = {x:vertex.x+Math.cos(a2)*radius, y:vertex.y+Math.sin(a2)*radius};
  return el("path", {
    d:`M${start.x},${start.y} A${radius},${radius} 0 0,${sweep} ${end.x},${end.y}`,
    stroke:color, "stroke-width":sw, fill:"none", "stroke-linecap":"round"
  }, parent);
}
// 粗邊線
function drawEdge(parent, p1, p2, color, sw, id){
  color = color || "#FFD700"; sw = sw || 10;
  const attrs = {x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y,
    stroke:color, "stroke-width":sw, "stroke-linecap":"round"};
  if(id) attrs.id = id;
  return el("line", attrs, parent);
}

// 動畫三角形
let animId = 0;
function animateTri(elemId, from, to, frames, onDone){
  cancelAnimationFrame(animId);
  let f = 0;
  const tick = () => {
    f++;
    const t = f/frames;
    const cur = lerpPts(from, to, t);
    const paths = document.querySelectorAll(`#${elemId} path`);
    paths.forEach(p => p.setAttribute("d", triPath(cur)));
    if(f < frames) animId = requestAnimationFrame(tick);
    else if(onDone) onDone();
  };
  tick();
}

      tip:"說：『公園有兩座滑梯，看起來一樣。<b>滑梯是直角三角形——直角+斜邊+底部。</b>』",
      narrate:"🛝 直角三角形 = 滑梯形狀",
      run(){
        const root = document.getElementById("scene-root");
        // 直角三角形 (3-4-5)
        const A = triFromSSS(3, 5, 4);  // 直角在 B
        const p = tform(A, 800, 500, 50);
        drawTri(root, p, {fill:"url(#gradBlue)", stroke:"#4DBCFF", sw:5, glow:"neonCyan"});
        // 直角符號 (在 B 點 - 即下方)
        // 找直角頂點：邊 a=BC=3, b=CA=5, c=AB=4, 直角在 a²+c²=b² 的對應頂點 = B
        // 用簡單作法：在 B 點畫小方框
        const B = p[1]; // 角 B 是直角
        // 標直角符號
        const sz = 16;
        // 計算 B 出發指向 A 和 C 的單位向量
        const vA = {x:p[0].x-B.x, y:p[0].y-B.y};
        const vC = {x:p[2].x-B.x, y:p[2].y-B.y};
        const lenA = Math.sqrt(vA.x*vA.x+vA.y*vA.y);
        const lenC = Math.sqrt(vC.x*vC.x+vC.y*vC.y);
        const uA = {x:vA.x/lenA*sz, y:vA.y/lenA*sz};
        const uC = {x:vC.x/lenC*sz, y:vC.y/lenC*sz};
        el("path", {d:`M${B.x+uA.x},${B.y+uA.y} L${B.x+uA.x+uC.x},${B.y+uA.y+uC.y} L${B.x+uC.x},${B.y+uC.y}`,
          fill:"none", stroke:"#FF3B30", "stroke-width":4}, root);
        SFX.reveal();
      }
    },
    {
      tip:"說：『<b>RHS 三件套：</b>R = 直角（紅色方框）、H = 斜邊（紫色長邊）、S = 一股（青色短邊）。』",
      narrate:"🟥 直角 + 🟣 斜邊 + 🔷 一股",
      run(){
        const root = document.getElementById("scene-root");
        // 標斜邊紫色 (CA - 最長 5)
        const p = tform(triFromSSS(3, 5, 4), 800, 500, 50);
        drawEdge(root, p[2], p[0], "#B967FF", 9, "rhs-hyp");
        drawEdge(root, p[1], p[0], "#00F5FF", 8, "rhs-leg");
        // 標籤
        el("text", {x:p[2].x+(p[0].x-p[2].x)/2 + 30, y:p[2].y+(p[0].y-p[2].y)/2,
          "font-size":20, "font-weight":900, fill:"#B967FF"}, root).textContent = "斜邊";
        el("text", {x:p[1].x+(p[0].x-p[1].x)/2 - 30, y:p[1].y+(p[0].y-p[1].y)/2,
          "font-size":20, "font-weight":900, fill:"#00F5FF"}, root).textContent = "一股";
        SFX.pop();
      }
    },
    {
      tip:"說：『<b>RHS 解鎖！</b>兩個直角三角形，斜邊一樣 + 一股一樣 → 一定全等！這是 5 大全等的最後一招！』",
      narrate:"⚡ RHS 絕技解鎖！",
      run(){
        const root = clearScene();
        // 三個一樣的 RHS 三角形 (3-4-5)
        for(let i=0;i<3;i++){
          const p = tform(triFromSSS(3, 5, 4), 500 + i*300, 480, 30);
          drawTri(root, p, {fill:"url(#gradBlue)", stroke:"#4DBCFF", sw:4, glow:"neonCyan"});
          drawEdge(root, p[2], p[0], "#B967FF", 7);  // 斜邊紫
          drawEdge(root, p[1], p[0], "#00F5FF", 7);  // 一股青
          // 直角符號
          const B = p[1];
          const sz = 12;
          const vA = {x:p[0].x-B.x, y:p[0].y-B.y};
          const vC = {x:p[2].x-B.x, y:p[2].y-B.y};
          const lenA = Math.sqrt(vA.x*vA.x+vA.y*vA.y);
          const lenC = Math.sqrt(vC.x*vC.x+vC.y*vC.y);
          const uA = {x:vA.x/lenA*sz, y:vA.y/lenA*sz};
          const uC = {x:vC.x/lenC*sz, y:vC.y/lenC*sz};
          el("path", {d:`M${B.x+uA.x},${B.y+uA.y} L${B.x+uA.x+uC.x},${B.y+uA.y+uC.y} L${B.x+uC.x},${B.y+uC.y}`,
            fill:"none", stroke:"#FF3B30", "stroke-width":3}, root);
        }
        el("rect", {x:400, y:140, width:800, height:100, rx:16,
          fill:"#0A0E27", stroke:"#FF3B30", "stroke-width":5,
          filter:"url(#neonRed)"}, root);
        el("text", {x:800, y:180, "text-anchor":"middle", "font-size":24,
          "font-weight":900, fill:"#FF3B30"}, root).textContent = "⚡ FINAL SKILL UNLOCKED";
        el("text", {x:800, y:218, "text-anchor":"middle", "font-size":36,
          "font-weight":900, fill:"#fff",
          "stroke":"#000","stroke-width":4,"paint-order":"stroke"}, root)
          .textContent = "RHS = 直角 + 斜邊 + 一股";
        flashBig("MAX LEVEL!", "#FFD700", 120);
        confetti(40);
        SFX.ultimate();
      }
    }
  ],
  afterSteps:{
    tip:"<b>第 4 關通關</b>：RHS 是直角三角形專用！五招集齊！",
    narrate:"5 招天王 · ALL UNLOCKED"
  }
},

// ============ 第5關 · 五招大亂鬥 BOSS 戰 ============
{
  name:"五招大亂鬥",
  stageLabel:"第 5 關 · 最終 BOSS · 5 題",
  _quizzes:[
    {type:"SSS", desc:"兩個三角形：三邊都是 5、7、8", correct:"SSS", why:"三邊對應 → SSS ✅"},
    {type:"SAS", desc:"兩邊 6、8 + 夾角 60°", correct:"SAS", why:"兩邊+夾角 → SAS ✅"},
    {type:"ASA", desc:"兩角 50°、70° + 夾邊 6", correct:"ASA", why:"兩角+夾邊 → ASA ✅"},
    {type:"AAS", desc:"兩角 50°、70° + 對邊 6（不是夾邊）", correct:"AAS", why:"兩角+對邊 → AAS ✅"},
    {type:"RHS", desc:"直角三角形：斜邊 5 + 一股 4", correct:"RHS", why:"直角+斜邊+一股 → RHS ✅"},
  ],
  _q:0, _score:0, _streak:0,
  init(){ this._q=0; this._score=0; this._streak=0; this._render(); },
  _render(){
    const root = clearScene();
    hideCombo();
    if(this._q >= this._quizzes.length){
      stageBanner(root, "BOSS 結算", "FINAL RESULT");
      el("rect", {x:480, y:240, width:640, height:320, rx:20,
        fill:"#0A0E27", stroke:"#FFD700", "stroke-width":5,
        filter:"url(#neonGold)"}, root);
      el("text", {x:800, y:330, "text-anchor":"middle", "font-size":36,
        "font-weight":900, fill:"#FFD700"}, root).textContent = "⭐ 五招天王得分";
      el("text", {x:800, y:430, "text-anchor":"middle", "font-size":100,
        "font-weight":900, fill:"url(#gradGold)",
        "stroke":"#000","stroke-width":5,"paint-order":"stroke"}, root).textContent = `${this._score} / 5`;
      const rank = this._score===5 ? "S+" : this._score===4 ? "S" : this._score===3 ? "A" : this._score===2 ? "B" : "C";
      const rc = rank==="S+"?"#FFD700":rank==="S"?"#B967FF":rank==="A"?"#00F5FF":rank==="B"?"#39FF14":"#888";
      el("text", {x:800, y:520, "text-anchor":"middle", "font-size":36,
        "font-weight":900, fill:rc,
        "stroke":"#000","stroke-width":4,"paint-order":"stroke"}, root).textContent = `評價：${rank} 級`;
      setScore(0, 0);
      SFX.win();
      confetti(60);
      setNarration(this._score===5 ? "🏆 五星滿分！全等大師！" : "🎉 戰鬥結束！");
      return;
    }
    stageBanner(root, `BOSS · 第 ${this._q+1}/5 題`, "用哪一招？");
    const cur = this._quizzes[this._q];
    if(cur.type === "SSS"){
      const p = tform(triFromSSS(5,7,8), 800, 500, 35);
      drawTri(root, p, {fill:"url(#gradRed)", stroke:"#FF3B30", sw:7,
        glow:"neonRed", showLen:{AB:8, BC:5, CA:7}});
    } else if(cur.type === "SAS"){
      const p = tform(triFromSAS(6, 60, 8), 800, 500, 32);
      drawTri(root, p, {fill:"#0A0E27", stroke:"#888", sw:3});
      drawEdge(root, p[0], p[1], "#00F5FF", 9);
      drawEdge(root, p[0], p[2], "#00F5FF", 9);
      drawAngleArc(root, p[0], p[1], p[2], 30, "#FF8A00", 7);
    } else if(cur.type === "ASA"){
      const p = tform(triFromASA(50, 6, 70), 800, 500, 50);
      drawTri(root, p, {fill:"#0A0E27", stroke:"#888", sw:3});
      drawEdge(root, p[1], p[2], "#39FF14", 9);
      drawAngleArc(root, p[1], p[0], p[2], 26, "#FFD700", 6);
      drawAngleArc(root, p[2], p[0], p[1], 26, "#FFD700", 6);
    } else if(cur.type === "AAS"){
      const p = tform(triFromASA(50, 6, 70), 800, 500, 50);
      drawTri(root, p, {fill:"#0A0E27", stroke:"#888", sw:3});
      drawEdge(root, p[0], p[1], "#B967FF", 9);  // 紫對邊
      drawAngleArc(root, p[1], p[0], p[2], 26, "#FFD700", 6);
      drawAngleArc(root, p[2], p[0], p[1], 26, "#FFD700", 6);
    } else if(cur.type === "RHS"){
      const p = tform(triFromSSS(3, 5, 4), 800, 500, 50);
      drawTri(root, p, {fill:"url(#gradBlue)", stroke:"#4DBCFF", sw:4});
      drawEdge(root, p[2], p[0], "#B967FF", 9);
      drawEdge(root, p[1], p[0], "#00F5FF", 9);
      // 直角符號
      const B = p[1], sz = 14;
      const vA = {x:p[0].x-B.x, y:p[0].y-B.y};
      const vC = {x:p[2].x-B.x, y:p[2].y-B.y};
      const lenA = Math.sqrt(vA.x*vA.x+vA.y*vA.y);
      const lenC = Math.sqrt(vC.x*vC.x+vC.y*vC.y);
      const uA = {x:vA.x/lenA*sz, y:vA.y/lenA*sz};
      const uC = {x:vC.x/lenC*sz, y:vC.y/lenC*sz};
      el("path", {d:`M${B.x+uA.x},${B.y+uA.y} L${B.x+uA.x+uC.x},${B.y+uA.y+uC.y} L${B.x+uC.x},${B.y+uC.y}`,
        fill:"none", stroke:"#FF3B30", "stroke-width":4}, root);
    }
    el("text", {x:800, y:140, "text-anchor":"middle", "font-size":24,
      "font-weight":900, fill:"#9B4DFF",
      "stroke":"#000","stroke-width":3,"paint-order":"stroke"}, root).textContent = cur.desc;
    el("text", {x:800, y:200, "text-anchor":"middle", "font-size":22,
      "font-weight":700, fill:"#fff"}, root).textContent = "兩個三角形全等，要用哪一招？";
    setScore(this._score, 5);
  },
  steps:[
    {
      tip:"說：『<b>最終 BOSS 戰！5 題</b>。每題選 SSS、SAS、ASA、AAS、RHS。學生舉手喊答，老師按按鈕。』",
      narrate:"⚔️ 五招大亂鬥開始！",
      run(){}
    }
  ],
  afterSteps:{ tip:"戰鬥中", narrate:"" },
  onFinalStep(){
    const actions = document.getElementById("main-actions");
    actions.innerHTML = "";
    const colors = {
      "SSS": "linear-gradient(135deg,#FF3B30,#C00A03)",
      "SAS": "linear-gradient(135deg,#00F5FF,#0088CC)",
      "ASA": "linear-gradient(135deg,#39FF14,#00A849)",
      "AAS": "linear-gradient(135deg,#B967FF,#7D2AE8)",
      "RHS": "linear-gradient(135deg,#FFD700,#FF8A00)",
    };
    ["SSS","SAS","ASA","AAS","RHS"].forEach(label => {
      const b = document.createElement("button");
      b.className = "btn btn-answer";
      b.textContent = label;
      b.style.background = colors[label];
      b.style.minWidth = "110px";
      b.style.fontSize = "24px";
      b.style.color = (label==="RHS" || label==="SAS") ? "#0A0E27" : "#fff";
      b.style.borderColor = "rgba(255,255,255,.3)";
      b.onclick = () => this.answer(label);
      actions.appendChild(b);
    });
  },
  answer(choice){
    SFX.click();
    const cur = this._quizzes[this._q];
    if(choice === cur.correct){
      flashCorrect(); setNarration(cur.why);
      this._score++; this._streak++;
      if(this._streak >= 3) showCombo(this._streak);
    } else {
      flashRetry(); setNarration("💛 不對～答案是 " + cur.correct);
      this._streak = 0; hideCombo();
    }
    setTimeout(()=>{
      this._q++; this._render();
      if(this._q >= this._quizzes.length){
        const actions = document.getElementById("main-actions");
        actions.innerHTML = "";
        const nx = document.createElement("button");
        nx.className = "btn btn-scene-next";
        nx.textContent = "🏆 進入勝利畫面";
        nx.onclick = nextScene;
        actions.appendChild(nx);
      } else {
        scenes[4].onFinalStep();
      }
    }, 1900);
  }
},

// ==== 控制 ====
function renderScene(){
  const scene = scenes[state.sceneIdx];
  state.stepIdx = -1;
  hideCombo();
  setScore(0, 0);
  scene.init && scene.init();
  setNarration("");
  setStageLabel(scene.stageLabel || "");
  setTeacherTip(`<b>🎬 第 ${state.sceneIdx+1} 關：${scene.name}</b><br>按「▶ 發動技能」開始`);
  document.getElementById("s-n").textContent = state.sceneIdx + 1;
  document.getElementById("scene-tag").textContent = `${state.sceneIdx+1}/6`;
  document.querySelectorAll(".prog-seg").forEach((s,i)=>{
    s.classList.remove("done","current");
    if(i < state.sceneIdx) s.classList.add("done");
    else if(i === state.sceneIdx) s.classList.add("current");
  });
  const actions = document.getElementById("main-actions");
  actions.innerHTML = "";
  const b = document.createElement("button");
  b.className = "btn btn-next";
  b.textContent = "▶ 發動技能";
  b.onclick = advanceStep;
  actions.appendChild(b);
}

function advanceStep(){
  SFX.click(); ensureAudio();
  const scene = scenes[state.sceneIdx];
  state.stepIdx++;
  if(state.stepIdx < scene.steps.length){
    const step = scene.steps[state.stepIdx];
    setTeacherTip(`<b>🎬 ${state.sceneIdx+1}.${state.stepIdx+1}</b> ${step.tip}`);
    setNarration(step.narrate);
    step.run && step.run.call(scene);
    if(scene.onFinalStep && state.stepIdx === scene.steps.length - 1){
      setTimeout(()=>scene.onFinalStep(), 600);
    }
  } else {
    if(scene.afterSteps){
      setTeacherTip(`<b>✅ 本關通關</b> ${scene.afterSteps.tip}`);
      if(scene.afterSteps.narrate) setNarration(scene.afterSteps.narrate);
    }
    const actions = document.getElementById("main-actions");
    actions.innerHTML = "";
    if(state.sceneIdx < scenes.length - 1){
      const nx = document.createElement("button");
      nx.className = "btn btn-scene-next";
      nx.textContent = "▶ 進入下一關";
      nx.onclick = nextScene;
      actions.appendChild(nx);
    } else {
      const rst = document.createElement("button");
      rst.className = "btn btn-scene-next";
      rst.textContent = "🔁 再戰一次";
      rst.onclick = () => { state.sceneIdx=0; renderScene(); };
      actions.appendChild(rst);
    }
  }
}
function nextScene(){ SFX.click(); if(state.sceneIdx<scenes.length-1){state.sceneIdx++; renderScene();} }
function prevScene(){ SFX.click(); if(state.sceneIdx>0){state.sceneIdx--; renderScene();} }

document.addEventListener("click", ensureAudio, {once:true});
document.addEventListener("touchstart", ensureAudio, {once:true});
document.getElementById("btn-prev").onclick = prevScene;
document.getElementById("btn-restart").onclick = () => { SFX.click(); state.sceneIdx=0; renderScene(); };
document.getElementById("btn-mute").onclick = (e) => {
  state.audioOn = !state.audioOn;
  e.currentTarget.textContent = state.audioOn ? "🔊" : "🔇";
  if(state.audioOn) SFX.click();
};
document.addEventListener("keydown", e => {
  if(e.key==="ArrowRight" || e.key===" "){ e.preventDefault(); advanceStep(); }
  if(e.key==="ArrowLeft") prevScene();
});

renderScene();
</script>
