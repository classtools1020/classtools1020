<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🔺 全等三角形 · 8 關闖關</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html,body{overflow-x:hidden}
  body{
    font-family:'Microsoft JhengHei','Noto Sans TC',-apple-system,sans-serif;
    background:radial-gradient(ellipse at top,#1A0F3E 0%,#0A0E27 60%,#000 100%);
    color:#fff;min-height:100vh;line-height:1.5;
    user-select:none;-webkit-user-select:none;
  }
  #app{max-width:780px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column}

  /* ===== Header ===== */
  header{
    background:rgba(10,14,39,.85);
    border:2px solid #B967FF;border-radius:14px;padding:12px 14px;margin-bottom:12px;
    box-shadow:0 0 18px rgba(185,103,255,.3);
  }
  .h-row{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
  .h-title{font-size:1em;font-weight:900;color:#FFD700}
  .h-stars{font-size:1em;font-weight:900;color:#FFD700}
  .h-stars span{color:#fff}
  .progress-dots{display:flex;gap:5px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .dot{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.85em;font-weight:900;
    background:#1A1A2E;border:2px solid #555;color:#888;transition:all .25s;
  }
  .dot.done{background:#39FF14;border-color:#39FF14;color:#000;box-shadow:0 0 12px #39FF14}
  .dot.cur{background:#FFD700;border-color:#FFD700;color:#000;box-shadow:0 0 14px #FFD700;transform:scale(1.18)}

  /* ===== Stage ===== */
  main{
    flex:1;
    background:rgba(10,14,39,.7);
    border:2px solid rgba(185,103,255,.3);
    border-radius:14px;padding:16px;margin-bottom:12px;min-height:480px;
  }
  .level-title{
    text-align:center;font-size:1.4em;font-weight:900;color:#FFD700;
    text-shadow:2px 2px 0 #000,0 0 12px rgba(255,215,0,.6);margin-bottom:4px;
  }
  .level-sub{text-align:center;color:#B967FF;font-size:.92em;font-weight:700;margin-bottom:12px}
  .speak-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
  .speak-icon{font-size:2.4em;flex-shrink:0;line-height:1}
  .speak-bubble{
    flex:1;background:#fff;color:#111;padding:10px 14px;border-radius:14px;
    font-weight:700;font-size:1.02em;line-height:1.5;position:relative;
  }
  .speak-bubble::before{
    content:'';position:absolute;left:-10px;top:14px;
    border:8px solid transparent;border-right-color:#fff;
  }

  /* SVG */
  .svg-wrap{display:flex;justify-content:center;align-items:center;gap:8px;margin:14px 0;flex-wrap:wrap}
  .eq-symbol{font-size:2.5em;font-weight:900;color:#B967FF;text-shadow:0 0 14px #B967FF}
  svg{max-width:100%;height:auto}

  /* Cards (for shape-pick / tri-match) */
  .card-grid{display:grid;gap:10px;margin-top:10px}
  .card-grid.g2{grid-template-columns:1fr 1fr}
  .card-grid.g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:480px){.card-grid.g3{grid-template-columns:1fr 1fr}}
  .card{
    background:#1A1A2E;border:3px solid #4DBCFF;border-radius:14px;
    padding:8px;cursor:pointer;text-align:center;transition:all .15s;
  }
  .card:active{transform:scale(.97)}
  .card.right{border-color:#39FF14;background:rgba(57,255,20,.18);box-shadow:0 0 18px #39FF14}
  .card.wrong{border-color:#FF3B30;background:rgba(255,59,48,.18);animation:shake .4s}

  /* Answer buttons */
  .answers{display:grid;gap:10px;margin-top:14px}
  .answers.two{grid-template-columns:1fr 1fr}
  .answers.three{grid-template-columns:repeat(3,1fr)}
  .answers.four{grid-template-columns:repeat(4,1fr)}
  @media(max-width:520px){
    .answers.three{grid-template-columns:1fr 1fr}
    .answers.four{grid-template-columns:1fr 1fr}
  }
  .ans-btn{
    background:linear-gradient(135deg,#1B5E8F,#0D3A5C);
    color:#fff;border:3px solid #4DBCFF;border-radius:12px;
    padding:16px 12px;font-size:1.1em;font-weight:900;
    cursor:pointer;transition:all .15s;min-height:64px;
    box-shadow:0 4px 12px rgba(77,188,255,.3);
  }
  .ans-btn:active{transform:scale(.96)}
  .ans-btn.ok{background:linear-gradient(135deg,#39FF14,#1B8B0A);border-color:#39FF14;color:#000}
  .ans-btn.warn{background:linear-gradient(135deg,#FF3B30,#A02020);border-color:#FF6B6B}
  .ans-btn.gold{background:linear-gradient(135deg,#FFD700,#B8860B);border-color:#FFD700;color:#000}
  .ans-btn:disabled{opacity:.5;cursor:not-allowed}
  .ans-btn.right{
    background:linear-gradient(135deg,#39FF14,#1B8B0A) !important;
    border-color:#39FF14 !important;color:#000 !important;
    animation:pulse .4s ease;box-shadow:0 0 24px #39FF14 !important;
  }
  .ans-btn.wrong{
    background:linear-gradient(135deg,#FF3B30,#A02020) !important;
    border-color:#FF3B30 !important;animation:shake .4s ease;
  }
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  /* Feedback */
  .feedback{
    margin-top:14px;padding:14px;border-radius:12px;
    font-size:1.08em;font-weight:800;text-align:center;line-height:1.55;
  }
  .fb-ok{background:rgba(57,255,20,.15);border:2px solid #39FF14;color:#39FF14}
  .fb-no{background:rgba(255,138,0,.15);border:2px solid #FF8A00;color:#FFB347}

  /* Next button */
  .next-row{margin-top:14px;text-align:center}
  .next-btn{
    background:linear-gradient(135deg,#FFD700,#FFA500);
    color:#000;border:none;border-radius:14px;
    padding:18px 36px;font-size:1.2em;font-weight:900;
    cursor:pointer;transition:all .15s;
    box-shadow:0 0 20px rgba(255,215,0,.5);
    min-height:60px;letter-spacing:1px;
  }
  .next-btn:active{transform:scale(.95)}

  /* Footer */
  footer{display:flex;gap:8px;justify-content:center;padding:6px 0}
  .foot-btn{
    background:rgba(255,255,255,.1);color:#fff;
    border:1px solid rgba(255,255,255,.3);border-radius:10px;
    padding:10px 18px;font-size:.95em;cursor:pointer;font-weight:700;
  }
  .foot-btn:active{background:rgba(255,255,255,.2)}

  /* Hint */
  #hint-box{
    background:rgba(255,215,0,.15);border:2px dashed #FFD700;
    border-radius:12px;padding:12px;margin-top:12px;
    color:#FFD700;font-weight:700;font-size:.96em;line-height:1.6;display:none;
  }
  #hint-box.show{display:block}

  /* Side highlight in tri */
  .highlight-edge{stroke:#FFD700 !important;stroke-width:8 !important;filter:drop-shadow(0 0 4px #FFD700)}

  /* ============ 慶祝特效 ============ */
  /* 撒花 */
  .confetti{position:fixed;width:10px;height:10px;pointer-events:none;z-index:9998}

  /* 賽車 */
  .race-car{
    position:fixed;font-size:4em;z-index:9999;pointer-events:none;
    bottom:30%;left:-100px;
    filter:drop-shadow(0 0 8px #FFD700);
  }

  /* 傳說對決光圈 */
  .legend-banner{
    position:fixed;top:30%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    z-index:9999;pointer-events:none;
    text-align:center;width:90%;max-width:400px;
  }
  .legend-banner.show{animation:legendIn 1.8s ease forwards}
  @keyframes legendIn{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-180deg);opacity:0}
    35%{transform:translate(-50%,-50%) scale(1.2) rotate(0);opacity:1}
    65%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}
    100%{transform:translate(-50%,-50%) scale(1.4) rotate(0);opacity:0}
  }
  .legend-text{
    background:linear-gradient(135deg,#FFD700,#FFA500,#FF6B00);
    color:#000;font-weight:900;font-size:2.2em;padding:18px 28px;
    border-radius:18px;border:5px solid #FFF;
    box-shadow:0 0 60px #FFD700,inset 0 0 20px #FFF;
    text-shadow:2px 2px 0 #FFF;letter-spacing:3px;
  }
  .legend-stars{font-size:1.5em;margin-top:10px;color:#FFD700;letter-spacing:8px;text-shadow:0 0 16px #FFD700}

  /* 扭蛋機 */
  .gacha-overlay{
    position:fixed;inset:0;z-index:9999;
    background:rgba(0,0,0,.85);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  .gacha-overlay.show{opacity:1;pointer-events:auto}
  .gacha-box{
    background:linear-gradient(135deg,#1A0F3E,#3D1A6E);
    border:4px solid #FFD700;border-radius:24px;
    padding:24px 28px;text-align:center;max-width:90%;width:340px;
    box-shadow:0 0 50px #FFD700;
  }
  .gacha-machine{font-size:5em;margin:0 auto 10px;animation:wiggle 0.5s infinite}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .gacha-prize{font-size:6em;margin:14px 0;animation:prizePop .8s ease}
  @keyframes prizePop{
    0%{transform:scale(0) rotate(0);opacity:0}
    60%{transform:scale(1.4) rotate(20deg);opacity:1}
    100%{transform:scale(1) rotate(0);opacity:1}
  }
  .gacha-name{font-size:1.4em;font-weight:900;color:#FFD700;margin-bottom:6px}
  .gacha-rarity{font-weight:800;font-size:1em;margin-bottom:12px}
  .rarity-common{color:#fff}
  .rarity-rare{color:#4DBCFF}
  .rarity-epic{color:#B967FF}
  .rarity-legendary{color:#FFD700;text-shadow:0 0 12px #FFD700}
  .gacha-close{
    margin-top:14px;background:#FFD700;color:#000;
    border:none;border-radius:10px;padding:12px 30px;
    font-weight:900;font-size:1.05em;cursor:pointer;
  }

  /* Final victory */
  .victory-screen{text-align:center;padding:24px 14px}
  .crown-big{font-size:5em;animation:bounce 1.2s infinite ease}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .victory-title{font-size:1.8em;font-weight:900;color:#FFD700;margin:14px 0;text-shadow:2px 2px 0 #000}
  .victory-stars{font-size:2.2em;letter-spacing:6px;margin:10px 0}

  /* 收藏品櫃 */
  .collection{
    background:rgba(255,215,0,.1);border:2px solid #FFD700;
    border-radius:14px;padding:14px;margin-top:14px;
  }
  .col-title{color:#FFD700;font-weight:900;font-size:1.1em;margin-bottom:10px}
  .col-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .col-item{background:rgba(255,255,255,.1);border-radius:10px;padding:10px;text-align:center}
  .col-emoji{font-size:2em}
  .col-count{font-size:.85em;color:#FFD700;font-weight:700}

  /* Triangle pair display */
  .tri-pair-row{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin:10px 0}
  .tri-info-card{
    background:#1A0F3E;border:2px solid #B967FF;border-radius:12px;
    padding:10px 14px;font-weight:800;color:#fff;font-size:.98em;line-height:1.7;
    text-align:center;min-width:140px;
  }
  .tri-info-card .info-label{color:#FFD700;font-size:.85em;margin-bottom:4px}
  .tri-info-card .info-line{margin:2px 0}
  .tri-info-card .qmark{color:#FF8A00;font-size:1.4em;font-weight:900}

  @media(max-width:480px){
    .level-title{font-size:1.2em}
    .ans-btn{padding:14px 8px;font-size:1em;min-height:56px}
    .speak-icon{font-size:2em}
    .speak-bubble{font-size:.95em}
    .legend-text{font-size:1.6em;padding:14px 20px}
    .gacha-machine{font-size:4em}
    .gacha-prize{font-size:5em}
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="h-row">
      <div class="h-title">🔺 全等三角形 · 闖關</div>
      <div class="h-stars">⭐ <span id="star-count">0</span> / 8</div>
    </div>
    <div class="progress-dots" id="progress-dots"></div>
  </header>

  <main id="stage"></main>

  <footer>
    <button class="foot-btn" id="hint-btn">💡 提示</button>
    <button class="foot-btn" id="reset-btn">🔄 重來</button>
  </footer>

</div>

<!-- 慶祝層 -->
<div class="legend-banner" id="legend-banner">
  <div class="legend-text">闖關成功！</div>
  <div class="legend-stars">⭐⭐⭐</div>
</div>

<div class="gacha-overlay" id="gacha-overlay">
  <div class="gacha-box">
    <div class="gacha-machine" id="gacha-machine">🎰</div>
    <div id="gacha-content" style="display:none">
      <div class="gacha-prize" id="gacha-prize">🎁</div>
      <div class="gacha-name" id="gacha-name">??</div>
      <div class="gacha-rarity" id="gacha-rarity">??</div>
    </div>
    <button class="gacha-close" id="gacha-close" style="display:none">繼續闖關 ▶</button>
  </div>
</div>

<script>
'use strict';

// ============================================================
// SVG 工具
// ============================================================
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag,attrs={}){
  const e = document.createElementNS(NS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  return e;
}
function triPts(a,b,c){
  if(a+b<=c||b+c<=a||a+c<=b) return null;
  const x = (c*c+a*a-b*b)/(2*a);
  const y = Math.sqrt(Math.max(c*c-x*x,0));
  return [{x,y:-y},{x:0,y:0},{x:a,y:0}];
}
function fitTri(pts, cx, cy, scale){
  const mx=(pts[0].x+pts[1].x+pts[2].x)/3;
  const my=(pts[0].y+pts[1].y+pts[2].y)/3;
  return pts.map(p=>({x:cx+(p.x-mx)*scale, y:cy+(p.y-my)*scale}));
}
function drawAngleArc(svg, vertex, p1, p2, radius, color, sw){
  const a1 = Math.atan2(p1.y-vertex.y, p1.x-vertex.x);
  const a2 = Math.atan2(p2.y-vertex.y, p2.x-vertex.x);
  let da = a2-a1;
  while(da > Math.PI) da -= 2*Math.PI;
  while(da < -Math.PI) da += 2*Math.PI;
  const sweep = da > 0 ? 1 : 0;
  const start = {x:vertex.x+Math.cos(a1)*radius, y:vertex.y+Math.sin(a1)*radius};
  const end = {x:vertex.x+Math.cos(a2)*radius, y:vertex.y+Math.sin(a2)*radius};
  svg.appendChild(svgEl('path',{
    d:`M${start.x},${start.y} A${radius},${radius} 0 0,${sweep} ${end.x},${end.y}`,
    stroke:color, 'stroke-width':sw, fill:'none', 'stroke-linecap':'round'
  }));
}

function drawTriSVG(opts){
  const {a,b,c, type='NEUTRAL', w=240, h=200, sides=null, label=null, hideValues=false, highlightEdge=null, anglesA=null} = opts;
  // sides 是要顯示的標籤陣列 [BC, CA, AB]，可以是數字或 '?' 或 null（不顯示）
  const svg = svgEl('svg',{width:w, height:h, viewBox:`0 0 ${w} ${h}`});
  svg.appendChild(svgEl('rect',{x:0,y:0,width:w,height:h, fill:'#0A0E27', rx:10}));

  // 用實際邊長畫
  const aa = parseFloat(a), bb = parseFloat(b), cc = parseFloat(c);
  const raw = triPts(aa, bb, cc);
  if(!raw) return svg;
  const span = Math.max(aa,bb,cc);
  const scale = Math.min((w-50)/span, (h-50)/span) * 0.8;
  const pts = fitTri(raw, w/2, h/2+12, scale);

  const colors = {
    SSS:{stroke:'#FF3B30', fill:'rgba(255,59,48,0.25)'},
    SAS:{stroke:'#888', fill:'#0A0E27'},
    ASA:{stroke:'#888', fill:'#0A0E27'},
    NEUTRAL:{stroke:'#4DBCFF', fill:'rgba(77,188,255,0.2)'}
  };
  const co = colors[type] || colors.NEUTRAL;
  const path = svgEl('path',{
    d:`M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y} L${pts[2].x},${pts[2].y} Z`,
    fill:co.fill, stroke:co.stroke, 'stroke-width':4, 'stroke-linejoin':'round'
  });
  svg.appendChild(path);

  // SAS 視覺：兩邊藍色 + 夾角橘
  if(type==='SAS'){
    const drawEdge = (p1,p2,col,sw=6)=>svg.appendChild(svgEl('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:col,'stroke-width':sw,'stroke-linecap':'round'}));
    drawEdge(pts[0],pts[1],'#00F5FF');
    drawEdge(pts[0],pts[2],'#00F5FF');
    drawAngleArc(svg, pts[0], pts[1], pts[2], 22, '#FF8A00', 5);
  }
  // ASA 視覺：夾邊綠 + 兩角金
  if(type==='ASA'){
    const drawEdge = (p1,p2,col,sw=6)=>svg.appendChild(svgEl('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:col,'stroke-width':sw,'stroke-linecap':'round'}));
    drawEdge(pts[1],pts[2],'#39FF14');
    drawAngleArc(svg, pts[1], pts[0], pts[2], 22, '#FFD700', 5);
    drawAngleArc(svg, pts[2], pts[0], pts[1], 22, '#FFD700', 5);
  }

  // 高亮指定邊
  if(highlightEdge){
    const edgeMap = {AB:[pts[0],pts[1]], BC:[pts[1],pts[2]], CA:[pts[0],pts[2]]};
    const [p1,p2] = edgeMap[highlightEdge] || [];
    if(p1) svg.appendChild(svgEl('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'#FFD700','stroke-width':9,'stroke-linecap':'round',filter:'drop-shadow(0 0 4px #FFD700)'}));
  }

  // 邊長標
  if(sides && !hideValues){
    const lblSide = (p1,p2,txt,offY)=>{
      if(txt==null) return;
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
      const isQ = txt==='?';
      const t = svgEl('text',{
        x:mx, y:my+offY, 'text-anchor':'middle',
        'font-size':22, 'font-weight':900,
        fill: isQ ? '#FF8A00' : '#FFD700',
        stroke:'#000', 'stroke-width':3, 'paint-order':'stroke'
      });
      t.textContent = txt;
      svg.appendChild(t);
    };
    lblSide(pts[1],pts[2], sides[0], 22);   // BC
    lblSide(pts[0],pts[2], sides[1], -8);   // CA
    lblSide(pts[0],pts[1], sides[2], -8);   // AB
  }

  // 角度標 (anglesA = [angA(at vertex A 0), angB(at vertex B 1), angC(at vertex C 2)])
  if(anglesA){
    const lblAng = (vIdx,p1Idx,p2Idx,txt)=>{
      if(txt==null) return;
      const v=pts[vIdx], p1=pts[p1Idx], p2=pts[p2Idx];
      const a1=Math.atan2(p1.y-v.y,p1.x-v.x), a2=Math.atan2(p2.y-v.y,p2.x-v.x);
      const mid = Math.atan2(Math.sin(a1)+Math.sin(a2),Math.cos(a1)+Math.cos(a2));
      const lx=v.x+Math.cos(mid)*38, ly=v.y+Math.sin(mid)*38;
      const isQ = txt==='?';
      const t = svgEl('text',{
        x:lx, y:ly+5, 'text-anchor':'middle',
        'font-size':18, 'font-weight':900,
        fill:isQ?'#FF8A00':'#FFD700',
        stroke:'#000', 'stroke-width':3, 'paint-order':'stroke'
      });
      t.textContent = txt;
      svg.appendChild(t);
    };
    lblAng(0,1,2,anglesA[0]); // A
    lblAng(1,0,2,anglesA[1]); // B
    lblAng(2,0,1,anglesA[2]); // C
  }

  // 頂點標 A B C
  if(opts.showVertex){
    const lbl = (p,idx,name)=>{
      const offsets=[{x:0,y:-12},{x:-12,y:8},{x:12,y:8}];
      const o=offsets[idx];
      const t = svgEl('text',{
        x:p.x+o.x, y:p.y+o.y, 'text-anchor':'middle',
        'font-size':18, 'font-weight':900, fill:'#fff',
        stroke:'#000', 'stroke-width':3, 'paint-order':'stroke'
      });
      t.textContent = name;
      svg.appendChild(t);
    };
    const names = opts.vertexNames || ['A','B','C'];
    pts.forEach((p,i)=>lbl(p,i,names[i]));
  }

  // ✅ 標題不在 SVG 內畫（避免擋住頂點），統一由外層 HTML 標題顯示
  return svg;
}

// 包裝：SVG + 下方 HTML 標籤
function wrapTri(svg, caption){
  const wrap = document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px';
  wrap.appendChild(svg);
  if(caption){
    const cap = document.createElement('div');
    cap.style.cssText='font-size:1.05em;font-weight:900;color:#FFD700;letter-spacing:1px;text-shadow:1px 1px 0 #000';
    cap.innerHTML = caption;
    wrap.appendChild(cap);
  }
  return wrap;
}

// 簡單形狀（用在熱身關）
function drawShape(type, w=140, h=120){
  const svg = svgEl('svg',{width:w,height:h,viewBox:`0 0 ${w} ${h}`});
  svg.appendChild(svgEl('rect',{x:0,y:0,width:w,height:h, fill:'#0A0E27', rx:10}));
  const cx=w/2, cy=h/2;
  if(type==='triangle'){
    svg.appendChild(svgEl('polygon',{points:`${cx},${cy-40} ${cx-44},${cy+30} ${cx+44},${cy+30}`,
      fill:'rgba(255,59,48,0.4)', stroke:'#FF3B30','stroke-width':4,'stroke-linejoin':'round'}));
  } else if(type==='square'){
    svg.appendChild(svgEl('rect',{x:cx-40,y:cy-35,width:80,height:70,
      fill:'rgba(77,188,255,0.4)', stroke:'#4DBCFF','stroke-width':4, rx:4}));
  } else if(type==='circle'){
    svg.appendChild(svgEl('circle',{cx,cy,r:42,
      fill:'rgba(57,255,20,0.4)', stroke:'#39FF14','stroke-width':4}));
  } else if(type==='pentagon'){
    const pts=[];
    for(let i=0;i<5;i++){
      const a = -Math.PI/2 + i*2*Math.PI/5;
      pts.push(`${cx+Math.cos(a)*40},${cy+Math.sin(a)*40}`);
    }
    svg.appendChild(svgEl('polygon',{points:pts.join(' '),
      fill:'rgba(255,138,0,0.4)', stroke:'#FF8A00','stroke-width':4,'stroke-linejoin':'round'}));
  }
  return svg;
}

function pickPrize(){
  const total = PRIZES.reduce((s,p)=>s+p.w,0);

  for(const p of PRIZES){
    r -= p.w;
    if(r<=0) return p;
  }
  return PRIZES[0];
}

let audioCtx = null;
function ensureAudio(){ if(!audioCtx) try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(freq, dur, type='sine', vol=0.15){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.value=0; g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime+0.01);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function sfxClick(){ ensureAudio(); beep(440,0.1,'square',0.1); }
function sfxRight(){ ensureAudio(); [659,784,988].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'sine',0.18),i*80)); }
function sfxWrong(){ ensureAudio(); beep(220,0.25,'sawtooth',0.12); }
function sfxWin(){ ensureAudio(); [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'sawtooth',0.18),i*100)); }
function sfxGacha(){ ensureAudio(); for(let i=0;i<6;i++) setTimeout(()=>beep(440+i*100,0.08,'square',0.1),i*60); }

function celebrate(onDone){
  const types = ['confetti','race','legend','gacha'];
  const t = types[Math.floor(Math.random()*types.length)];
  if(t==='confetti') doConfetti(onDone);
  else if(t==='race') doRace(onDone);
  else if(t==='legend') doLegend(onDone);
  else doGacha(onDone);
}

function doConfetti(onDone, n=40){
  const colors=['#FFD700','#00F5FF','#B967FF','#39FF14','#FF3B30','#FF8A00','#FF69B4'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=(50+Math.random()*40-20)+'%';
    c.style.top='30%';
    c.style.borderRadius=Math.random()<0.5?'50%':'2px';
    document.body.appendChild(c);
    const dx=(Math.random()-0.5)*500;
    const dy=200+Math.random()*350;
    c.animate([
      {transform:'translate(0,0) rotate(0)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) rotate(${Math.random()*720}deg)`,opacity:0}
    ],{duration:1600+Math.random()*800,easing:'ease-out'}).onfinish=()=>c.remove();
  }
  setTimeout(()=>onDone&&onDone(), 1200);
}

function doRace(onDone){
  const cars = ['🏎️','🏁','🚗','🚀'];
  const car = document.createElement('div');
  car.className='race-car';
  car.textContent = cars[Math.floor(Math.random()*cars.length)];
  document.body.appendChild(car);
  car.animate([
    {left:'-100px', transform:'translateY(0) scale(1)'},
    {left:'50%',   transform:'translateY(-20px) scale(1.3)', offset:0.5},
    {left:'calc(100% + 100px)', transform:'translateY(0) scale(1)'}
  ],{duration:1800,easing:'ease-out'}).onfinish=()=>car.remove();
  // smoke trail
  let i = 0;
  const interval = setInterval(()=>{
    const smoke = document.createElement('div');
    smoke.style.cssText=`position:fixed;font-size:1.5em;z-index:9997;pointer-events:none;bottom:30%;opacity:0.7;`;
    smoke.textContent='💨';
    smoke.style.left = (i*8 + 5) + '%';
    document.body.appendChild(smoke);
    smoke.animate([
      {opacity:0.7, transform:'translateY(0)'},
      {opacity:0, transform:'translateY(-30px)'}
    ],{duration:800}).onfinish=()=>smoke.remove();
    i++;
    if(i>12) clearInterval(interval);
  }, 100);
  doConfetti(null, 20); // 加碼撒花
  setTimeout(()=>onDone&&onDone(), 1900);
}

function doLegend(onDone){
  const banner = document.getElementById('legend-banner');
  banner.classList.remove('show');
  void banner.offsetWidth; // reflow
  banner.classList.add('show');
  doConfetti(null, 30);
  setTimeout(()=>{
    banner.classList.remove('show');
    onDone&&onDone();
  }, 1900);
}

function doGacha(onDone){
  const overlay = document.getElementById('gacha-overlay');
  const machine = document.getElementById('gacha-machine');
  const content = document.getElementById('gacha-content');
  const closeBtn = document.getElementById('gacha-close');
  const prizeEl = document.getElementById('gacha-prize');
  const nameEl = document.getElementById('gacha-name');
  const rarityEl = document.getElementById('gacha-rarity');

  machine.style.display='block';
  content.style.display='none';
  closeBtn.style.display='none';
  overlay.classList.add('show');
  sfxGacha();

  // 1.2 秒後揭曉
  setTimeout(()=>{
    const prize = pickPrize();
    state.collection[prize.emoji] = (state.collection[prize.emoji]||0) + 1;
    saveState();
    machine.style.display='none';
    content.style.display='block';
    prizeEl.textContent = prize.emoji;
    nameEl.textContent = prize.name;
    const rarityNames = {common:'普通',rare:'稀有 ⭐',epic:'史詩 ⭐⭐',legendary:'傳說 ⭐⭐⭐'};
    rarityEl.textContent = rarityNames[prize.rarity];
    rarityEl.className = 'gacha-rarity rarity-'+prize.rarity;
    closeBtn.style.display='inline-block';
    if(prize.rarity==='legendary' || prize.rarity==='epic'){
      doConfetti(null, 50);
    }
    sfxRight();
  }, 1200);

  closeBtn.onclick = ()=>{
    sfxClick();
    overlay.classList.remove('show');
    onDone&&onDone();
  };
}

  const content = document.createElement('div'); stage.appendChild(content);

  if(lv.type==='shape-pick') renderShapePick(content, lv);
  else if(lv.type==='side-match') renderSideMatch(content, lv);

  const hb=document.createElement('div'); hb.id='hint-box'; hb.textContent='💡 '+lv.hint; stage.appendChild(hb);

}

    b.className='ans-btn';
    b.textContent=num;
    b.onclick=()=>handleAnswer(b, num===lv.answer, ans, parent, lv);
    ans.appendChild(b);
  });
  parent.appendChild(ans);
}

// ===== L5: ASA 推未知角 =====
function renderFindAngleASA(parent, lv){
  const row=document.createElement('div'); row.className='tri-pair-row';
  const card = (label, lines)=>{
    const c=document.createElement('div'); c.className='tri-info-card';
    c.innerHTML=`<div class="info-label">${label}</div>` +
      lines.map(l=>`<div class="info-line">${l}</div>`).join('');
    return c;
  };
  const visualLeft = drawTriSVG({a:5,b:6,c:5, type:'ASA', w:200, h:170, hideValues:true});
  const visualRight = drawTriSVG({a:5,b:6,c:5, type:'ASA', w:200, h:170, hideValues:true});

  const lc = document.createElement('div'); lc.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px';
  lc.appendChild(visualLeft);
  lc.appendChild(card('△ABC', [
    `∠B = <span style="color:#FFD700">${lv.leftASA.angB}°</span>`,
    `BC = <span style="color:#39FF14">${lv.leftASA.BC}</span>`,
    `∠C = <span style="color:#FFD700">${lv.leftASA.angC}°</span>`,
  ]));

  const eq=document.createElement('div'); eq.className='eq-symbol'; eq.textContent='≅';

  const rc = document.createElement('div'); rc.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px';
  rc.appendChild(visualRight);
  rc.appendChild(card('△DEF', [
    `∠E = <span class="qmark">${lv.rightASA.angB}°</span>`,
    `EF = <span style="color:#39FF14">${lv.rightASA.BC}</span>`,
    `∠F = <span style="color:#FFD700">${lv.rightASA.angC}°</span>`,
  ]));

  row.appendChild(lc); row.appendChild(eq); row.appendChild(rc);
  parent.appendChild(row);

  const ans=document.createElement('div'); ans.className='answers four';
  lv.options.forEach(num=>{
    const b=document.createElement('button');
    b.className='ans-btn';
    b.textContent=num+'°';
    b.onclick=()=>handleAnswer(b, num===lv.answer, ans, parent, lv);
    ans.appendChild(b);
  });
  parent.appendChild(ans);
}

// ===== L6: 看顏色 =====
function renderColorId(parent, lv){
  const row=document.createElement('div'); row.className='svg-wrap';
  row.appendChild(drawTriSVG({a:lv.triSides[0],b:lv.triSides[1],c:lv.triSides[2], type:lv.triType, w:280, h:220, hideValues:true}));
  parent.appendChild(row);

  const ans=document.createElement('div'); ans.className='answers three';
  lv.options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='ans-btn '+(opt.cls||'');
    b.textContent=opt.label;
    b.onclick=()=>handleAnswer(b, opt.correct, ans, parent, lv);
    ans.appendChild(b);
  });
  parent.appendChild(ans);
}

// ===== L7: 條件判斷 =====
function renderConditionPick(parent, lv){
  const ans=document.createElement('div'); ans.className='answers';
  ans.style.gridTemplateColumns='1fr';
  lv.options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='ans-btn '+(opt.cls||'');
    b.textContent=opt.label;
    b.onclick=()=>handleAnswer(b, opt.correct, ans, parent, lv);
    ans.appendChild(b);
  });
  parent.appendChild(ans);
}

// ===== L8: BOSS =====
let bossState = {q:0, score:0};
function renderBoss(parent, lv){
  bossState = {q:0, score:0};
  renderBossQ(parent, lv);
}
function renderBossQ(parent, lv){
  parent.innerHTML='';
  if(bossState.q >= lv.boss.length){
    const ok = bossState.score === lv.boss.length;
    const result=document.createElement('div');
    result.style.cssText='text-align:center;padding:18px';
    result.innerHTML = `
      <div style="font-size:3em">${ok?'🏆':'💪'}</div>
      <div style="font-size:1.4em;font-weight:900;color:#FFD700;margin:14px 0">
        BOSS 戰結束<br>${bossState.score} / ${lv.boss.length}
      </div>
      ${ok ? '<div style="color:#39FF14;font-weight:800;font-size:1.1em">完美通關！🎉</div>'
           : '<div style="color:#FF8A00;font-weight:800;font-size:1.1em">很棒！再戰一次更厲害！</div>'}
    `;
    parent.appendChild(result);
    if(ok){
      showFeedback(parent, true, '🏆 全對！你是全等三角形大師！');
      passLevel();
    } else {
      const retry=document.createElement('button');
      retry.className='next-btn';
      retry.textContent='🔄 再戰一次';
      retry.style.marginTop='14px';
      retry.onclick=()=>{
        sfxClick();
        bossState={q:0,score:0};
        renderBossQ(parent, lv);
      };
      parent.appendChild(retry);
    }
    return;
  }

  const cur = lv.boss[bossState.q];
  const hdr=document.createElement('div');
  hdr.style.cssText='text-align:center;color:#FFD700;font-weight:900;font-size:1.05em;margin:6px 0';
  hdr.textContent = `第 ${bossState.q+1} / ${lv.boss.length} 題（已答對 ${bossState.score}）`;
  parent.appendChild(hdr);

  const q=document.createElement('div');
  q.style.cssText=`background:#1A0F3E;border:3px solid #B967FF;border-radius:14px;
    padding:18px;margin:14px 0;text-align:center;font-size:1.1em;font-weight:800;color:#fff`;
  q.textContent = '📋 ' + cur.q;
  parent.appendChild(q);

  const ans=document.createElement('div');
  ans.className = cur.options.length<=3 ? 'answers three' : 'answers four';
  cur.options.forEach(label=>{
    const b=document.createElement('button');
    let cls = '';
    if(cur.kind==='rule'){
      const m={SSS:'warn',SAS:'',ASA:'gold'};
      cls = m[label]||'';
    }
    b.className='ans-btn '+cls;
    b.textContent = label;
    b.onclick = ()=>{
      sfxClick();
      const correct = (label === cur.correct) || (label === String(cur.correct));
      if(correct){
        b.classList.add('right'); sfxRight();
        bossState.score++;
      } else {
        b.classList.add('wrong'); sfxWrong();
      }
      ans.querySelectorAll('button').forEach(x=>x.disabled=true);
      setTimeout(()=>{ bossState.q++; renderBossQ(parent, lv); }, 800);
    };
    ans.appendChild(b);
  });
  parent.appendChild(ans);
}

// ============================================================
// 共用：答題反饋
// ============================================================
function handleAnswer(btn, correct, ansBox, parent, lv){
  sfxClick();
  if(correct){
    btn.classList.add('right'); sfxRight();
    showFeedback(parent, true, lv.msg);
    ansBox.querySelectorAll('button').forEach(x=>x.disabled=true);
    passLevel();
  } else {
    btn.classList.add('wrong'); sfxWrong();
    setTimeout(()=>{btn.classList.remove('wrong');btn.disabled=false;}, 500);
    showFeedback(parent, false, '🤔 再想想，看「' + (lv.hint||'') + '」');
  }
}

function showFeedback(parent, ok, msg){
  let fb = parent.querySelector('.feedback');
  if(!fb){ fb=document.createElement('div'); fb.className='feedback'; parent.appendChild(fb); }
  fb.className = 'feedback ' + (ok?'fb-ok':'fb-no');
  fb.textContent = msg;
}

// ============================================================
// 過關
// ============================================================
function passLevel(){
  if(!state.done[state.cur]){
    state.done[state.cur] = true;
    state.stars++;
    saveState();
  }
  setTimeout(()=>{
    // 觸發隨機慶祝特效
    celebrate(()=>{
      const stage = document.getElementById('stage');
      if(stage.querySelector('.next-row')) return;
      const row=document.createElement('div'); row.className='next-row';
      const btn=document.createElement('button');
      btn.className='next-btn';
      btn.textContent = state.cur < LEVELS.length-1 ? '▶ 進入下一關' : '🏆 看結果';
      btn.onclick = ()=>{
        sfxClick();
        state.cur++;
        saveState();
        renderLevel();
      };
      row.appendChild(btn);
      stage.appendChild(row);
    });
  }, 700);
  renderHeader();
}

// ============================================================
// 全通關畫面
// ============================================================
function renderVictory(){
  const stage = document.getElementById('stage');
  // 收藏品櫃
  const colItems = Object.entries(state.collection)
    .map(([emoji,count])=>{
      const p = PRIZES.find(x=>x.emoji===emoji);
      return `<div class="col-item rarity-${p?.rarity||'common'}"><div class="col-emoji">${emoji}</div><div class="col-count">×${count}</div></div>`;
    }).join('');

  stage.innerHTML = `
    <div class="victory-screen">
      <div class="crown-big">👑</div>
      <div class="victory-title">🎉 全部通關！</div>
      <div class="victory-stars">${'⭐'.repeat(state.stars)}</div>
      <div style="color:#fff;font-weight:700;margin:14px 0;font-size:1.05em">
        你已經是<br>
        <span style="color:#FFD700;font-size:1.4em">全等三角形大師</span><br>
        SSS · SAS · ASA 都會了！
      </div>
      ${colItems ? `<div class="collection">
        <div class="col-title">🎁 你的收藏品</div>
        <div class="col-grid">${colItems}</div>
      </div>` : ''}
      <button class="next-btn" id="restart-btn" style="margin-top:18px">🔄 從頭再戰</button>
    </div>
  `;
  document.getElementById('restart-btn').onclick = ()=>{
    sfxClick();
    if(confirm('要從頭再戰嗎？星星會清空但收藏品保留～')){
      state.cur=0;
      state.done=new Array(LEVELS.length).fill(false);
      state.stars=0;
      saveState();
      renderLevel();
    }
  };
  sfxWin();
  doConfetti(null, 100);
  setTimeout(()=>doConfetti(null, 60), 600);
  setTimeout(()=>doConfetti(null, 60), 1200);
  renderHeader();
}

// ============================================================
// 初始化
// ============================================================
document.getElementById('hint-btn').onclick = ()=>{
  sfxClick();
  const hb = document.getElementById('hint-box');
  if(hb) hb.classList.toggle('show');
};
document.getElementById('reset-btn').onclick = ()=>{
  if(confirm('確定要重來嗎？星星和收藏品都會清空喔～')){
    sfxClick();
    state = {cur:0, done:new Array(LEVELS.length).fill(false), stars:0, collection:{}};
    saveState();
    renderLevel();
  }
};
document.addEventListener('click', ensureAudio, {once:true});
document.addEventListener('touchstart', ensureAudio, {once:true});

renderLevel();
</script>
